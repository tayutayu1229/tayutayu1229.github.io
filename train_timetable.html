<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>乗務員時刻表</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #fff;
      color: #000;
      font-family: 'BIZ UDPGothic', sans-serif;
    }

    .header {
      padding: 20px;
      border-bottom: 3px solid #000;
    }

    .title {
      font-size: 30px;
      font-weight: 700;
    }

    .meta {
      margin-top: 10px;
      font-size: 16px;
      line-height: 1.6;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      font-size: 18px;
    }

    th {
      background: #f0f0f0;
      border-bottom: 3px solid #000;
      padding: 10px;
      font-weight: 700;
    }

    td {
      padding: 10px 6px;
      border-bottom: 1px solid #ccc;
      text-align: center;
    }

    .station {
      text-align: left;
      font-weight: 700;
    }

    .track {
      text-align: right;
      padding-right: 12px;
    }

    .pass {
      color: #888;
    }

    /* 駅間行（運転時分） */
    .between {
      background: #f7f7f7;
      font-size: 16px;
      color: #333;
      border-bottom: 2px solid #ddd;
    }

    .between td {
      padding: 6px;
    }

    .footer {
      padding: 20px;
      font-size: 14px;
      color: #555;
      border-top: 1px solid #ccc;
      margin-top: 40px;
    }

    .back {
      margin: 20px;
      display: inline-block;
      padding: 8px 14px;
      background: #eee;
      border: 1px solid #aaa;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="title" id="trainTitle">読み込み中…</div>
    <div class="meta" id="trainMeta"></div>
  </div>

  <table id="timetable">
    <thead>
      <tr>
        <th>駅名</th>
        <th>着</th>
        <th>発</th>
        <th>番線</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="footer">
    ※ この画面は乗務員用時刻表の簡易表示です。
  </div>

  <div class="back" onclick="history.back()">← 一覧に戻る</div>

  <script src="train_timetable.js"></script>
</body>
</html>
