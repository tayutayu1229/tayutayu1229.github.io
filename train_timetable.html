<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-TAC Style Timetable</title>

    <style>
        :root {
            --green-dark: #006400;
            --border-color: #999;
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background: #fff;
            color: #000;
            /* PC等の大画面で見やすいようベースサイズをアップ */
            font-size: 18px;
        }

        /* ヘッダー */
        .top-green-nav {
            background: var(--green-dark);
            color: white;
            display: flex;
            justify-content: space-between;
            padding: 8px 15px;
            font-size: 20px;
        }

        .info-area {
            padding: 15px;
            border-bottom: 3px solid #ccc;
        }

        .train-no {
            font-size: 52px; /* 列車番号を強調 */
            font-weight: bold;
            color: #3333cc;
        }

        .train-main-row {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .speed-box, .type-box, .cars-box {
            font-size: 16px;
            color: #555;
            text-align: center;
        }

        .speed-box span, .type-box span, .cars-box span {
            display: block;
            font-size: 28px;
            font-weight: bold;
            color: #000;
        }

        /* 行路票本体 - Gridレイアウトの比率を再定義 */
        .table-header, .row {
            display: grid;
            /* 運転時分、駅名(拡大)、着、発、着線、制限、記事(拡大) */
            grid-template-columns: 80px 1.5fr 120px 120px 100px 80px 2fr;
            border-bottom: 1px solid var(--border-color);
        }

        .table-header {
            background: #eee;
            font-size: 14px;
            text-align: center;
            font-weight: bold;
            height: 45px;
            align-items: center;
        }

        .row {
            height: 90px; /* 行の高さを確保 */
            align-items: center;
        }

        /* セルごとの装飾 */
        .cell {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 1px solid #ddd;
        }

        .station-name {
            font-size: 36px; /* 駅名を大きく */
            font-weight: bold;
            justify-content: flex-start;
            padding-left: 20px;
        }

        /* 時刻表記 - 緑の囲みを廃止 */
        .time-val {
            font-size: 38px;
            font-weight: bold;
            font-family: 'Arial Narrow', sans-serif;
            letter-spacing: -1px;
        }

        .sec {
            font-size: 22px;
            vertical-align: super;
            margin-left: 2px;
        }

        /* 運転時分 */
        .runtime-cell {
            font-size: 32px;
            font-weight: bold;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #000;
        }

        .runtime-sec {
            font-size: 16px;
            margin-top: -5px;
        }

        /* 着線 */
        .track-cell {
            color: red;
            font-size: 32px;
            font-weight: bold;
        }

        .memo-cell {
            justify-content: flex-start;
            padding-left: 15px;
        }

        /* スクロールバーを見やすく */
        main {
            overflow-x: auto;
        }
    </style>
</head>

<body>
    <header class="status-bar">
        <div class="top-green-nav">
            <span class="menu-btn">≡</span>
            <span id="work-id">Work1-1</span>
            <span class="battery">100%</span>
        </div>

        <div class="info-area">
            <div class="date-row">施行日：<span id="date"></span></div>
            <div class="train-main-row">
                <div id="train-no" class="train-no"></div>
                <div class="speed-box">最高速度<span id="max-speed"></span></div>
                <div class="type-box">速度種別<span id="speed-type"></span></div>
                <div class="cars-box"><span id="cars-count">1</span>両</div>
            </div>
        </div>
    </header>

    <main class="timetable">
        <div class="table-header">
            <div class="h-runtime">運転時分</div>
            <div class="h-station">停車場名</div>
            <div class="h-arr">着</div>
            <div class="h-dep">発 (通)</div>
            <div class="h-track">着線発線</div>
            <div class="h-limit">制限速度</div>
            <div class="h-memo">記事</div>
        </div>
        <div id="timetable-body">
            </div>
    </main>

    <script src="train_timetable.js"></script>
</body>
</html>
