<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-TAC Style Timetable</title>

    <style>
        :root {
            --green-dark: #006400;
            --border-color: #999;
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background: #fff;
            color: #000;
            font-size: 18px;
            /* ヘッダー固定用：コンテンツがヘッダーに被らないよう余白を確保 */
            padding-top: 150px; 
        }

        /* --- ヘッダー固定設定 --- */
        .fixed-header-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .top-green-nav {
            background: var(--green-dark);
            color: white;
            display: flex;
            justify-content: space-between;
            padding: 8px 15px;
            font-size: 20px;
        }

        .info-area {
            padding: 10px 15px;
            border-bottom: 2px solid #ccc;
        }

        .train-no {
            font-size: 52px;
            font-weight: bold;
            color: #3333cc;
        }

        .train-main-row {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .speed-box, .type-box, .cars-box {
            font-size: 16px;
            color: #555;
            text-align: center;
        }

        .speed-box span, .type-box span, .cars-box span {
            display: block;
            font-size: 28px;
            font-weight: bold;
            color: #000;
        }

        /* テーブルヘッダー（列名）も固定 */
        .table-header {
            display: grid;
            grid-template-columns: 90px 1.5fr 140px 140px 120px 80px 2fr;
            background: #eee;
            font-size: 15px;
            text-align: center;
            font-weight: bold;
            height: 50px;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
        }

        /* --- コンテンツエリア --- */
        .row {
            display: grid;
            grid-template-columns: 90px 1.5fr 140px 140px 120px 80px 2fr;
            height: 100px; /* 行の高さを少しアップ */
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .cell {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 1px solid #ddd;
        }

        .station-name {
            font-size: 38px;
            font-weight: bold;
            justify-content: flex-start;
            padding-left: 20px;
        }

        /* 時刻表記 */
        .time-val {
            font-size: 42px;
            font-weight: bold;
            font-family: 'Arial Narrow', sans-serif;
            letter-spacing: -1px;
            text-align: center;
        }

        /* 秒のサイズを少し大きく修正 */
        .sec {
            font-size: 26px; 
            vertical-align: baseline; /* 位置を少し下げる */
            margin-left: 4px;
        }

        .runtime-cell {
            font-size: 36px;
            font-weight: bold;
            flex-direction: column;
            color: #000;
        }

        .runtime-sec {
            font-size: 18px;
            margin-top: -5px;
        }

        /* 着線 - 文字を中央寄りに、サイズを大きく */
        .track-cell {
            color: red;
            font-size: 30px;
            font-weight: bold;
        }

        .memo-cell {
            justify-content: flex-start;
            padding-left: 15px;
        }
    </style>
</head>

<body>
    <div class="fixed-header-container">
        <header class="status-bar">
            <div class="top-green-nav">
                <span class="menu-btn">≡</span>
                <span id="work-id">Work1-1</span>
                <span class="battery">100%</span>
            </div>

            <div class="info-area">
                <div class="date-row">施行日：<span id="date"></span></div>
                <div class="train-main-row">
                    <div id="train-no" class="train-no"></div>
                    <div class="speed-box">最高速度<span id="max-speed"></span></div>
                    <div class="type-box">速度種別<span id="speed-type"></span></div>
                    <div class="cars-box"><span>1</span>両</div>
                </div>
            </div>
        </header>

        <div class="table-header">
            <div class="h-runtime">運転時分</div>
            <div class="h-station">停車場名</div>
            <div class="h-arr">着</div>
            <div class="h-dep">発 (通)</div>
            <div class="h-track">着線発線</div>
            <div class="h-limit">制限速度</div>
            <div class="h-memo">記事</div>
        </div>
    </div>

    <main id="timetable-body">
        </main>

    <script src="train_timetable.js"></script>
</body>
</html>
