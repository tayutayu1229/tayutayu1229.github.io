<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-TAC Style Timetable</title>

    <style>
        :root {
            --green-dark: #006400;
            --border-color: #999;
        }

        body {
            margin: 0;
            font-family: sans-serif;
            background: #fff;
            color: #000;
        }

        /* ヘッダー */
        .top-green-nav {
            background: var(--green-dark);
            color: white;
            display: flex;
            justify-content: space-between;
            padding: 4px 10px;
            font-size: 14px;
        }

        .info-area {
            padding: 10px;
            border-bottom: 2px solid #ccc;
        }

        .train-no {
            font-size: 36px;
            font-weight: bold;
            color: #3333cc;
            flex: 1;
        }

        .train-main-row {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* 行路票本体 */
        .table-header {
            display: grid;
            grid-template-columns: 50px 140px 100px 100px 50px 50px 1fr;
            background: #eee;
            font-size: 11px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .row {
            display: grid;
            grid-template-columns: 50px 140px 100px 100px 50px 50px 1fr;
            height: 60px;
            align-items: center;
            border-bottom: 1px solid #ccc;
        }

        /* セルごとの装飾 */
        .cell {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 1px solid #eee;
        }

        .station-name {
            font-size: 20px;
            font-weight: bold;
            justify-content: flex-start;
            padding-left: 8px;
        }

        /* 時刻表記 */
        .time-val {
            font-size: 22px;
            font-weight: bold;
            font-family: 'Arial Narrow', sans-serif;
            position: relative;
        }

        .sec {
            font-size: 12px;
            vertical-align: super;
            margin-left: 2px;
        }

        /* 着時刻の強調ボックス */
        .arr-box {
            background: var(--green-dark);
            color: white;
            width: 85%;
            height: 45px;
            border-radius: 4px;
        }

        /* 運転時分 */
        .runtime-cell {
            font-size: 18px;
            font-weight: bold;
            flex-direction: column;
            align-items: flex-start;
            padding-left: 5px;
        }

        .runtime-sec {
            font-size: 10px;
        }

        /* 着線 */
        .track-cell {
            color: red;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <header class="status-bar">
        <div class="top-green-nav">
            <span class="menu-btn">≡</span>
            <span id="work-id">Work1-1</span>
            <span class="battery">100%</span>
        </div>

        <div class="info-area">
            <div class="date-row">施行日：<span id="date"></span></div>
            <div class="train-main-row">
                <div id="train-no" class="train-no"></div>
                <div class="speed-box">最高速度<br><span id="max-speed"></span></div>
                <div class="type-box">速度種別<br><span id="speed-type"></span></div>
                <div class="cars-box"><span id="cars-count">1</span> 両</div>
            </div>
        </div>
    </header>

    <main class="timetable">
        <div class="table-header">
            <div class="h-runtime">運転<br>時分</div>
            <div class="h-station">停車場名</div>
            <div class="h-arr">着</div>
            <div class="h-dep">発 (通)</div>
            <div class="h-track">着線<br>発線</div>
            <div class="h-limit">制限<br>速度</div>
            <div class="h-memo">記事</div>
        </div>
        <div id="timetable-body"></div>
    </main>
    <script src="train_timetable.js"></script>
</body>
</html>
