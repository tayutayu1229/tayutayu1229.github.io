<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>D-TAC 乗務員時刻表</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: 'BIZ UDPGothic', sans-serif;
    }

    /* ヘッダ */
    .header {
      padding: 20px;
      border-bottom: 3px solid #444;
    }

    .train-number {
      font-size: 32px;
      font-weight: 700;
      color: #4da6ff; /* D-TAC の青 */
    }

    .meta {
      margin-top: 10px;
      font-size: 18px;
      line-height: 1.6;
      color: #ddd;
    }

    /* 表 */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 20px;
    }

    th {
      background: #111;
      padding: 10px;
      border-bottom: 2px solid #444;
      font-weight: 700;
    }

    td {
      padding: 12px 8px;
      border-bottom: 1px solid #333;
      text-align: center;
    }

    .station {
      text-align: left;
      padding-left: 16px;
      font-weight: 700;
    }

    .track {
      text-align: right;
      padding-right: 16px;
      color: #ccc;
    }

    /* 通過駅 */
    .pass td {
      color: #666;
    }

    /* 駅間行 */
    .between {
      background: #111;
      color: #bbb;
      font-size: 16px;
      border-bottom: 1px solid #222;
    }

    .between td {
      padding: 6px 8px;
    }

    /* 戻るボタン */
    .back {
      margin: 20px;
      display: inline-block;
      padding: 8px 14px;
      background: #222;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      color: #ccc;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="train-number" id="trainTitle">読み込み中…</div>
    <div class="meta" id="trainMeta"></div>
  </div>

  <table id="timetable">
    <thead>
      <tr>
        <th>駅名</th>
        <th>着</th>
        <th>発</th>
        <th>番線</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="back" onclick="history.back()">← 一覧に戻る</div>

  <script src="train_timetable.js"></script>
</body>
</html>
