<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アカウント管理 - 東京圏輸送情報システム</title>

    <style>
        /* 全体レイアウト */
        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: #f7f7f7;
            color: #222;
        }

        .layout {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 左メニュー */
        .sidebar {
            width: 220px;
            background-color: #ffffff;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            padding-top: 1rem;
        }

        .sidebar h2 {
            font-size: 1.1rem;
            font-weight: bold;
            padding: 0 1rem 1rem;
            border-bottom: 1px solid #ddd;
            margin-bottom: 1rem;
        }

        .menu-item {
            padding: 0.8rem 1.2rem;
            cursor: pointer;
            border-left: 4px solid transparent;
            font-size: 0.95rem;
        }

        .menu-item:hover {
            background-color: #f1f1f1;
        }

        .menu-item.active {
            border-left: 4px solid #009944; /* JR東日本の緑 */
            background-color: #eef7f3;
            font-weight: bold;
        }

        /* 右側コンテンツ */
        .content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .section {
            background-color: #fff;
            border: 1px solid #ddd;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border-radius: 4px;
        }

        .section h3 {
            margin-top: 0;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #ccc;
            font-size: 1.2rem;
        }

        /* テーブル */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px 10px;
            text-align: left;
        }

        th {
            background-color: #f5f5f5;
            font-weight: bold;
        }

        tr:hover {
            background-color: #f1faf7; /* 薄い緑 */
        }

        /* バッジ */
        .status-badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .status-active {
            background-color: #e8e8e8;
            color: #222;
        }

        .status-disabled {
            background-color: #f8d7da;
            color: #721c24;
        }

        .status-admin {
            background-color: #e6f0ff;
            color: #084298;
        }

        .status-pending {
            background-color: #fff3cd;
            color: #856404;
        }

        /* ボタン */
        button {
            padding: 6px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-right: 4px;
        }

        .btn-approve { background-color: #009944; color: white; }
        .btn-approve:hover { background-color: #007a36; }

        .btn-delete { background-color: #c62828; color: white; }
        .btn-delete:hover { background-color: #a61f1f; }

        .btn-disable { background-color: #333; color: white; }
        .btn-disable:hover { background-color: #111; }

        .btn-enable { background-color: #777; color: white; }
        .btn-enable:hover { background-color: #555; }

        .btn-admin { background-color: #333; color: white; }
        .btn-admin:hover { background-color: #111; }

        .btn-revoke { background-color: #777; color: white; }
        .btn-revoke:hover { background-color: #555; }

        /* ログイン情報 */
        #user-info {
            text-align: right;
            font-weight: bold;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
<div class="layout">

    <!-- 左メニュー -->
    <div class="sidebar">
        <h2>管理メニュー</h2>
        <div class="menu-item active" data-target="dashboard">ダッシュボード</div>
        <div class="menu-item" data-target="pending">承認待ち</div>
        <div class="menu-item" data-target="users">ユーザー管理</div>
        <div class="menu-item" data-target="account">アカウント設定</div>
        <div class="menu-item" id="logout-button">ログアウト</div>
    </div>

    <!-- 右側コンテンツ -->
    <div class="content">

        <p id="user-info"></p>

        <div id="dashboard" class="section">
            <h3>ダッシュボード</h3>
            <p>アカウント管理パネルへようこそ。</p>
        </div>

        <div id="pending" class="section" style="display:none;">
            <h3>承認待ちユーザー</h3>
            <div id="pending-users-list">読み込み中...</div>
        </div>

        <div id="users" class="section" style="display:none;">
            <h3>ユーザー管理</h3>
            <div id="existing-users-list">読み込み中...</div>
        </div>

        <div id="account" class="section" style="display:none;">
            <h3>アカウント設定</h3>
            <button id="change-email-button">メールアドレス変更</button>
            <button id="change-password-button">パスワード変更</button>
        </div>

    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="account_management.js"></script>

<script>
    /* 左メニューの切り替え */
    document.querySelectorAll(".menu-item").forEach(item => {
        item.addEventListener("click", () => {
            document.querySelectorAll(".menu-item").forEach(i => i.classList.remove("active"));
            item.classList.add("active");

            const target = item.dataset.target;
            document.querySelectorAll(".section").forEach(sec => sec.style.display = "none");
            document.getElementById(target).style.display = "block";
        });
    });

    /* ログアウト */
    document.getElementById("logout-button").addEventListener("click", async () => {
        const auth = firebase.auth();
        await auth.signOut();
    });
</script>

</body>
</html>
