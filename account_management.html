<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者パネル - 東京圏輸送情報システム</title>

    <style>
        /* 全体レイアウト */
        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f6f5;
            color: #222;
        }

        .layout {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 左メニュー */
        .sidebar {
            width: 230px;
            background-color: #ffffff;
            border-right: 2px solid #009944;
            display: flex;
            flex-direction: column;
            padding-top: 1rem;
        }

        .sidebar h2 {
            font-size: 1.1rem;
            font-weight: bold;
            padding: 0 1rem 1rem;
            border-bottom: 1px solid #ccc;
            margin-bottom: 1rem;
            color: #009944;
        }

        .menu-item {
            padding: 0.9rem 1.2rem;
            cursor: pointer;
            border-left: 4px solid transparent;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-item:hover {
            background-color: #e6f4ee;
        }

        .menu-item.active {
            border-left: 4px solid #009944;
            background-color: #e6f4ee;
            font-weight: bold;
        }

        .badge {
            min-width: 18px;
            padding: 2px 6px;
            border-radius: 999px;
            background-color: #c62828;
            color: #fff;
            font-size: 0.7rem;
            text-align: center;
        }

        /* 右側コンテンツ */
        .content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: none;
        }

        .section {
            background-color: #fff;
            border: 1px solid #ddd;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border-radius: 4px;
        }

        .section h3 {
            margin-top: 0;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #009944;
            font-size: 1.2rem;
        }

        /* テーブル */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px 10px;
            text-align: left;
        }

        th {
            background-color: #e6f4ee;
            font-weight: bold;
        }

        tr:hover {
            background-color: #eef7f3;
        }

        /* バッジ */
        .status-badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .status-active {
            background-color: #e8e8e8;
            color: #222;
        }

        .status-disabled {
            background-color: #f8d7da;
            color: #721c24;
        }

        .status-admin {
            background-color: #e6f0ff;
            color: #084298;
        }

        .status-pending {
            background-color: #fff3cd;
            color: #856404;
        }

        /* ボタン */
        button {
            padding: 6px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-right: 4px;
        }

        .btn-approve { background-color: #009944; color: white; }
        .btn-approve:hover { background-color: #007a36; }

        .btn-delete { background-color: #c62828; color: white; }
        .btn-delete:hover { background-color: #a61f1f; }

        .btn-disable { background-color: #333; color: white; }
        .btn-disable:hover { background-color: #111; }

        .btn-enable { background-color: #777; color: white; }
        .btn-enable:hover { background-color: #555; }

        .btn-admin { background-color: #333; color: white; }
        .btn-admin:hover { background-color: #111; }

        .btn-revoke { background-color: #777; color: white; }
        .btn-revoke:hover { background-color: #555; }

        /* ログイン情報 */
        #user-info {
            text-align: right;
            font-weight: bold;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
<div class="layout">

    <!-- 左メニュー -->
    <div class="sidebar">
        <h2>管理メニュー</h2>

        <!-- メインメニューへ戻る -->
        <div class="menu-item" id="menu-back-main">
            <span>メインメニューへ戻る</span>
        </div>

        <!-- ダッシュボード -->
        <div class="menu-item" data-target="dashboard">
            <span>ダッシュボード</span>
        </div>

        <!-- 承認待ち（バッジ付き） -->
        <div class="menu-item" data-target="pending">
            <span>承認待ち</span>
            <span id="pending-badge" class="badge" style="display:none;">0</span>
        </div>

        <!-- ユーザー管理（初期表示） -->
        <div class="menu-item active" data-target="users">
            <span>ユーザー管理</span>
        </div>

        <!-- アカウント設定 -->
        <div class="menu-item" data-target="account">
            <span>アカウント設定</span>
        </div>

        <!-- ログアウト -->
        <div class="menu-item" id="logout-button">
            <span>ログアウト</span>
        </div>
    </div>

    <!-- 右側コンテンツ -->
    <div class="content">

        <p id="user-info"></p>

        <!-- ダッシュボード（初期は非表示） -->
        <div id="dashboard" class="section" style="display:none;">
            <h3>ダッシュボード</h3>
            <p>管理者パネルへようこそ。</p>
        </div>

        <!-- 承認待ち -->
        <div id="pending" class="section" style="display:none;">
            <h3>承認待ちユーザー</h3>
            <div id="pending-users-list">読み込み中...</div>
        </div>

        <!-- ユーザー管理（初期表示） -->
        <div id="users" class="section" style="display:block;">
            <h3>ユーザー管理</h3>
            <div id="existing-users-list">読み込み中...</div>
        </div>

        <!-- アカウント設定 -->
        <div id="account" class="section" style="display:none;">
            <h3>アカウント設定</h3>
            <button id="change-email-button">メールアドレス変更</button>
            <button id="change-password-button">パスワード変更</button>
        </div>

    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- 管理JS -->
<script src="account_management.js"></script>

<script>
    // 左メニュー切り替え
    document.querySelectorAll(".menu-item").forEach(item => {
        item.addEventListener("click", () => {
            const target = item.dataset.target;

            // メインメニューへ戻る
            if (item.id === "menu-back-main") {
                window.location.href = "toppage.html";
                return;
            }

            // ログアウトはここでは処理しない（account_management.js 側で処理）
            if (item.id === "logout-button") {
                return;
            }

            if (!target) return;

            document.querySelectorAll(".menu-item").forEach(i => i.classList.remove("active"));
            item.classList.add("active");

            document.querySelectorAll(".section").forEach(sec => sec.style.display = "none");
            const section = document.getElementById(target);
            if (section) section.style.display = "block";
        });
    });
</script>

</body>
</html>
