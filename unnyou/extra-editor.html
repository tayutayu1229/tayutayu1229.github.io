<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>臨時運用入力</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <h1>臨時運用入力</h1>

  <div class="editor-nav">
    <a href="index.html" class="nav-btn">運用一覧に戻る</a>
    <a href="duty-editor.html" class="nav-btn">所定運用編集へ</a>
  </div>

  <section id="editor">

    <div class="row">
      <label>施行日</label>
      <input id="date" type="date">
    </div>

    <div class="row">
      <label>区所名</label>
      <input id="depot" type="text" placeholder="例：仙台総合鉄道部">
    </div>

    <div class="row">
      <label>運用番号</label>
      <input id="duty-number" type="text" placeholder="例：臨A118">
      <button id="new-duty">新規</button>
    </div>

    <div class="row">
      <label>形式</label>
      <input id="vehicle-type" type="text" placeholder="例：EH500">
    </div>

    <h2>列車一覧</h2>

    <table id="train-table">
      <thead>
        <tr>
          <th>順</th>
          <th>列車番号</th>
          <th>出発</th>
          <th>到着</th>
          <th>備考</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="train-body"></tbody>
    </table>

    <button id="add-train">＋ 列車を追加</button>

    <h2>備考</h2>
    <textarea id="notes" rows="4"></textarea>

    <h2>後継承</h2>
    <textarea id="successor-text" rows="3"></textarea>

    <div class="row">
      <button id="save">保存</button>
      <span id="status"></span>
    </div>

  </section>

  <script type="module" src="./extra-editor.js"></script>
</body>
</html>
