<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>所定運用編集</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <h1>所定運用編集</h1>
    <div class="editor-nav">
  <a href="index.html" class="nav-btn">運用一覧に戻る</a>
  <a href="extra-editor.html" class="nav-btn">臨時運用入力へ</a>
</div>


  <section id="editor">

    <div class="row">
      <label>ダイヤ改正</label>
      <select id="diagram"></select>
    </div>

    <div class="row">
        <label>運用を選択</label>
        <select id="duty-select">
            <option value="">（新規作成）</option>
        </select>
    </div>


    <div class="row">
      <label>運用番号</label>
      <input id="duty-number" type="text" placeholder="例：A118">
      <button id="new-duty">新規</button>
    </div>

    <div class="row">
      <label>形式</label>
      <input id="vehicle-type" type="text" placeholder="例：EH500">
    </div>

    <h2>列車一覧</h2>

    <table id="train-table">
      <thead>
        <tr>
          <th>順</th>
          <th>列車番号</th>
          <th>出発</th>
          <th>到着</th>
          <th>備考</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="train-body"></tbody>
    </table>

    <button id="add-train">＋ 列車を追加</button>

    <h2>運用全体の備考</h2>
    <textarea id="notes" rows="4" placeholder="複数行の備考を入力できます"></textarea>

    <h2>後継承</h2>
    <textarea id="successor-text" rows="3" placeholder="例：翌々日 臨A3203 次ム5091へ"></textarea>

    <div class="row">
    <label>後継承運用</label>
      <select id="successor-duty-id">
        <option value="">（なし）</option>
      </select>
    </div>



    <div class="row">
      <label>後継運用リンク</label>
      <select id="successor-duty-link">
        <option value="">（なし）</option>
      </select>
    </div>

    <div class="row">
      <button id="save">保存</button>
      <span id="status"></span>
    </div>

  </section>

  <script type="module" src="./duty-editor.js"></script>
</body>
</html>
