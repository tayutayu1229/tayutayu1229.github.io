<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>運用検索ビューア</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <h1>運用検索ビューア</h1>
  <a href="../toppage.html" class="editor-link">トップページへ</a>
  <a href="duty-editor.html" class="editor-link">運用編集へ</a>

  <section id="search-area">

    <div class="row">
      <label>施行日</label>
      <input type="date" id="date">
    </div>

    <div class="row">
      <label>区所名</label>
      <select id="depot">
        <option value="">すべて</option>
      </select>
    </div>

    <div class="row">
      <label>運用番号</label>
      <input type="text" id="duty-number" placeholder="例：A118">
    </div>

    <div class="row">
      <label>列車番号</label>
      <input type="text" id="train-number" placeholder="例：4058">
    </div>

    <button id="search">検索</button>

    <div id="filter-status"></div>

  </section>

  <section id="result-area">
    <h2>検索結果</h2>
    <div id="result-list"></div>
  </section>

  <script type="module" src="./index.js"></script>

<!-- モーダル -->
<div id="modal" class="modal">
  <div class="modal-inner">
    <button id="modal-close" class="modal-close">×</button>
    <div id="modal-content"></div>
    <button id="modal-copy" class="modal-copy">コピー</button>
  </div>
</div>


</body>
</html>
