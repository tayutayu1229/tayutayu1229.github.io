<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>列車運転時刻表</title>
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- 全体レイアウト --- */
        body, html {
            margin: 0; padding: 0;
            background-color: #404040;
            font-family: 'BIZ UDPGothic', sans-serif;
        }

        /* --- スタフ本体 --- */
        #staff-area {
            width: 148mm;
            min-height: 400mm;
            background: #fff;
            margin: 20px auto;
            padding: 5mm 8mm;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            color: #000;
        }

        /* --- ヘッダー --- */
        .staff-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 2px;
            font-size: 11px;
            font-weight: bold;
        }
        .header-center { text-align: center; flex-grow: 1; }
        .shoko-name { font-size: 14px; letter-spacing: 2px; }

        /* --- 基本情報テーブル --- */
        .info-table {
            width: 100%;
            border-collapse: collapse;
            border: 2px solid #000;
            table-layout: fixed;
        }
        .info-table td {
            border: 1px solid #000;
            text-align: center;
            font-size: 10px;
            height: 14px;
        }
        .train-num-box {
            font-size: 32px !important;
            font-weight: 700;
            height: 48px !important;
        }

        /* --- メイン時刻表 --- */
        .main-timetable {
            width: 100%;
            border-collapse: collapse;
            border: 2px solid #000;
            border-top: none;
            table-layout: fixed;
        }
        .main-timetable th {
            border: 1px solid #000;
            font-size: 10px;
            font-weight: normal;
            height: 22px;
        }
        .main-timetable td {
            border: 1px solid #000;
            text-align: center;
            vertical-align: middle;
        }

        /* 列幅 */
        .col-jifun { width: 32px; }
        .col-station { width: auto; }
        .col-arr { width: 78px; }
        .col-dep { width: 78px; }
        .col-line { width: 42px; }
        .col-limit { width: 32px; }
        .col-memo { width: 50px; }

        /* 駅名装飾 */
        .st-name-text {
            font-weight: 700;
            text-align: left;
            padding-left: 8px;
            letter-spacing: 1px;
            white-space: nowrap;
            color: #000; /* 基本は黒 */
        }
        /* 通過駅は赤文字 */
        .st-passing { color: #ff0000 !important; }

        /* 時刻フォント */
        .time-main {
            font-size: 24px;
            font-weight: 700;
            font-family: sans-serif;
        }
        .time-sec {
            font-size: 13px;
            vertical-align: super;
            font-weight: 700;
        }
        .pass-arrow { color: #ff0000; font-size: 26px; font-weight: 900; }
        .stop-symbol { font-size: 24px; font-weight: 700; }

        /* 着発線 (青・斜体) */
        .track-num {
            color: #0000ff;
            font-size: 20px;
            font-weight: 700;
            font-style: italic;
        }

        .car-num-row { height: 40px; }
        .syosho-text { color: #ff0000; font-size: 14px; font-weight: 700; text-align: left; padding-left: 15px; }

        @media print {
            body, html { background: #fff; }
            #staff-area { margin: 0; padding: 5mm; box-shadow: none; width: 140mm; }
        }
    </style>
</head>
<body>
    <div id="staff-area">
        <div id="render-target"></div>
    </div>
    <script src="train_staff.js"></script>
</body>
</html>
