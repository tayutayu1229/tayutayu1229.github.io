<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>紙スタフ出力</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #3e4042; margin: 0; font-family: "MS UI Gothic", "Meiryo", sans-serif; }
        
        .toolbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 45px;
            background: #2d2d2d; display: flex; align-items: center; padding: 0 20px;
            z-index: 1000; box-sizing: border-box;
        }
        .toolbar button { margin-right: 10px; cursor: pointer; }

        .viewport {
            margin-top: 45px; padding: 20px;
            display: flex; justify-content: center;
        }

        /* スタフのサイズ（A3縦半分の比率に近い設定） */
        #staff-area {
            width: 145mm;
            min-height: 400mm;
            background: #fff;
            padding: 10mm;
            box-sizing: border-box;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            color: #000;
        }

        /* スタフ特有の格子レイアウト */
        .staff-table {
            width: 100%;
            border-collapse: collapse;
            border: 2px solid #000;
            table-layout: fixed;
        }
        .staff-table th, .staff-table td {
            border: 1px solid #000;
            text-align: center;
            height: 1.8em;
            font-weight: bold;
        }
        
        .header-info { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 12px; }
        .train-num-large { font-size: 28px; font-weight: bold; letter-spacing: 2px; }
        
        /* 矢印（↓）などの特殊記号用 */
        .symbol-red { color: red; font-size: 20px; }
        .time-sec { font-size: 0.6em; vertical-align: super; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .viewport { margin: 0; padding: 0; }
            #staff-area { box-shadow: none; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="toolbar no-print">
        <button onclick="location.href='train_list.html'">戻る</button>
        <button onclick="window.print()">印刷する</button>
    </div>

    <div class="viewport">
        <div id="staff-area">
            <div id="staff-content">
                </div>
        </div>
    </div>

    <script src="train_staff.js"></script>
</body>
</html>
