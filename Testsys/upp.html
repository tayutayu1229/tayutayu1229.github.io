<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【列車時刻表】</title>
    <style>
        :root {
            --paper: #ffffff;
            --screen-bg: #ececec;
            --header-fill: #AFCBEB;
            --line: #222222;
            --thin-line: 0.75px;
            --outer-line: 0.75px;
            --section-line: 0.75px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 18px 0 42px;
            background: var(--screen-bg);
            color: #000;
            font-family: "ＭＳ Ｐゴシック", "MS PGothic", "Yu Gothic", sans-serif;
            font-size: 16px;
            line-height: 1.12;
        }

        /* A4縦。参考画像に近い上・左右余白 */
        .page-container {
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 18mm 18mm 18mm;
            background: var(--paper);
            border: 1px solid #cfcfcf;
            box-shadow: 0 3px 16px rgba(0, 0, 0, .14);
        }

        .timetable-container {
            width: 100%;
            margin: 0;
            padding: 0;
            border: 0;
            background: #fff;
        }

        /* タイトル・作成日時・ページ番号 */
        .document-header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto 54px;
            align-items: end;
            column-gap: 16px;
            margin-bottom: 5px;
        }

        h2 {
            margin: 0 0 1px;
            padding: 0;
            border: 0;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: .015em;
            white-space: nowrap;
        }

        .header-meta {
            font-size: 12px;
            font-weight: 600;
            line-height: 1.42;
            white-space: nowrap;
        }

        .page-number {
            align-self: start;
            padding-top: 1px;
            text-align: center;
            font-size: 12px;
            white-space: nowrap;
        }

        .info-table,
        .main-table {
            width: 100%;
            border-collapse: collapse;
            border-spacing: 0;
            table-layout: fixed;
            margin: 0;
        }

        .info-table {
            margin-bottom: 7px;
            border: var(--thin-line) solid var(--line);
        }

        .main-table {
            border: var(--thin-line) solid var(--line);
        }

        .info-table th,
        .info-table td,
        .main-table th,
        .main-table td {
            border: var(--thin-line) solid var(--line);
            vertical-align: middle;
        }

        /* 基本情報表 */
        .info-table th {
            width: 25%;
            height: 20px;
            padding: 1px 7px;
            background: var(--header-fill);
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .04em;
            white-space: nowrap;
        }

        .info-table td {
            height: 20px;
            padding: 0 5px;
            text-align: left;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: .01em;
        }

        /* 時刻表見出し */
        .main-table thead th {
            height: 22px;
            padding: 1px 5px;
            background: var(--header-fill);
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .06em;
        }

        /* 本文 */
        .main-table tbody td {
            height: 22px;
            padding: 0 5px;
            font-size: 14px;
            font-weight: 500;
        }

        .main-table .line-name {
            width: 24%;
        }

        .main-table .station-name {
            width: 26%;
        }

        .main-table .time-col-combined {
            width: 25%;
        }

        /*
         * 線区セルはrowspanで結合。
         * 同一線区内では駅側だけに横線が入り、
         * 線区が変わる箇所では表全体を横断する境界線になる。
         */
        .main-table tbody .line-name {
            padding: 0 8px;
            vertical-align: middle;
            text-align: left;
            font-size: 13px;
            line-height: 1.2;
        }

        .main-table tbody .line-name span {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            height: 100%;
            min-height: 100%;
        }

        /*
         * 線区が共有駅で切り替わる場合、
         * 共有駅行の中央位置で線区欄だけを分割する。
         */
        .main-table tbody .line-name.boundary-mid {
            position: relative;
        }

        .main-table tbody .line-name.boundary-mid::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            top: var(--boundary-position, 50%);
            border-top: var(--thin-line) solid var(--line);
            pointer-events: none;
        }

        .main-table tbody .station-name {
            padding-left: 7px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }

        /* 線区切替位置を画像のように少し強い一本線で表示 */
        .main-table tbody tr.segment-start > td {
            border-top-width: var(--thin-line);
        }

        /* 着発線を着・発それぞれの時刻右側へ */
        .time-cell {
            padding-left: 5px !important;
            padding-right: 5px !important;
        }

        .time-cell-inner {
            position: relative;
            display: block;
            min-height: 19px;
            line-height: 19px;
        }

        .time-value {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            display: block;
            text-align: center;
            font-variant-numeric: tabular-nums;
            letter-spacing: .055em;
            white-space: nowrap;
        }

        .track-value {
            position: absolute;
            top: 0;
            right: 3px;
            min-width: 56px;
            text-align: right;
            font-size: .9em;
            line-height: 19px;
            white-space: nowrap;
        }

        .special-time .time-value {
            letter-spacing: .18em;
        }

        .error-row td {
            height: 52px;
            text-align: center;
            color: #b00020;
            font-size: 12px;
        }

        /* 小型設定メニュー */
        .settings-wrapper {
            position: fixed;
            top: 14px;
            right: 14px;
            z-index: 1000;
        }

        .settings-toggle {
            width: 38px;
            height: 38px;
            padding: 0;
            border: 1px solid #333;
            border-radius: 4px;
            background: #fff;
            color: #111;
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .15);
        }

        .settings-toggle:hover {
            background: #f2f2f2;
        }

        .settings-menu {
            position: absolute;
            top: 45px;
            right: 0;
            display: none;
            width: 176px;
            padding: 8px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #fff;
            box-shadow: 0 4px 14px rgba(0, 0, 0, .18);
        }

        .settings-wrapper.open .settings-menu {
            display: block;
        }

        .settings-menu button {
            display: block;
            width: 100%;
            min-height: 34px;
            margin: 0 0 7px;
            padding: 7px 10px;
            border: 1px solid #444;
            border-radius: 2px;
            background: #deddee;
            color: #111;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
        }

        .settings-menu button:last-child {
            margin-bottom: 0;
        }

        .settings-menu button:hover {
            background: var(--header-fill);
        }

        @media screen and (max-width: 900px) {
            body {
                padding: 12px;
                overflow-x: auto;
            }

            .page-container {
                margin: 0;
            }
        }

        @page {
            size: A4 portrait;
            margin: 0;
        }

        @media print {
            html,
            body {
                width: 210mm;
                min-height: 297mm;
                margin: 0;
                padding: 0;
                background: #fff;
            }

            .settings-wrapper {
                display: none !important;
            }

            .page-container {
                width: 210mm;
                min-height: 297mm;
                margin: 0;
                padding: 18mm 18mm 18mm;
                border: 0;
                box-shadow: none;
            }

            .info-table th,
            .main-table thead th {
                background: var(--header-fill) !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .info-table,
            .main-table,
            .info-table tr,
            .main-table tr {
                break-inside: avoid;
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>

    <div class="settings-wrapper" id="settings-wrapper">
        <button
            type="button"
            class="settings-toggle"
            id="settings-toggle"
            aria-label="出力設定を開く"
            aria-expanded="false"
        >⚙</button>

        <div class="settings-menu" id="settings-menu">
            <button id="export-excel-btn" type="button">Excelで出力</button>
            <button id="print-pdf-btn" type="button">印刷（PDF／紙）</button>
        </div>
    </div>

    <div class="page-container">
        <div class="timetable-container">

            <div class="document-header">
                <h2>【列車時刻表】</h2>

                <div class="header-meta">
                    作成日時：<span id="created-date"></span><br>
                    出力箇所：東京総合指令室
                </div>

                <div class="page-number">1 / 1</div>
            </div>

            <table class="info-table" id="info-table">
                <tbody>
                    <tr>
                        <th>列車番号</th>
                        <td id="train-number-val" colspan="4"></td>
                    </tr>
                    <tr>
                        <th>列車種別</th>
                        <td id="type-val" colspan="4"></td>
                    </tr>
                    <tr>
                        <th>速度種別</th>
                        <td id="speed-val" colspan="4"></td>
                    </tr>
                    <tr>
                        <th>列車名</th>
                        <td id="name-val" colspan="4"></td>
                    </tr>
                    <tr>
                        <th>始発～終着</th>
                        <td id="route-val" colspan="4"></td>
                    </tr>
                    <tr>
                        <th>旅客案内区間</th>
                        <td id="travel-section-val" colspan="4"></td>
                    </tr>
                    <tr>
                        <th>始発駅日付</th>
                        <td id="start-date-val" colspan="4"></td>
                    </tr>
                </tbody>
            </table>

            <table class="main-table" id="main-timetable">
                <thead>
                    <tr>
                        <th class="line-name">線区</th>
                        <th class="station-name">駅</th>
                        <th class="time-col-combined">着時刻</th>
                        <th class="time-col-combined">発時刻</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

        </div>
    </div>

    <script>
        const formatTime = (time) => {
            if (!time || time === '―') return '…';
            if (time === '||' || time === '…' || time === '=') return time;

            const parts = String(time).split(':');

            if (parts.length === 3) {
                return `${parts[0]}:${parts[1]} ${parts[2]}`;
            }

            if (parts.length === 2) {
                return `${parts[0]}:${parts[1]}`;
            }

            return String(time);
        };

        const createTimeCell = (row, time, track, showTrack) => {
            const cell = row.insertCell();
            cell.className = 'time-col-combined time-cell';

            const inner = document.createElement('div');
            inner.className = 'time-cell-inner';

            const timeValue = document.createElement('span');
            timeValue.className = 'time-value';
            timeValue.textContent = formatTime(time);

            if (['…', '||', '='].includes(timeValue.textContent)) {
                inner.classList.add('special-time');
            }

            const trackValue = document.createElement('span');
            trackValue.className = 'track-value';
            trackValue.textContent = showTrack && track ? track : '';

            inner.append(timeValue, trackValue);
            cell.appendChild(inner);
        };

        document.addEventListener('DOMContentLoaded', () => {
            const timetableBody = document.querySelector('#main-timetable tbody');
            const selectedDataString = sessionStorage.getItem('selectedTrainData');

            const settingsWrapper = document.getElementById('settings-wrapper');
            const settingsToggle = document.getElementById('settings-toggle');

            settingsToggle.addEventListener('click', (event) => {
                event.stopPropagation();
                const isOpen = settingsWrapper.classList.toggle('open');
                settingsToggle.setAttribute('aria-expanded', String(isOpen));
            });

            document.addEventListener('click', (event) => {
                if (!settingsWrapper.contains(event.target)) {
                    settingsWrapper.classList.remove('open');
                    settingsToggle.setAttribute('aria-expanded', 'false');
                }
            });

            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');

            document.getElementById('created-date').textContent =
                `${year}年${month}月${day}日 ${hours}時${minutes}分`;

            const showError = (message) => {
                timetableBody.innerHTML =
                    `<tr class="error-row"><td colspan="4">${message}</td></tr>`;
            };

            if (!selectedDataString) {
                showError('データがありません。列車選択画面からアクセスしてください。');
                return;
            }

            let allTrainData;

            try {
                allTrainData = JSON.parse(selectedDataString);
            } catch (error) {
                showError('データの解析に失敗しました。');
                return;
            }

            if (!Array.isArray(allTrainData) || allTrainData.length === 0) {
                showError('選択された列車データが空です。');
                return;
            }

            const targetTrainData = allTrainData[0];
            let trainType = targetTrainData.type || '';

            if (trainType === '選択なし') {
                trainType = '';
            }

            document.getElementById('train-number-val').textContent =
                targetTrainData.trainNumber || '';

            document.getElementById('type-val').textContent =
                trainType;

            document.getElementById('speed-val').textContent =
                targetTrainData.speed || '';

            document.getElementById('name-val').textContent =
                targetTrainData.name || '';

            document.getElementById('route-val').textContent =
                `${targetTrainData.origin || '...'} ～ ${targetTrainData.destination || '...'}`;

            document.getElementById('travel-section-val').textContent =
                `${targetTrainData.origin || '...'} ～ ${targetTrainData.destination || '...'}`;

            document.getElementById('start-date-val').textContent =
                targetTrainData.startDate || '';

            const allStops = [];
            let previousStationName = null;

            allTrainData.forEach((segment, segmentIndex) => {
                const stops = Array.isArray(segment.stops) ? segment.stops : [];

                stops.forEach((stop, stopIndex) => {
                    const isDuplicate =
                        segmentIndex > 0 &&
                        stopIndex === 0 &&
                        stop.station === previousStationName;

                    if (!isDuplicate) {
                        allStops.push({
                            line: segment.line,
                            segmentIndex,
                            ...stop
                        });
                    } else if (allStops.length > 0) {
                        /*
                         * 共有駅は前線区側に1回だけ残す。
                         * その駅行の中央で線区欄を分けるための印を付与。
                         */
                        allStops[allStops.length - 1].boundaryAfter = true;
                    }

                    previousStationName = stop.station;
                });
            });

            let i = 0;

            while (i < allStops.length) {
                const currentLine = allStops[i].line;
                const currentSegmentIndex = allStops[i].segmentIndex;
                let j = i;

                while (
                    j < allStops.length &&
                    allStops[j].line === currentLine &&
                    allStops[j].segmentIndex === currentSegmentIndex
                ) {
                    j++;
                }

                const rowSpan = j - i;

                for (let k = i; k < j; k++) {
                    const stop = allStops[k];
                    const row = timetableBody.insertRow();

                    if (k === i) {
                        const lineCell = row.insertCell();
                        lineCell.className = 'line-name';
                        lineCell.rowSpan = rowSpan;

                        const displayLineName = currentLine
                            ? (String(currentLine).endsWith('線')
                                ? String(currentLine)
                                : `${currentLine}線`)
                            : '...';

                        lineCell.innerHTML = `<span>${displayLineName}</span>`;

                        const segmentStops = allStops.slice(i, j);
                        const boundaryIndex = segmentStops.findIndex(
                            item => item.boundaryAfter
                        );

                        if (boundaryIndex >= 0) {
                            lineCell.classList.add('boundary-mid');

                            const boundaryPosition =
                                ((boundaryIndex + 0.5) / rowSpan) * 100;

                            lineCell.style.setProperty(
                                '--boundary-position',
                                `${boundaryPosition}%`
                            );
                        }
                    }

                    const stationCell = row.insertCell();
                    stationCell.className = 'station-name';
                    stationCell.textContent = stop.station || '...';

                    const hasArrival =
                        stop.arrival &&
                        stop.arrival !== '―';

                    const hasDeparture =
                        stop.departure &&
                        stop.departure !== '―';

                    /*
                     * 参考画像どおり、
                     * 着時刻の右にも発時刻の右にも着発線を表示する。
                     * 通過記号（…、||）の場合も番線を表示する。
                     * 完全に時刻データがない側だけ表示しない。
                     */
                    createTimeCell(
                        row,
                        stop.arrival,
                        stop.trackN || '',
                        hasArrival
                    );

                    createTimeCell(
                        row,
                        stop.departure,
                        stop.trackN || '',
                        hasDeparture
                    );
                }

                i = j;
            }

            document
                .getElementById('export-excel-btn')
                .addEventListener('click', () => {
                    let csvContent = 'data:text/csv;charset=utf-8,\uFEFF';

                    document
                        .querySelectorAll('#info-table tr')
                        .forEach((row) => {
                            const th = row.querySelector('th');
                            const td = row.querySelector('td');

                            if (th && td) {
                                const header = th.textContent
                                    .trim()
                                    .replace(/,/g, '、');

                                const data = td.textContent
                                    .trim()
                                    .replace(/,/g, '、');

                                csvContent += `${header},${data}\n`;
                            }
                        });

                    csvContent += '\n';
                    csvContent += ['線区', '駅', '着時刻', '発時刻', '着発線'].join(',') + '\n';

                    allStops.forEach((stop) => {
                        const rowData = [
                            stop.line || '...',
                            stop.station || '...',
                            formatTime(stop.arrival),
                            formatTime(stop.departure),
                            stop.trackN || '...'
                        ];

                        const sanitizedRowData = rowData.map((item) =>
                            String(item).trim().replace(/,/g, '、')
                        );

                        csvContent += sanitizedRowData.join(',') + '\n';
                    });

                    const encodedUri = encodeURI(csvContent);
                    const link = document.createElement('a');

                    link.setAttribute('href', encodedUri);
                    link.setAttribute(
                        'download',
                        `列車時刻表_${targetTrainData.trainNumber || '列車'}.csv`
                    );

                    document.body.appendChild(link);
                    link.click();
                    link.remove();

                    settingsWrapper.classList.remove('open');
                    settingsToggle.setAttribute('aria-expanded', 'false');
                });

            document
                .getElementById('print-pdf-btn')
                .addEventListener('click', () => {
                    settingsWrapper.classList.remove('open');
                    settingsToggle.setAttribute('aria-expanded', 'false');
                    window.print();
                });
        });
    </script>

</body>
</html>
