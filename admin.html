<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>支払い・予算管理ダッシュボード</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <!-- 管理者ログイン後に表示される領域 -->
  <div id="dashboard" class="hidden">

    <div class="flex min-h-screen">

      <!-- サイドバー -->
      <aside class="w-64 bg-white shadow-lg p-6 flex flex-col">
        <h2 class="text-xl font-bold mb-6">管理メニュー</h2>

        <nav class="space-y-3">
          <a class="block px-3 py-2 rounded hover:bg-gray-200 font-medium">ダッシュボード</a>
          <a class="block px-3 py-2 rounded hover:bg-gray-200 font-medium">予算管理</a>
          <a class="block px-3 py-2 rounded hover:bg-gray-200 font-medium">支出管理</a>
          <a class="block px-3 py-2 rounded hover:bg-gray-200 font-medium">支払い状況</a>
        </nav>

        <div class="mt-auto pt-6">
          <button id="logoutBtn" class="w-full px-3 py-2 bg-gray-200 rounded hover:bg-gray-300 text-center">
            ログアウト
          </button>
        </div>
      </aside>

      <!-- メイン -->
      <main class="flex-1 p-8">

        <div class="flex justify-between items-center mb-8">
          <h1 class="text-3xl font-bold">支払い・予算管理</h1>

          <div class="flex items-center space-x-3">
            <label class="font-semibold">年度</label>
            <select id="yearSelect" class="border p-2 rounded bg-white shadow-sm"></select>
          </div>
        </div>

        <!-- サマリー -->
        <div class="grid grid-cols-3 gap-6 mb-10">
          <div class="p-6 bg-white rounded shadow">
            <div class="text-gray-500 text-sm">徴収済み</div>
            <div class="text-3xl font-bold mt-1"><span id="totalIncome">0</span>円</div>
          </div>

          <div class="p-6 bg-white rounded shadow">
            <div class="text-gray-500 text-sm">支出合計</div>
            <div class="text-3xl font-bold mt-1"><span id="totalExpense">0</span>円</div>
          </div>

          <div class="p-6 bg-white rounded shadow">
            <div class="text-gray-500 text-sm">収支</div>
            <div class="text-3xl font-bold mt-1"><span id="balance">0</span>円</div>
          </div>
        </div>

        <!-- 支出一覧 -->
        <section class="mb-12">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold">支出一覧</h2>
            <button id="addExpense" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
              ＋ 支出項目を追加
            </button>
          </div>

          <div class="bg-white rounded shadow overflow-hidden">
            <table class="w-full border-collapse">
              <thead class="bg-gray-100">
                <tr>
                  <th class="border p-3 text-left">項目</th>
                  <th class="border p-3 text-left">金額</th>
                  <th class="border p-3 text-center">操作</th>
                </tr>
              </thead>
              <tbody id="expenseTable"></tbody>
            </table>
          </div>
        </section>

        <!-- 支払い状況 -->
        <section>
          <h2 class="text-2xl font-bold mb-4">利用者の支払い状況</h2>

          <div class="bg-white rounded shadow overflow-hidden">
            <table class="w-full border-collapse">
              <thead class="bg-gray-100">
                <tr>
                  <th class="border p-3">メール</th>
                  <th class="border p-3">ステータス</th>
                  <th class="border p-3">支払日</th>
                  <th class="border p-3">操作</th>
                  <th class="border p-3">領収書</th>
                </tr>
              </thead>
              <tbody id="userTable"></tbody>
            </table>
          </div>
        </section>

      </main>
    </div>

  </div>

  <!-- JS -->
  <script type="module" src="/js/firebase.js"></script>
  <script type="module" src="/js/auth.js"></script>
  <script type="module" src="/js/admin.js"></script>

</body>
</html>
