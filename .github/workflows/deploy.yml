name: Deploy to Server

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1. Cloudflare Tunnel を通すために cloudflared をインストール
      - name: Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      # 2. 標準 SSH コマンドを使用して実行
      - name: Execute Backup Script via SSH
        env:
          # GitHub Secrets から秘密鍵を読み込む
          PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          # 秘密鍵を一時ファイルとして作成し、権限を設定
          mkdir -p ~/.ssh
          echo "$PRIVATE_KEY" > ~/.ssh/id_ed25519_server
          chmod 600 ~/.ssh/id_ed25519_server

          # SSH を直接実行
          # -o StrictHostKeyChecking=no：初回接続時の確認をスキップ
          # -o ProxyCommand：cloudflared を経由させる
          ssh -i ~/.ssh/id_ed25519_server -o StrictHostKeyChecking=no \
            -o "ProxyCommand=cloudflared access ssh --hostname %h" \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "bash /mnt/hdd/github-backups/backup.sh"
