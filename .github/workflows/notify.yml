name: JR East website and Discord notification

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: jr-east-notification
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check and notify
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: >-
          python JREgyoumu/press/scraper.py
          --state JREgyoumu/press/data/state.json
          --items-cache JREgyoumu/press/data/items.json
          --output JREgyoumu/press
      - name: Save website and notification history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A JREgyoumu/press
          git diff --cached --quiet || git commit -m "Update notification history"
          git push origin main
