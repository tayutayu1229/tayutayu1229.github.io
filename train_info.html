<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>運行情報一覧 - 東京圏輸送情報システム</title>
<style>
    :root {
        --bg: #f3f3f3;
        --surface: #ffffff;
        --border: #e1e1e1;
        --border-strong: #c8c8c8;
        --text-primary: #1b1b1b;
        --text-secondary: #5f6368;
        --text-tertiary: #8a8a8a;
        --accent: #01977a;
        --accent-dark: #017a64;
        --accent-tint: #e6f5f2;
        --sidebar-width: 232px;

        --status-normal: #107c41;
        --status-normal-bg: #f0faf4;
        --status-delay: #c77700;
        --status-delay-bg: #fff8ec;
        --status-suspend: #d13438;
        --status-suspend-bg: #fdf2f2;
        --status-notice: #0078d4;
        --status-notice-bg: #f0f7fd;
    }

    * { box-sizing: border-box; }

    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: var(--bg);
        color: var(--text-primary);
        font-family: "Segoe UI", "Yu Gothic UI", "Meiryo", "Hiragino Kaku Gothic ProN", sans-serif;
        font-size: 14px;
        line-height: 1.55;
    }

    button, input, select {
        font-family: inherit;
        font-size: inherit;
    }

    #app-shell {
        display: flex;
        min-height: 100vh;
    }

    /* ===== サイドバー ===== */
    #sidebar {
        width: var(--sidebar-width);
        flex-shrink: 0;
        background-color: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
    }

    .sidebar-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 18px 16px;
        border-bottom: 1px solid var(--border);
    }

    .brand-mark {
        width: 36px;
        height: 36px;
        background-color: var(--accent);
        color: #fff;
        font-weight: 700;
        font-size: 0.85em;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }

    .brand-text {
        font-size: 0.8em;
        font-weight: 600;
        color: var(--text-primary);
        line-height: 1.3;
    }

    .sidebar-nav {
        display: flex;
        flex-direction: column;
        padding: 8px;
        gap: 2px;
    }

    .nav-item {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
        text-align: left;
        background: none;
        border: none;
        border-left: 3px solid transparent;
        padding: 10px 12px;
        margin: 0;
        color: var(--text-secondary);
        cursor: pointer;
        transition: background-color 0.12s ease, color 0.12s ease;
    }

    .nav-item svg { flex-shrink: 0; }

    .nav-item:hover {
        background-color: #f2f2f2;
        color: var(--text-primary);
    }

    .nav-item.active {
        background-color: var(--accent-tint);
        border-left-color: var(--accent);
        color: var(--accent-dark);
        font-weight: 600;
    }

    .sidebar-footer {
        margin-top: auto;
        padding: 14px 16px;
        font-size: 0.72em;
        color: var(--text-tertiary);
        border-top: 1px solid var(--border);
    }

    /* ===== モバイル用トップバー ===== */
    #mobile-topbar {
        display: none;
        align-items: center;
        gap: 12px;
        background-color: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 12px 14px;
        position: sticky;
        top: 0;
        z-index: 20;
    }

    #hamburger-btn {
        background: none;
        border: 1px solid var(--border-strong);
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--text-primary);
    }

    #mobile-topbar .mobile-title {
        font-weight: 700;
        font-size: 1em;
    }

    /* ===== メインエリア ===== */
    #content-area {
        flex: 1;
        min-width: 0;
        padding: 24px 28px 40px;
    }

    .page-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 16px;
    }

    .page-header h1 {
        margin: 0;
        font-size: 1.5em;
        font-weight: 700;
    }

    .live-status {
        display: flex;
        align-items: center;
        gap: 8px;
        background-color: var(--surface);
        border: 1px solid var(--border);
        padding: 6px 12px;
        font-size: 0.82em;
        color: var(--text-secondary);
        flex-wrap: wrap;
    }

    .status-dot {
        width: 9px;
        height: 9px;
        background-color: var(--text-tertiary);
        display: inline-block;
    }
    .status-dot.ok { background-color: var(--status-normal); }
    .status-dot.error { background-color: var(--status-suspend); }
    .status-dot.loading { background-color: #c77700; animation: pulse 1s infinite; }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.35; }
    }

    .live-status .sep { color: var(--border-strong); }

    #refresh-btn, #history-manage-btn {
        background-color: var(--surface);
        border: 1px solid var(--border-strong);
        color: var(--text-primary);
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        padding: 0;
    }
    #refresh-btn:hover, #history-manage-btn:hover { background-color: #f2f2f2; }
    #refresh-btn.spinning svg { animation: spin 0.7s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ===== ツールバー ===== */
    .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        background-color: var(--surface);
        border: 1px solid var(--border);
        padding: 12px;
        margin-bottom: 14px;
    }

    .search-box {
        display: flex;
        align-items: center;
        border: 1px solid var(--border-strong);
        background-color: #fafafa;
        padding: 0 8px;
        min-width: 200px;
        flex: 1 1 200px;
    }
    .search-box svg { flex-shrink: 0; color: var(--text-tertiary); }
    .search-box input {
        border: none;
        background: none;
        outline: none;
        padding: 7px 6px;
        width: 100%;
        color: var(--text-primary);
    }

    .filter-chips {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
    }

    .chip {
        border: 1px solid var(--border-strong);
        background-color: var(--surface);
        color: var(--text-secondary);
        padding: 6px 12px;
        cursor: pointer;
        font-size: 0.85em;
        white-space: nowrap;
    }
    .chip:hover { background-color: #f2f2f2; }
    .chip.active {
        background-color: var(--accent);
        border-color: var(--accent);
        color: #fff;
        font-weight: 600;
    }

    .toolbar-right {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-left: auto;
        flex-wrap: wrap;
        font-size: 0.85em;
        color: var(--text-secondary);
    }

    select {
        border: 1px solid var(--border-strong);
        background-color: var(--surface);
        color: var(--text-primary);
        padding: 6px 8px;
    }

    .checkbox-label {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        user-select: none;
    }

    /* ===== 統計バー ===== */
    .stats-bar {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 16px;
    }

    .stat-card {
        background-color: var(--surface);
        border: 1px solid var(--border);
        border-left: 4px solid var(--border-strong);
        padding: 10px 14px;
    }
    .stat-card .stat-num {
        font-size: 1.6em;
        font-weight: 700;
        line-height: 1.1;
    }
    .stat-card .stat-label {
        font-size: 0.78em;
        color: var(--text-secondary);
        margin-top: 2px;
    }
    .stat-card.normal { border-left-color: var(--status-normal); }
    .stat-card.normal .stat-num { color: var(--status-normal); }
    .stat-card.delay { border-left-color: var(--status-delay); }
    .stat-card.delay .stat-num { color: var(--status-delay); }
    .stat-card.suspend { border-left-color: var(--status-suspend); }
    .stat-card.suspend .stat-num { color: var(--status-suspend); }

    /* ===== エラーバナー ===== */
    .error-banner {
        background-color: var(--status-suspend-bg);
        border: 1px solid var(--status-suspend);
        color: #7a1518;
        padding: 10px 14px;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-size: 0.88em;
    }
    .error-banner button {
        background-color: var(--status-suspend);
        color: #fff;
        border: none;
        padding: 6px 12px;
        cursor: pointer;
        flex-shrink: 0;
    }

    /* ===== 運行情報カード ===== */
    .train-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .train-card {
        background-color: var(--surface);
        border: 1px solid var(--border);
        border-left: 5px solid var(--border-strong);
        padding: 14px 16px;
    }

    .train-card.status-normal { border-left-color: var(--status-normal); }
    .train-card.status-delay { border-left-color: var(--status-delay); background-color: var(--status-delay-bg); }
    .train-card.status-suspend { border-left-color: var(--status-suspend); background-color: var(--status-suspend-bg); }
    .train-card.status-notice { border-left-color: var(--status-notice); background-color: var(--status-notice-bg); }

    .railway-title {
        font-weight: 700;
        font-size: 1.1em;
        margin: 0 0 8px 0;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    .status-badge {
        font-size: 0.62em;
        padding: 3px 10px;
        color: #fff;
        font-weight: 700;
        letter-spacing: 0.02em;
    }
    .status-normal .status-badge { background-color: var(--status-normal); }
    .status-delay .status-badge { background-color: var(--status-delay); }
    .status-suspend .status-badge { background-color: var(--status-suspend); }
    .status-notice .status-badge { background-color: var(--status-notice); }

    .train-meta {
        font-size: 0.82em;
        color: var(--text-secondary);
        margin: 0 0 6px 0;
    }

    .train-text {
        font-weight: 600;
        margin: 4px 0 0 0;
        color: var(--text-primary);
    }

    /* ===== 履歴 ===== */
    .history-section {
        margin-top: 10px;
        border-top: 1px dashed var(--border-strong);
        padding-top: 8px;
    }
    .history-toggle {
        font-size: 0.82em;
        color: var(--accent-dark);
        cursor: pointer;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 4px;
    }
    .history-list {
        display: none;
        margin: 10px 0 0 0;
        padding: 0 0 0 6px;
        list-style: none;
    }
    .history-item {
        position: relative;
        padding: 0 0 12px 18px;
        border-left: 2px solid var(--border-strong);
        font-size: 0.85em;
    }
    .history-item::before {
        content: "";
        position: absolute;
        left: -5px;
        top: 3px;
        width: 8px;
        height: 8px;
        background-color: var(--text-tertiary);
    }
    .history-item:last-child { border-left-color: transparent; padding-bottom: 0; }
    .history-time {
        font-weight: 700;
        color: var(--text-primary);
        background: #ececec;
        padding: 1px 6px;
        margin-right: 6px;
    }
    .history-status {
        font-weight: 700;
        color: var(--status-suspend);
    }
    .history-text { color: var(--text-secondary); }

    .empty-msg {
        text-align: center;
        color: var(--text-secondary);
        background-color: var(--surface);
        border: 1px solid var(--border);
        padding: 30px;
    }

    /* ===== モーダル(履歴管理) ===== */
    .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background-color: rgba(0,0,0,0.35);
        align-items: center;
        justify-content: center;
        z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
        background-color: var(--surface);
        border: 1px solid var(--border-strong);
        width: 90%;
        max-width: 440px;
        padding: 20px;
    }
    .modal-box h2 {
        margin: 0 0 12px 0;
        font-size: 1.1em;
    }
    .modal-note {
        background-color: var(--status-notice-bg);
        border: 1px solid var(--status-notice);
        color: #10425f;
        padding: 10px 12px;
        font-size: 0.85em;
        margin-bottom: 14px;
    }
    .modal-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }
    .modal-actions button {
        border: 1px solid var(--border-strong);
        background-color: var(--surface);
        padding: 8px 14px;
        cursor: pointer;
        font-size: 0.88em;
    }
    .modal-actions button:hover { background-color: #f2f2f2; }
    .modal-actions .danger { border-color: var(--status-suspend); color: var(--status-suspend); }
    .modal-actions .danger:hover { background-color: var(--status-suspend-bg); }
    .modal-close {
        margin-top: 16px;
        text-align: right;
    }
    .modal-close button {
        background-color: var(--accent);
        color: #fff;
        border: none;
        padding: 8px 16px;
        cursor: pointer;
    }
    .modal-close button:hover { background-color: var(--accent-dark); }

    footer {
        text-align: center;
        margin-top: 24px;
        color: var(--text-tertiary);
        font-size: 0.78em;
    }

    /* ===== レスポンシブ ===== */
    @media (max-width: 900px) {
        #sidebar { display: none; }
        #sidebar.open {
            display: flex;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 30;
            box-shadow: 2px 0 8px rgba(0,0,0,0.15);
        }
        #mobile-topbar { display: flex; }
        #content-area { padding: 16px; }
        .stats-bar { grid-template-columns: repeat(2, 1fr); }
        .toolbar-right { margin-left: 0; width: 100%; justify-content: space-between; }
    }

    @media (max-width: 480px) {
        .page-header h1 { font-size: 1.25em; }
        .live-status { font-size: 0.75em; }
    }
</style>
</head>
<body>
<div id="main-content" style="display: none;">

    <div id="sidebar-backdrop" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.25); z-index:29;" onclick="closeSidebar()"></div>

    <div id="mobile-topbar">
        <button id="hamburger-btn" onclick="toggleSidebar()" aria-label="メニュー">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M2 5h16M2 10h16M2 15h16" stroke="currentColor" stroke-width="1.6"/></svg>
        </button>
        <span class="mobile-title">運行情報一覧</span>
    </div>

    <div id="app-shell">
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="brand-mark">東</div>
                <div class="brand-text">東京圏輸送<br>情報システム</div>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item" onclick="window.location.href='toppage.html'">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M3 9.5 10 3l7 6.5M5 8.5V17h10V8.5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
                    メインメニュー
                </button>
                <button class="nav-item active" onclick="void(0)">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="10" stroke="currentColor" stroke-width="1.5"/><path d="M6 17h8M10 14v3" stroke="currentColor" stroke-width="1.5"/></svg>
                    運行情報1
                </button>
                <button class="nav-item" onclick="window.location.href='railinfo.html'">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="10" stroke="currentColor" stroke-width="1.5"/><path d="M6 17h8M10 14v3" stroke="currentColor" stroke-width="1.5"/></svg>
                    運行情報2
                </button>
                <button class="nav-item" onclick="window.location.href='zaisen-JRE.html'">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M10 6v4l3 2" stroke="currentColor" stroke-width="1.5"/></svg>
                    駅列車在線モニタ
                </button>
            </nav>
            <div class="sidebar-footer">&copy; 東京圏輸送情報システム</div>
        </aside>

        <main id="content-area">
            <div class="page-header">
                <h1>運行情報一覧</h1>
                <div class="live-status">
                    <span class="status-dot" id="conn-dot"></span>
                    <span id="conn-text">接続中...</span>
                    <span class="sep">|</span>
                    <span id="update-timestamp">取得中...</span>
                    <span class="sep">|</span>
                    <span id="next-refresh">次回更新: --</span>
                    <button id="refresh-btn" title="今すぐ更新" onclick="manualRefresh()">
                        <svg width="15" height="15" viewBox="0 0 20 20" fill="none"><path d="M4 10a6 6 0 0 1 10.2-4.2M16 10a6 6 0 0 1-10.2 4.2M14 3v3h-3M6 17v-3h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                    <button id="history-manage-btn" title="履歴の管理" onclick="openHistoryModal()">
                        <svg width="15" height="15" viewBox="0 0 20 20" fill="none"><path d="M10 5v5l3 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M4 6a6 6 0 1 1-1 6" stroke="currentColor" stroke-width="1.5"/><path d="M2 4v3h3" stroke="currentColor" stroke-width="1.5"/></svg>
                    </button>
                </div>
            </div>

            <div class="toolbar">
                <div class="search-box">
                    <svg width="15" height="15" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M17 17l-4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    <input type="text" id="search-input" placeholder="路線名で検索..." oninput="renderInfo()">
                </div>
                <div class="filter-chips" id="filter-chips">
                    <button class="chip active" data-filter="all" onclick="setFilter('all')">すべて</button>
                    <button class="chip" data-filter="normal" onclick="setFilter('normal')">平常運転</button>
                    <button class="chip" data-filter="delay" onclick="setFilter('delay')">遅延</button>
                    <button class="chip" data-filter="suspend" onclick="setFilter('suspend')">運休・見合わせ</button>
                    <button class="chip" data-filter="notice" onclick="setFilter('notice')">その他</button>
                </div>
                <div class="toolbar-right">
                    <label class="checkbox-label"><input type="checkbox" id="auto-refresh-toggle" checked onchange="toggleAutoRefresh()"> 自動更新</label>
                    <select id="interval-select" onchange="changeInterval()">
                        <option value="30000">30秒間隔</option>
                        <option value="60000">60秒間隔</option>
                        <option value="120000">2分間隔</option>
                    </select>
                    <select id="sort-select" onchange="renderInfo()">
                        <option value="status">状態順</option>
                        <option value="name">路線名順</option>
                    </select>
                </div>
            </div>

            <div class="stats-bar" id="stats-bar"></div>

            <div class="error-banner" id="error-banner">
                <span id="error-text"></span>
                <button onclick="manualRefresh()">再試行</button>
            </div>

            <div id="train-info" class="train-list"></div>

            <footer>&copy; 東京圏輸送情報システム</footer>
        </main>
    </div>

    <!-- 履歴管理モーダル -->
    <div class="modal-overlay" id="history-modal">
        <div class="modal-box">
            <h2>履歴データの管理</h2>
            <div class="modal-note">
                この履歴はご利用のブラウザ内（localStorage）にのみ保存されています。他の端末やブラウザとは共有されず、ブラウザのデータを消去すると失われます。
            </div>
            <div class="modal-actions">
                <button onclick="exportHistory()">JSON形式でエクスポート</button>
                <button class="danger" onclick="clearHistory()">履歴をすべて削除</button>
                <label class="checkbox-label" style="margin-left:auto;">
                    <input type="checkbox" id="notify-toggle" onchange="toggleNotify()"> 変化時に通知
                </label>
            </div>
            <div class="modal-close">
                <button onclick="closeHistoryModal()">閉じる</button>
            </div>
        </div>
    </div>

    <script>
        // 路線名マッピング
        const railwayMap = {
            "JR-East.Chuo": "中央本線", "JR-East.Senzan": "仙山線", "JR-East.Yonesaka": "米坂線", "JR-East.Hanawa": "花輪線",
            "JR-East.Tsugaru": "津軽線", "JR-East.Ou": "奥羽本線", "JR-East.OuYamagata": "奥羽本線（山形線）", "JR-East.RikuEast": "陸羽東線",
            "JR-East.Tohoku": "東北本線", "JR-East.Uetsu": "羽越線", "JR-East.RikuWest": "陸羽西線", "JR-East.Iiyama": "飯山線",
            "JR-East.Yamanote": "山手線", "JR-East.KeihinTohokuNegishi": "京浜東北根岸線", "JR-East.ChuoRapid": "中央急行線",
            "JR-East.ChuoTatsunoBranch": "中央本線（辰野方面）", "JR-East.ChuoSobuLocal": "中央緩行線", "JR-East.SobuRapid": "総武快速線",
            "JR-East.Yokosuka": "横須賀線", "JR-East.Tokaido": "東海道線", "JR-East.ShonanShinjuku": "湘南新宿ライン",
            "JR-East.SotetsuDirect": "相鉄直通線", "JR-East.SaikyoKawagoe": "埼京川越線", "JR-East.Kawagoe": "川越線",
            "JR-East.Takasaki": "高崎線", "JR-East.Utsunomiya": "宇都宮線", "JR-East.Nikko": "日光線", "JR-East.Karasuyama": "烏山線",
            "JR-East.JobanRapid": "常磐快速線", "JR-East.Joban": "常磐線", "JR-East.JobanLocal": "常磐緩行線", "JR-East.Musashino": "武蔵野線",
            "JR-East.Sagami": "相模線", "JR-East.Nambu": "南武線", "JR-East.NambuBranch": "南武支線", "JR-East.Tsurumi": "鶴見線",
            "JR-East.TsurumiUmiShibauraBranch": "鶴見線（海芝浦方面）", "JR-East.TsurumiOkawaBranch": "鶴見線（大川方面）",
            "JR-East.Yokohama": "横浜線", "JR-East.Ito": "伊東線", "JR-East.Ome": "青梅線", "JR-East.Itsukaichi": "五日市線",

            "JR-East.NaritaAirportBranch": "成田線（空港支線）", "JR-East.Kashima": "鹿島線", "JR-East.Keiyo": "京葉線",
            "JR-East.Uchibo": "内房線", "JR-East.Sotobo": "外房線", "JR-East.Togane": "東金線", "JR-East.Kururi": "久留里線",
            "JR-East.Koumi": "小海線", "JR-East.TohokuShinkansen": "東北新幹線", "JR-East.JoetsuShinkansen": "上越新幹線",
            "JR-East.HokurikuShinkansen": "北陸新幹線", "JR-East.YamagataShinkansen": "山形新幹線", "JR-East.AkitaShinkansen": "秋田新幹線",
            "JR-East.BanetsuEast": "磐越東線", "JR-East.Senseki": "仙石線", "JR-East.Ishinomaki": "石巻線", "JR-East.Aterazawa": "左沢線",
            "JR-East.Ofunato": "大船渡線", "JR-East.Kesennuma": "気仙沼線", "JR-East.Kitakami": "北上線", "JR-East.Kamaishi": "釜石線",
            "JR-East.Yamada": "山田線", "JR-East.Hachinohe": "八戸線", "JR-East.Ominato": "大湊線", "JR-East.Tazawako": "田沢湖線",
            "JR-East.Oga": "男鹿線", "JR-East.Gono": "五能線", "JR-East.Tadami": "只見線", "JR-East.BanetsuWest": "磐越西線",
            "JR-East.SensekiTohoku": "仙石東北ライン", "JR-East.Echigo": "越後線", "JR-East.Hakushin": "白新線",
            "JR-East.Yahiko": "弥彦線", "JR-East.Shinonoi": "篠ノ井線", "JR-East.Oito": "大糸線"
        };

        const HISTORY_KEY = 'train_history_content_based';

        let cachedData = [];
        let currentFilter = 'all';
        let autoRefreshTimer = null;
        let countdownTimer = null;
        let refreshIntervalMs = 30000;
        let secondsToNext = 30;
        let isFetching = false;
        let consecutiveErrors = 0;
        let notifyEnabled = false;
        let notifiedKeys = new Set();

        /* ---------- サイドバー(モバイル) ---------- */
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const bd = document.getElementById('sidebar-backdrop');
            const open = sb.classList.toggle('open');
            bd.style.display = open ? 'block' : 'none';
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebar-backdrop').style.display = 'none';
        }

        /* ---------- フィルタ / 並び替え ---------- */
        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.chip').forEach(c => {
                c.classList.toggle('active', c.dataset.filter === filter);
            });
            renderInfo();
        }

        function statusToClass(status) {
            if (status === '平常運転') return 'normal';
            if (status.includes('遅延') || status.includes('再開')) return 'delay';
            if (status.includes('見合わせ') || status.includes('運休')) return 'suspend';
            return 'notice';
        }

        /* ---------- 履歴保存 ---------- */
        function saveHistory(data) {
            let store = JSON.parse(localStorage.getItem(HISTORY_KEY) || '{}');
            let updated = false;
            let changedEntries = [];

            data.forEach(item => {
                const id = item["odpt:railway"];
                const text = item["odpt:trainInformationText"]?.ja;
                const date = item["dc:date"];
                const status = item["odpt:trainInformationStatus"]?.ja || "平常運転";

                if (!store[id]) store[id] = [];
                const last = store[id][0];

                if (text && (!last || last.text !== text)) {
                    store[id].unshift({ date, text, status });
                    if (store[id].length > 10) store[id].pop();
                    updated = true;
                    if (last) changedEntries.push({ id, text, status });
                }
            });

            if (updated) localStorage.setItem(HISTORY_KEY, JSON.stringify(store));
            if (notifyEnabled) maybeNotify(changedEntries);
            return store;
        }

        function maybeNotify(changedEntries) {
            if (!('Notification' in window) || Notification.permission !== 'granted') return;
            changedEntries.forEach(entry => {
                if (entry.status === '平常運転') return;
                const key = entry.id + entry.text;
                if (notifiedKeys.has(key)) return;
                notifiedKeys.add(key);
                const name = railwayMap[entry.id.replace("odpt.Railway:", "")] || entry.id;
                new Notification(`【${entry.status}】${name}`, { body: entry.text });
            });
        }

        /* ---------- データ取得 ---------- */
        function setConnState(state, text) {
            const dot = document.getElementById('conn-dot');
            dot.className = 'status-dot ' + state;
            document.getElementById('conn-text').innerText = text;
        }

        function fetchInfo() {
            if (isFetching) return;
            isFetching = true;
            setConnState('loading', '取得中...');
            document.getElementById('refresh-btn').classList.add('spinning');

            const token = "26d1y7j8fkzdabx6iuxby79nqu8tdz8h6mmu05apwseyvg8h9uvymkl5y9ikpo9o";
            const url = `https://api-challenge.odpt.org/api/v4/odpt:TrainInformation?odpt:operator=odpt.Operator:jre-is&acl:consumerKey=${token}`;

            fetch(url)
                .then(r => {
                    if (!r.ok) throw new Error('HTTPステータス ' + r.status);
                    return r.json();
                })
                .then(data => {
                    if (!Array.isArray(data)) throw new Error('不正な応答形式です');
                    cachedData = data;
                    consecutiveErrors = 0;
                    saveHistory(data);
                    setConnState('ok', '接続中');
                    hideError();
                    renderInfo();
                })
                .catch(e => {
                    consecutiveErrors++;
                    setConnState('error', '取得エラー');
                    showError(`データの取得に失敗しました（${e.message}）。前回取得したデータを表示しています。連続失敗: ${consecutiveErrors}回`);
                    console.error("Fetch Error:", e);
                })
                .finally(() => {
                    isFetching = false;
                    document.getElementById('refresh-btn').classList.remove('spinning');
                    resetCountdown();
                });
        }

        function manualRefresh() {
            fetchInfo();
        }

        function showError(msg) {
            document.getElementById('error-text').innerText = msg;
            document.getElementById('error-banner').style.display = 'flex';
        }
        function hideError() {
            document.getElementById('error-banner').style.display = 'none';
        }

        /* ---------- 自動更新 / カウントダウン ---------- */
        function toggleAutoRefresh() {
            const on = document.getElementById('auto-refresh-toggle').checked;
            if (on) {
                resetCountdown();
            } else {
                clearInterval(countdownTimer);
                document.getElementById('next-refresh').innerText = '自動更新: 停止中';
            }
        }

        function changeInterval() {
            refreshIntervalMs = parseInt(document.getElementById('interval-select').value, 10);
            resetCountdown();
        }

        function resetCountdown() {
            clearInterval(countdownTimer);
            if (!document.getElementById('auto-refresh-toggle').checked) return;
            secondsToNext = Math.round(refreshIntervalMs / 1000);
            updateCountdownText();
            countdownTimer = setInterval(() => {
                secondsToNext--;
                if (secondsToNext <= 0) {
                    fetchInfo();
                    return;
                }
                updateCountdownText();
            }, 1000);
        }

        function updateCountdownText() {
            document.getElementById('next-refresh').innerText = `次回更新: ${secondsToNext}秒後`;
        }

        /* ---------- 通知 ---------- */
        function toggleNotify() {
            const checked = document.getElementById('notify-toggle').checked;
            if (checked && 'Notification' in window) {
                Notification.requestPermission().then(perm => {
                    notifyEnabled = perm === 'granted';
                    document.getElementById('notify-toggle').checked = notifyEnabled;
                });
            } else {
                notifyEnabled = false;
            }
        }

        /* ---------- 履歴モーダル ---------- */
        function openHistoryModal() {
            document.getElementById('history-modal').classList.add('open');
        }
        function closeHistoryModal() {
            document.getElementById('history-modal').classList.remove('open');
        }
        function exportHistory() {
            const store = localStorage.getItem(HISTORY_KEY) || '{}';
            const blob = new Blob([store], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `train_history_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(a.href);
        }
        function clearHistory() {
            if (!confirm('この端末に保存された運行情報の履歴をすべて削除します。よろしいですか？')) return;
            localStorage.removeItem(HISTORY_KEY);
            renderInfo();
            closeHistoryModal();
        }

        /* ---------- 描画 ---------- */
        function renderInfo() {
            const container = document.getElementById('train-info');
            const historyStore = JSON.parse(localStorage.getItem(HISTORY_KEY) || '{}');
            const keyword = (document.getElementById('search-input').value || '').trim();
            const sortMode = document.getElementById('sort-select').value;

            if (cachedData.length > 0) {
                const d = new Date(cachedData[0]["dc:date"]);
                document.getElementById('update-timestamp').innerText = "データ更新: " + d.toLocaleTimeString();
            }

            // 統計
            const counts = { normal: 0, delay: 0, suspend: 0, notice: 0 };
            cachedData.forEach(info => {
                const status = info["odpt:trainInformationStatus"]?.ja || "平常運転";
                counts[statusToClass(status)]++;
            });
            document.getElementById('stats-bar').innerHTML = `
                <div class="stat-card"><div class="stat-num">${cachedData.length}</div><div class="stat-label">対象路線数</div></div>
                <div class="stat-card normal"><div class="stat-num">${counts.normal}</div><div class="stat-label">平常運転</div></div>
                <div class="stat-card delay"><div class="stat-num">${counts.delay}</div><div class="stat-label">遅延</div></div>
                <div class="stat-card suspend"><div class="stat-num">${counts.suspend + counts.notice}</div><div class="stat-label">運休・見合わせ等</div></div>
            `;

            let list = [...cachedData];

            // フィルタ(状態)
            if (currentFilter !== 'all') {
                list = list.filter(info => {
                    const status = info["odpt:trainInformationStatus"]?.ja || "平常運転";
                    return statusToClass(status) === currentFilter;
                });
            }

            // 検索
            if (keyword) {
                list = list.filter(info => {
                    const rId = info["odpt:railway"];
                    const name = railwayMap[rId.replace("odpt.Railway:", "")] || rId;
                    return name.includes(keyword);
                });
            }

            // 並び替え
            if (sortMode === 'name') {
                list.sort((a, b) => {
                    const nameA = railwayMap[a["odpt:railway"].replace("odpt.Railway:", "")] || a["odpt:railway"];
                    const nameB = railwayMap[b["odpt:railway"].replace("odpt.Railway:", "")] || b["odpt:railway"];
                    return nameA.localeCompare(nameB, 'ja');
                });
            } else {
                const priority = { '運転見合わせ': 1, '一部運休': 1, '運転再開見込': 1, '遅延': 2, '平常運転': 3 };
                list.sort((a, b) => {
                    return (priority[a["odpt:trainInformationStatus"]?.ja] || 99) - (priority[b["odpt:trainInformationStatus"]?.ja] || 99);
                });
            }

            let html = '';
            list.forEach((info, idx) => {
                const status = info["odpt:trainInformationStatus"]?.ja || "平常運転";
                const rId = info["odpt:railway"];
                const name = railwayMap[rId.replace("odpt.Railway:", "")] || rId;
                const text = info["odpt:trainInformationText"]?.ja || "平常通り運転しています。";
                const cls = 'status-' + statusToClass(status);

                const history = historyStore[rId] || [];
                const past = history.filter(h => h.date !== info["dc:date"]);

                html += `
                <div class="train-card ${cls}">
                    <div class="railway-title">${name} <span class="status-badge">${status}</span></div>
                    <p class="train-meta">事由: ${info["odpt:trainInformationCause"]?.ja || "---"} / 区間: ${info["odpt:trainInformationRange"]?.ja || "---"}</p>
                    <p class="train-text">${text}</p>
                    ${past.length > 0 ? `
                    <div class="history-section">
                        <span class="history-toggle" onclick="const el=document.getElementById('hlist-${idx}'); el.style.display = (el.style.display === 'block' ? 'none' : 'block')">
                            ▼ 内容が変更された過去の履歴（この端末のみ・${past.length}件）
                        </span>
                        <ul class="history-list" id="hlist-${idx}">
                            ${past.map(p => `
                                <li class="history-item">
                                    <span class="history-time">${new Date(p.date).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                    <span class="history-status">[${p.status}]</span><br>
                                    <span class="history-text">${p.text}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>` : ''}
                </div>`;
            });
            container.innerHTML = html || "<div class='empty-msg'>条件に一致する運行情報はありません。</div>";
        }

        /* ---------- キーボードショートカット ---------- */
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' && !e.ctrlKey && !e.metaKey) {
                const active = document.activeElement;
                if (active && (active.tagName === 'INPUT' || active.tagName === 'SELECT')) return;
                manualRefresh();
            }
        });

        window.onload = () => {
            fetchInfo();
        };
    </script>
