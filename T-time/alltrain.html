<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>登録列車一覧</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #999; padding: 8px; text-align: left; }
    th { background-color: #01977a; color: white; }
    .back-button {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 16px;
      background-color: #01977a;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
    .back-button:hover {
      background-color: #017a63;
    }
  </style>
</head>
<body>
<h2>登録列車一覧</h2>
<a href="T-time.html" class="back-button">← 前のページに戻る</a>
<table>
  <thead>
    <tr>
      <th>線区</th>
      <th>列車番号</th>
      <th>種別</th>
      <th>日付</th>
      <th>平日/土休日</th>
      <th>始発駅〜終着駅</th>
      <th>列車名</th>
    </tr>
  </thead>
  <tbody id="trainTable"></tbody>
</table>

<script src="private-data-client.js"></script>
<script>
  TayunetPrivateData.fetchTimetables()
    .then(data => {
      const tbody = document.getElementById("trainTable");
      data.forEach(d => {
        const tr = document.createElement("tr");
        [
          d.line,
          d.trainNumber,
          d.type,
          d.startDate,
          d.dayType,
          `${d.origin || ""}〜${d.destination || ""}`,
          d.name
        ].forEach(value => {
          const td = document.createElement("td");
          td.textContent = value == null ? "" : String(value);
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    })
    .catch(err => {
      const tbody = document.getElementById("trainTable");
      const tr = document.createElement("tr");
      const td = document.createElement("td");
      td.colSpan = 7;
      td.textContent = `データの読み込みに失敗しました: ${err.message}`;
      tr.appendChild(td);
      tbody.replaceChildren(tr);
    });

</script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="../auth_guard.js"></script>
</body>
</html>
