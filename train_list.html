<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>列車一覧</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #fff;
      color: #000;
      font-family: 'BIZ UDPGothic', sans-serif;
    }

    header {
      padding: 20px;
      border-bottom: 3px solid #000;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
    }

    .search-area {
      margin-top: 15px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .label-mini {
      font-size: 11px;
      font-weight: bold;
      color: #555;
    }

    input {
      padding: 8px;
      font-size: 16px;
      border: 1px solid #aaa;
      border-radius: 4px;
    }

    /* 施行日上書き用：少し目立つように */
    #execution-date {
      background: #fffdf0;
      border: 1px solid #d4a017;
      width: 140px;
    }

    button {
      padding: 8px 14px;
      font-size: 16px;
      border: 1px solid #000;
      background: #f0f0f0;
      cursor: pointer;
      border-radius: 4px;
      align-self: flex-end; /* 下揃え */
    }

    button:hover {
      background: #e0e0e0;
    }

    #search-button {
      background: #0078d4;
      color: #fff;
      border: none;
    }
    #search-button:hover { background: #005a9e; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      font-size: 18px;
    }

    th, td {
      padding: 12px 8px;
      border-bottom: 1px solid #ccc;
      text-align: center;
    }

    th {
      background: #f5f5f5;
      border-bottom: 2px solid #000;
      font-weight: 700;
    }

    tr:hover {
      background: #e8f0ff;
      cursor: pointer;
    }

    .footer {
      padding: 20px;
      font-size: 14px;
      color: #555;
      border-top: 1px solid #ccc;
      margin-top: 40px;
    }

    /* 紙スタフ等の注釈 */
    .note-box {
      margin-top: 10px;
      padding: 8px;
      background: #f9f9f9;
      border-left: 4px solid #0078d4;
      font-size: 13px;
    }
  </style>
</head>

<body>

<header>
  <h1>列車一覧</h1>

  <div class="search-area">
    <div class="search-group">
      <span class="label-mini">データ検索（施行日）</span>
      <input type="date" id="search-date">
    </div>
    
    <div class="search-group">
      <span class="label-mini">列車番号</span>
      <input type="text" id="search-number" placeholder="例: 9890M">
    </div>

    <div class="search-group">
      <span class="label-mini">出力施行日 (任意)</span>
      <input type="text" id="execution-date" placeholder="例: 2/3" title="未入力時はデータの日付を使用します">
    </div>

    <button id="search-button">検索</button>
    <button id="reset-button">リセット</button>
  </div>

  <div class="note-box">
    列車をクリックすると、<b>デジタル形式</b> または <b>紙スタフ形式</b> を選択して出力できます。
  </div>
</header>

<table id="timetable-list">
  <thead>
    <tr>
      <th>施行日</th>
      <th>種別</th>
      <th>列車番号</th>
      <th>区間</th>
    </tr>
  </thead>
  <tbody>
    <tr><td colspan="4" style="text-align:center;">データを読み込み中...</td></tr>
  </tbody>
</table>

<div class="footer">
  ※ 運転計画 B報編 に基づくデータを表示しています。
</div>

<script src="train_list.js"></script>

</body>
</html>
