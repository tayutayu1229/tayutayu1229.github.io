<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>列車一覧</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #fff;
      color: #000;
      font-family: 'BIZ UDPGothic', sans-serif;
    }

    header {
      padding: 20px;
      border-bottom: 3px solid #000;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
    }

    .search-area {
      margin-top: 15px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input {
      padding: 8px;
      font-size: 16px;
      border: 1px solid #aaa;
      border-radius: 4px;
    }

    button {
      padding: 8px 14px;
      font-size: 16px;
      border: 1px solid #000;
      background: #f0f0f0;
      cursor: pointer;
      border-radius: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      font-size: 18px;
    }

    th, td {
      padding: 12px 8px;
      border-bottom: 1px solid #ccc;
      text-align: center;
    }

    th {
      background: #f5f5f5;
      border-bottom: 2px solid #000;
      font-weight: 700;
    }

    tr:hover {
      background: #e8f0ff;
      cursor: pointer;
    }

    .footer {
      padding: 20px;
      font-size: 14px;
      color: #555;
      border-top: 1px solid #ccc;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>
  <h1>列車一覧</h1>

  <div class="search-area">
    <input type="date" id="search-date">
    <input type="text" id="search-number" placeholder="列車番号">
    <button id="search-button">検索</button>
    <button id="reset-button">リセット</button>
  </div>
</header>

<table id="timetable-list">
  <thead>
    <tr>
      <th>施行日</th>
      <th>種別</th>
      <th>列車番号</th>
      <th>区間</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div class="footer">
  ※ 列車をクリックすると時刻表を表示します。
</div>

<script src="train_list.js"></script>

</body>
</html>
