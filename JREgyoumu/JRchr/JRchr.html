<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>輸送障害一覧</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<style>
  :root { --console-teal:#075660; --console-teal-dark:#043c44; --console-green:#4e8b17; --line:#aebfc0; }
  body { font-family:'Inter','Noto Sans JP',sans-serif; background:#e7efee; }
  .header-card { background:linear-gradient(120deg,var(--console-teal-dark),var(--console-teal)); }
  .system-card { background:#fff; border:1px solid var(--line); box-shadow:0 2px 8px rgba(4,60,68,.12); }
  .filter-input { background:#fff; border:1px solid var(--line); }
  .filter-input:focus { border-color:var(--console-teal); box-shadow:0 0 0 3px rgba(7,86,96,.14); }
  .timeline-header { background:linear-gradient(90deg,var(--console-teal-dark),var(--console-teal)); }
  .incident-marker { background:var(--console-green); }
  .timeline-table td { border:1px solid #9eaeae; vertical-align:top; }
  .timeline-table .timeline-time { width:7rem; background:#edf2f1; font-variant-numeric:tabular-nums; font-weight:700; text-align:center; }

  .accordion-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease-out;
  }

  .accordion-item.active .accordion-content {
    max-height: 9999px; /* 実質無制限にして見切れを防ぐ */
    transition: max-height 0.5s ease-in;
  }


</style>
</head>
<body class="text-gray-800 p-4 md:p-6">

<header class="mb-6">
  <div class="header-card rounded-lg p-6 text-white shadow-sm flex justify-between">
    <div class="flex gap-4 items-center">
      <div class="bg-white/10 p-2 rounded">
        <span class="material-icons-outlined">event_note</span>
      </div>
      <div>
        <h1 class="text-2xl font-bold">輸送障害記録</h1>
        <p class="text-teal-100 text-sm">Transport incident coordination console</p>
      </div>
    </div>
    <div class="text-sm text-green-100 text-right">
      <div>システムID: TIM-2025</div>
      <div>情報共有モード</div>
    </div>
  </div>
</header>

<div class="mb-6 flex gap-4">
  <button onclick="location.href='JRcht-top.html'" class="bg-white hover:bg-slate-50 border border-slate-400 text-slate-800 px-4 py-2 rounded flex items-center gap-1">
    <span class="material-icons-outlined text-base">home</span>
    メインページに戻る
  </button>

  <button onclick="location.href='JRchr-admin.html'" class="bg-lime-700 hover:bg-lime-800 text-white px-4 py-2 rounded flex items-center gap-1">
    <span class="material-icons-outlined text-base">edit</span>
    管理画面
  </button>
</div>


<div class="system-card rounded-lg p-5 mb-6">
  <div class="flex items-center gap-2 mb-4">
    <span class="material-icons-outlined text-green-600">tune</span>
    <h3 class="font-semibold text-gray-700">検索・フィルタ</h3>
  </div>
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">キーワード</label>
      <div class="relative">
        <span class="material-icons-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">search</span>
        <input id="filterInput" type="text" placeholder="障害表題、場所、列番など" class="filter-input w-full pl-10 pr-4 py-2.5 rounded-md outline-none">
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">発生日</label>
      <input type="date" id="occurDate" class="filter-input w-full px-3 py-2.5 rounded-md outline-none">
    </div>
  </div>
</div>

<div id="container" class="space-y-4"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script>
  const supabaseClient = incidentAuth.client;

  function escapeHtml(value) {
    return String(value ?? "").replace(/[&<>'\"]/g, char => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
    }[char]));
  }

  let allData = [];

  function renderList(data) {
    const container = document.getElementById('container');
    container.innerHTML = '';
    if (!data.length) {
      container.innerHTML = '<p class="text-gray-500 text-center">該当データなし</p>';
      return;
    }
    data.forEach(incident => {
      const div = document.createElement('div');
      div.className = 'system-card rounded-lg overflow-hidden accordion-item';
      
      const header = document.createElement('div');
      header.className = 'flex justify-between items-center p-5 cursor-pointer hover:bg-teal-50 transition-colors duration-200';
      header.innerHTML = `
        <div>
          <div class="flex flex-wrap items-center gap-2 mb-2">
            <span class="incident-marker text-white text-xs px-2 py-1 rounded font-bold">障害記録</span>
            <span class="text-xs text-slate-500 font-mono">${escapeHtml(incident.datetime)}</span>
          </div>
          <h2 class="text-xl font-bold mb-1">${escapeHtml(incident.title)}</h2>
          <div class="text-sm text-slate-600">
            <span class="mr-4"><strong>場所:</strong> ${escapeHtml(incident.location)}</span>
            <span><strong>列車番号:</strong> ${escapeHtml(incident.trainNo)}</span>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <span class="material-icons-outlined text-gray-500 transition-transform duration-300 transform">expand_more</span>
        </div>
      `;
      
      header.onclick = function() {
        const parent = this.parentElement;
        parent.classList.toggle('active');
        const icon = this.querySelector('.material-icons-outlined.transform');
        icon.classList.toggle('rotate-180');
      };

      const content = document.createElement('div');
      content.className = 'accordion-content p-5 pt-0 border-t border-slate-200';
      content.innerHTML = `
        <div class="pb-4">
          <p class="text-sm text-slate-600 mb-2 font-bold">概況</p>
          <p class="mb-4 whitespace-pre-line leading-relaxed">${escapeHtml(incident.description)}</p>
          ${incident.notes && incident.notes.length ? `<ul class="mb-4 list-disc list-inside text-sm text-slate-700">
            ${incident.notes.map(n => `<li>${escapeHtml(n)}</li>`).join('')}
          </ul>` : ''}
        </div>
        <div class="border border-slate-400 rounded overflow-hidden">
          <div class="timeline-header text-white px-4 py-2 font-semibold flex items-center gap-2">
            <span class="material-icons-outlined">timeline</span>ホワイトボード
          </div>
          <table class="timeline-table w-full text-sm">
            <thead><tr class="bg-slate-100"><th class="p-2 text-center w-28 border border-slate-400">時分</th><th class="p-2 text-left border border-slate-400">内容</th></tr></thead>
            <tbody>
              ${(incident.timeline || []).map(t => `<tr>
                <td class="timeline-time px-4 py-3 font-mono">${escapeHtml(t.time)}</td>
                <td class="px-4 py-3 whitespace-pre-line leading-relaxed">${escapeHtml(t.text)}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      `;
      
      div.appendChild(header);
      div.appendChild(content);
      container.appendChild(div);
    });
  }

  function applyFilters() {
    const keyword = document.getElementById('filterInput').value.toLowerCase();
    const occurDate = document.getElementById('occurDate').value;
    const filtered = allData.filter(incident => {
      const matchKeyword =
  incident.title?.toLowerCase().includes(keyword) ||
  incident.location?.toLowerCase().includes(keyword) ||
  incident.trainNo?.toLowerCase().includes(keyword) ||
  incident.description?.toLowerCase().includes(keyword) ||
  (incident.notes && incident.notes.join(' ').toLowerCase().includes(keyword));

      const dateOnly = incident.datetime.split(' ')[0];
      const matchDate = occurDate ? dateOnly === occurDate : true;
      return matchKeyword && matchDate;
    });
    renderList(filtered);
  }

  async function loadData() {
  const { data: rows, error } = await supabaseClient
    .from('incidents')
    .select('*')
    .order('datetime', { ascending: false });

  if (error) {
    console.error("Supabase error:", error);
    return;
  }

  allData = rows.map(row => {
    let d = row.data;

    // data が文字列なら JSON.parse
    if (typeof d === "string") {
      try {
        d = JSON.parse(d);
      } catch (e) {
        console.error("JSON parse error:", e, d);
        d = {};
      }
    }

    // datetime を統一
    let dt = row.datetime;
    if (dt && dt.includes("T")) {
      dt = dt.split("T")[0] + " " + dt.split("T")[1].split("+")[0];
    }

    return {
      title: row.title,
      datetime: dt,
      location: row.location,
      trainNo: row.trainNo,
      description: d.description ?? "",
      notes: d.notes ?? [],
      timeline: d.timeline ?? []
    };
  });

  renderList(allData);
}


  // リアルタイム更新
  supabaseClient
    .channel('incidents-realtime')
    .on(
      'postgres_changes',
      { event: '*', schema: 'public', table: 'incidents' },
      payload => {
        console.log('更新検知:', payload);
        loadData();
      }
    )
    .subscribe();

  document.getElementById('filterInput').addEventListener('input', applyFilters);
  document.getElementById('occurDate').addEventListener('change', applyFilters);

  incidentAuth.requireUser().then(session => {
    if (session) loadData();
  });
</script>
</body>
</html>
