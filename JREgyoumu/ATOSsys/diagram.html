  <style>
    :root{--blue:#1769aa;--blue-d:#0d4f87;--ink:#1d2935;--muted:#5d6b78;--line:#d7e0e8;--panel:#fff;--bg:#eef3f7;--danger:#c42b1c}

    button,input,select{font:inherit;border:1px solid #aebdca;background:#fff;border-radius:2px;height:32px;padding:0 9px} button{cursor:pointer}button:hover{background:#eaf2f9}button.primary{background:var(--blue);color:white;border-color:var(--blue)}button.primary:hover{background:var(--blue-d)}

    .diagram-shell{margin-top:12px;background:white;border:1px solid #aebdca;overflow:auto;height:calc(100vh - 224px);min-height:520px;position:relative}.diagram-layout{display:flex;align-items:flex-start;width:max-content}.station-pane{position:sticky;left:0;z-index:5;width:156px;flex:0 0 156px;background:#fff;border-right:2px solid #27714c;box-shadow:2px 0 3px #0002;font-family:"Yu Mincho","Hiragino Mincho ProN",serif}.station-pane-title{height:52px;padding:18px 12px 0;font-weight:500;border-bottom:1px solid #4c956b}.station-name{position:absolute;left:0;width:100%;height:38px;padding:10px 12px 0;background:#fff;border-bottom:1px solid #4c956b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.empty{padding:48px;text-align:center;color:#666}.empty b{display:block;color:#333;font-size:16px;margin-bottom:8px}.diagram{display:block;background:#fff;cursor:grab;font-family:"Yu Mincho","Hiragino Mincho ProN",serif}.diagram.dragging{cursor:grabbing}.grid-minor{stroke:#b7d2c1;stroke-width:1;stroke-dasharray:3 3}.grid-ten{stroke:#79ad8c;stroke-width:1}.grid-hour{stroke:#27714c;stroke-width:1.5}.station-line{stroke:#4c956b;stroke-width:1}.hour-label{font-size:18px;fill:#27714c;font-weight:500}.train{fill:none;stroke:#0a56c2;stroke-width:1.7;cursor:pointer;vector-effect:non-scaling-stroke}.train-hit{fill:none;stroke:transparent;stroke-width:13;cursor:pointer;pointer-events:stroke}.train.dashed{stroke-dasharray:5 3}.train:hover,.train.selected{stroke:#d13438;stroke-width:3.5}.train-number{font-size:10px;fill:#0a56c2;paint-order:stroke;stroke:#fff;stroke-width:3px}.station-mark{fill:white;stroke:#0a56c2;stroke-width:1}.dwell-tick{stroke:#0a56c2;stroke-width:1.2}.track-label{font-size:9px;fill:#0a56c2;paint-order:stroke;stroke:#fff;stroke-width:3px}.sec-mark{fill:none;stroke:#0a56c2;stroke-width:1}.head-title{font-size:13px;fill:#234b35;font-weight:500}.period{font-size:11px;fill:#456755}
    dialog{border:1px solid #777;border-radius:0;padding:0;width:min(760px,92vw);box-shadow:0 10px 35px #0008}dialog::backdrop{background:#0006}.modal-head{background:#f3f3f3;border-bottom:1px solid #ccc;padding:12px 16px;display:flex;align-items:center}.modal-head h2{font-size:17px;margin:0;font-weight:500}.close{margin-left:auto;border:none;background:transparent;font-size:23px;padding:0 7px}.modal-info{padding:14px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;border-bottom:1px solid #ddd}.modal-info div{font-size:13px}.modal-info span{display:block;font-size:11px;color:#666;margin-bottom:2px}.modal-table-wrap{max-height:52vh;overflow:auto}.modal-table{width:100%;border-collapse:collapse}.modal-table th{background:#f2f2f2;position:sticky;top:0}.modal-table th,.modal-table td{padding:7px 16px;border-bottom:1px solid #ddd;text-align:left;font-size:13px}.modal-table tr:hover{background:#f5f9fd}
    #errorConsole{display:none;position:fixed;right:18px;bottom:18px;width:min(680px,90vw);max-height:42vh;overflow:auto;background:#161616;color:#e5e5e5;border:1px solid #555;padding:12px;font:12px ui-monospace,monospace;z-index:10;white-space:pre-wrap}#errorConsole.visible{display:block}#errorConsole h3{font:500 13px "Yu Gothic UI";margin:0 0 8px;color:#fff}.error-line{border-top:1px solid #444;padding:5px 0;color:#f4c7c3}
    @media(max-width:700px){.page{padding:9px}.minor{display:none}.diagram-shell{height:calc(100vh - 270px)}.modal-info{grid-template-columns:repeat(2,1fr)}}
    /* Realistic timetable sheet: green header, white working surface */
    :root{--blue:#2f7d4d;--blue-d:#21623a;--bg:#fff;--ink:#202820}header{background:linear-gradient(100deg,#225c36,#377d4d);box-shadow:0 2px 6px #225c3633}.page{max-width:none}.station-pane{width:108px;flex-basis:108px;font-family:"Yu Gothic","Meiryo",sans-serif}.station-name{left:43px;width:64px;padding:17px 5px 0;font-size:15px;letter-spacing:0}.diagram{font-family:"Yu Gothic","Meiryo",sans-serif}.station-pane-title{padding-left:43px}.diagram-title-vertical{position:absolute;left:0;top:92px;bottom:0;width:38px;border-right:1px solid #4c956b;padding:4px 5px;writing-mode:vertical-rl;font-size:16px;line-height:1.4;letter-spacing:.08em;color:#225c36;overflow:hidden}.toolbar{border-top-color:#2f7d4d;box-shadow:none}.statusbar{border-left-color:#2f7d4d;background:#fff}.home{color:#215b35}.header-manage{height:28px;padding:0 8px;font-size:16px;border:1px solid #fff;background:#fff;color:#215b35}.header-manage:hover{background:#e5f1e8}.diagram-shell{border-color:#95aa9b}.train{stroke:#1d4f9c}.train.search-flash,.train.tracked{stroke:#d13438;stroke-width:3.5}.train.search-flash{animation:search-flash 600ms linear 5}.train-number,.track-label{fill:#1d4f9c}.station-mark,.dwell-tick,.sec-mark{stroke:#1d4f9c}.train-hit:hover + .train{stroke:#d13438;stroke-width:3.5}.meta-box{fill:#fff;stroke:#4c956b;stroke-width:1}.meta-line{stroke:#4c956b;stroke-width:1}.meta-text{font-size:12px;fill:#225c36}.system-panel,.shortcut-panel{display:none;position:fixed;right:16px;top:64px;z-index:12;width:270px;background:#fff;border:1px solid #8ba394;box-shadow:0 5px 18px #0002;padding:12px;color:#24382b}.system-panel.visible,.shortcut-panel.visible{display:block}.system-panel h3,.shortcut-panel h3{font-size:14px;margin:0 0 8px}.system-panel p,.shortcut-panel p{margin:6px 0;font-size:12px}.system-panel kbd,.shortcut-panel kbd{border:1px solid #b7c7bb;background:#f6faf7;padding:1px 4px}@keyframes search-flash{50%{stroke:#ffd800;stroke-width:5}}@media print{header,.toolbar,.statusbar,.system-panel,.shortcut-panel,#errorConsole{display:none!important}.page{padding:0}.diagram-shell{height:auto;overflow:visible;border:0}.station-pane{position:relative}.diagram-layout{width:max-content}}
  </style>

<body>
  <header><h1>ダイヤグラムシステム</h1><span>グラフィックダイヤシステム</span><a class="home" href="/toppage.html">ホームへ戻る</a><button class="header-manage" id="systemStatus" aria-label="管理・ステータス">⚙</button></header>
  <main class="page">
    <section class="toolbar" aria-label="表示条件">
      <div class="field wide"><label for="lineSelect">線区</label><select id="lineSelect"><option value="">読込中…</option></select></div>
      <div class="field"><label for="fromSelect">始点駅</label><select id="fromSelect"><option value="">全区間</option></select></div>
      <div class="field"><label for="toSelect">終点駅</label><select id="toSelect"><option value="">全区間</option></select></div>
      <div class="field"><label for="viewDate">表示日付</label><input id="viewDate" type="date"></div>
      <div class="field"><label for="startTime">表示開始時刻</label><input id="startTime" type="time"></div>
      <div class="field"><label for="endTime">表示終了時刻</label><input id="endTime" type="time"></div>
      <div class="field"><label>曜日種別</label><div class="days"><label><input type="checkbox" name="day" value="平日"> 平日</label><label><input type="checkbox" name="day" value="土休日"> 土休日</label></div></div>
      <div class="field wide"><label for="trainSearch">列車検索・追跡</label><input id="trainSearch" type="search" placeholder="列車番号・種別・始終着駅"></div><button id="searchNext">次候補</button><button id="trackTrain">追跡</button>
      <div class="field"><label>表示対象</label><div class="days"><label><input id="allData" type="checkbox"> 線区の全データ</label></div></div>
      <button class="primary" id="apply">表示更新</button><button id="today">現在日時に戻す</button><button id="shareLink">共有URL</button><button id="saveFavorite">お気に入り保存</button><select id="favoriteSelect"><option value="">お気に入りを開く</option></select><button id="printDiagram">PDF／印刷</button><button id="zoomOut" title="縮小">－</button><button id="zoomIn" title="拡大">＋</button><span class="minor" id="scale">100%</span>
    </section>
    <section class="statusbar"><strong id="status">時刻表データを読み込んでいます…</strong><span id="period"></span><span id="count"></span><div class="legend"><span><i class="swatch blue"></i>列車線</span><span><i class="swatch red"></i>選択列車</span></div></section>
    <section class="diagram-shell" id="diagramShell" aria-label="ダイヤグラム"><div id="canvas"><div class="empty"><b>データを読み込み中です</b>しばらくお待ちください。</div></div></section>
  </main>
  <dialog id="trainDialog"><div class="modal-head"><h2 id="modalTitle">列車詳細</h2><button class="close" id="closeDialog" aria-label="閉じる">×</button></div><div class="modal-info" id="modalInfo"></div><div class="modal-table-wrap"><table class="modal-table"><thead><tr><th>駅名</th><th>到着時刻</th><th>出発時刻</th><th>番線</th></tr></thead><tbody id="stopRows"></tbody></table></div></dialog>
  <dialog id="stationDialog"><div class="modal-head"><h2 id="stationTitle">駅発着一覧</h2><button class="close" id="closeStationDialog" aria-label="閉じる">×</button></div><div class="modal-table-wrap"><table class="modal-table"><thead><tr><th>列車番号</th><th>種別</th><th>到着</th><th>出発</th><th>番線</th></tr></thead><tbody id="stationRows"></tbody></table></div></dialog>
  <aside id="errorConsole" aria-live="polite"><h3>内部診断ログ（Ctrl + Shift + D で開閉）</h3><div id="errorLines">エラーは記録されていません。</div></aside>
  <aside id="systemPanel" class="system-panel"><h3>管理・ステータス</h3><p id="systemInfo">データを読み込み中です。</p><button id="shortcutHelp">ショートカットキー</button></aside><aside id="shortcutPanel" class="shortcut-panel"><h3>ショートカット</h3><p><kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>D</kbd>　内部診断ログ</p><p><kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>S</kbd>　管理・ステータス</p></aside>
  <script>
  (() => {
    'use strict';
    const DATA_URL='https://tayunet-traininfo.com/T-time/timetables.json', STATION_URL='https://tayunet-traininfo.com/T-time/station.json';
    const TRACK_SKIP=new Set(['上本','下本','武上','武下','客上','客下','貨上','貨下','本線','快上','快下','電上','電下','京上','京下','南外','北外','山貨下','山貨上','大支下','大支上','須上','須下']);
    const $=id=>document.getElementById(id); const log=[]; let data=[], stationData={lines:{}}, lines=new Map(), scale=1, current=[], tracked='', lastSearch='', searchIndex=0;
    const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    function error(message, detail=''){console.error(message,detail);log.push({time:new Date().toLocaleTimeString('ja-JP'),message,detail:String(detail||'')});$('errorLines').innerHTML=log.map(x=>`<div class="error-line">[${x.time}] ${esc(x.message)} ${esc(x.detail)}</div>`).join('')}
    window.addEventListener('error',e=>error('画面処理エラー',e.message)); window.addEventListener('unhandledrejection',e=>error('非同期処理エラー',e.reason));
    document.addEventListener('keydown',e=>{if(e.ctrlKey&&e.shiftKey&&e.key.toLowerCase()==='d'){$('errorConsole').classList.toggle('visible');e.preventDefault()}if(e.ctrlKey&&e.shiftKey&&e.key.toLowerCase()==='s'){$('systemPanel').classList.toggle('visible');e.preventDefault()}});
    function isoToday(){return new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Tokyo'})}
    function localDate(v){const [y,m,d]=v.split('-').map(Number);return new Date(y,m-1,d)}
    function jpDate(v){return v.replaceAll('-','/').replace(/\/(\d)\//,'/0$1/').replace(/\/(\d)$/,'/0$1')}
    function dayKind(v){const d=localDate(v).getDay();return d===0||d===6?'土休日':'平日'}
    function revisionStart(v, type){const d=localDate(v);let year=d.getFullYear();const secondSat=y=>{const x=new Date(y,2,1);return new Date(y,2,1+((6-x.getDay()+7)%7)+7)};let sat=secondSat(year);if(d<sat){year--;sat=secondSat(year)}if(type==='平日'){sat.setDate(sat.getDate()+2)}return `${sat.getFullYear()}/${String(sat.getMonth()+1).padStart(2,'0')}/${String(sat.getDate()).padStart(2,'0')}`}
    function periodBounds(v){const d=localDate(v);let year=d.getFullYear();const secondSat=y=>{const x=new Date(y,2,1);return new Date(y,2,1+((6-x.getDay()+7)%7)+7)};let start=secondSat(year);if(d<start)start=secondSat(--year);const end=new Date(secondSat(year+1));end.setDate(end.getDate()-1);const fmt=x=>`${x.getFullYear()}/${String(x.getMonth()+1).padStart(2,'0')}/${String(x.getDate()).padStart(2,'0')}`;return [fmt(start),fmt(end)]}
    function validTrain(t,date,kinds){const start=String(t.startDate||'').replace(/-/g,'/');if(!start||!kinds.length)return false;const selected=kinds.length===2; if(selected){const [from,to]=periodBounds(date);return start>=from&&start<=to}if(!t.dayType||t.dayType!==kinds[0])return false;return start===revisionStart(date,t.dayType)||start===jpDate(date)}
    function validAllData(t,kinds){if(!kinds.length)return false;if(kinds.length===2)return true;return t.dayType===kinds[0]}
    function timeValue(text){if(!text||text==='…'||text==='||')return null;const m=String(text).match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/);if(!m)return null;let n=Number(m[1])*60+Number(m[2])+Number(m[3]||0)/60;return n<240?n+1440:n}
    function stationOrder(line,trains){const entries=Object.entries(stationData.lines||{});const entry=entries.find(([name,v])=>name===line||v.atosLineName===line)||entries.find(([name,v])=>line.includes(v.atosLineName)||v.atosLineName.includes(line));let order=entry?entry[1].stations.map(s=>s.name?.trim()).filter(Boolean):[];if(!order.length){const best=trains.slice().sort((a,b)=>(b.stops?.length||0)-(a.stops?.length||0))[0];order=(best?.stops||[]).map(s=>s.station?.trim()).filter(Boolean)}for(const t of trains){const stops=(t.stops||[]).map(s=>s.station?.trim()).filter(Boolean);for(let i=0;i<stops.length;i++){const name=stops[i];if(order.includes(name))continue;let before=-1,after=-1;for(let p=i-1;p>=0;p--){const k=order.indexOf(stops[p]);if(k>=0){before=k;break}}for(let n=i+1;n<stops.length;n++){const k=order.indexOf(stops[n]);if(k>=0){after=k;break}}if(after>=0)order.splice(after,0,name);else if(before>=0)order.splice(before+1,0,name);else order.push(name)}}return order}
    function buildLines(){lines=new Map();data.forEach(t=>{const key=t.line||'未指定';if(!lines.has(key))lines.set(key,[]);lines.get(key).push(t)});const select=$('lineSelect');select.innerHTML='<option value="">線区を選択してください</option>'+[...lines].sort((a,b)=>b[1].length-a[1].length).map(([n,v])=>`<option value="${esc(n)}">${esc(n)}（${v.length}本）</option>`).join('');let preferred=[...lines.keys()].sort((a,b)=>lines.get(b).length-lines.get(a).length)[0];select.value=preferred||'';updateStations(true)}
    const DEFAULT_SECTIONS={東北:['東京','黒磯'],東北回:['大宮','東大宮操'],高崎:['高崎','大宮']};
    const normal=s=>String(s||'').replace(/[　\s]/g,'');
    function updateStations(applyDefault=false){const line=$('lineSelect').value,order=stationOrder(line,lines.get(line)||[]);for(const id of ['fromSelect','toSelect']){const old=$(id).value;$(id).innerHTML='<option value="">全区間</option>'+order.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('');if(order.includes(old))$(id).value=old}if(order.length){const section=DEFAULT_SECTIONS[line],find=name=>order.find(s=>normal(s)===normal(name));const from=section&&find(section[0]),to=section&&find(section[1]);$('fromSelect').value=applyDefault&&from?from:order[0];$('toSelect').value=applyDefault&&to?to:order.at(-1)}}
    function secondsMark(x,y,sec){
      if(!sec)return '';const stem=`M${x},${y}V${y-7}`,one=`M${x},${y-7}h5`,two=`M${x},${y-10}h5`,circle=`<circle class="sec-mark" cx="${x}" cy="${y-9}" r="1.8"/>`,corner=`M${x},${y}V${y-8}h8`;
      if(sec===5)return `<path class="sec-mark" d="${stem} ${one}"/>`;
      if(sec===10)return `<path class="sec-mark" d="${stem} ${one} ${two}"/>`;
      if(sec===15)return `<path class="sec-mark" d="${stem}"/>${circle}`;
      if(sec===20)return `<path class="sec-mark" d="${stem} ${one}"/>${circle}`;
      if(sec===25)return `<path class="sec-mark" d="${stem} ${one} ${two}"/>${circle}`;
      if(sec===30)return `<path class="sec-mark" d="${corner}"/>`;
      if(sec===35)return `<path class="sec-mark" d="${corner} M${x+4},${y-8}v-3"/>`;
      if(sec===40)return `<path class="sec-mark" d="${corner} M${x+4},${y-8}v-3 M${x+7},${y-8}v-3"/>`;
      if(sec===45)return `<path class="sec-mark" d="${corner}"/>${circle}`;
      if(sec===50)return `<path class="sec-mark" d="${corner} M${x+4},${y-8}v-3"/>${circle}`;
      return `<path class="sec-mark" d="${corner} M${x+4},${y-8}v-3 M${x+7},${y-8}v-3"/>${circle}`;
    }
    function render(){
      const line=$('lineSelect').value, date=$('viewDate').value, search=$('trainSearch').value.trim().toLowerCase(), allData=$('allData').checked;
      const kinds=[...document.querySelectorAll('input[name=day]:checked')].map(e=>e.value);
      if(!line||!date){$('canvas').innerHTML='<div class="empty"><b>表示条件を指定してください</b>線区と日付を選択してください。</div>';return}
      const all=lines.get(line)||[]; let order=stationOrder(line,all);
      let a=order.indexOf($('fromSelect').value), b=order.indexOf($('toSelect').value);
      if(a>=0&&b>=0){if(a>b)[a,b]=[b,a];order=order.slice(a,b+1)}
      const stationIndex=new Map(order.map((s,i)=>[s,i]));
      const matchesSearch=t=>!search||[t.trainNumber,t.type,t.origin,t.destination,t.name].some(v=>String(v||'').toLowerCase().includes(search));
      const requestedTime=v=>{const [h,m]=v.split(':').map(Number);let n=h*60+m;return n<240?n+1440:n};const timeSelected=Boolean($('startTime').value||$('endTime').value),startAt=requestedTime($('startTime').value||'04:00'),endAt=requestedTime($('endTime').value||'03:59');if(endAt<=startAt){$('canvas').innerHTML='<div class="empty"><b>時刻範囲を確認してください</b>終了時刻は開始時刻より後にしてください。</div>';return}
      const withinWindow=t=>!timeSelected||(t.stops||[]).some(s=>{const a=timeValue(s.arrival),d=timeValue(s.departure);return [a,d].some(x=>x!==null&&x>=startAt&&x<=endAt)});
      current=all.filter(t=>allData?validAllData(t,kinds):validTrain(t,date,kinds)).filter(withinWindow).filter(t=>(t.stops||[]).filter(s=>stationIndex.has(s.station?.trim())).length>1);
      const minuteW=2.6*scale,chartLeft=24,top=90,row=Math.max(38,Math.min(100,420/Math.max(order.length,1))),minutes=endAt-startAt,width=chartLeft+minuteW*minutes+40,height=top+Math.max(1,order.length)*row+25;
      const calendar=date.replaceAll('-','年').replace(/年(\d\d)$/, '月$1日'),dayLabel=kinds.length===1?kinds[0]:kinds.length===2?'平日・土休日':'運休',lineTitle=`${line}${line.endsWith('線')?'':'線'} 列車運行図表　＜${dayLabel}＞`;
      let stationPane=`<div class="station-pane" style="height:${height}px"><div class="station-pane-title">駅名</div>${order.map((s,i)=>`<div class="station-name" style="top:${top+(i-1)*row}px">${esc(s)}</div>`).join('')}<div class="diagram-title-vertical">${esc(lineTitle)}　${calendar}改正　東日本旅客鉄道株式会社</div></div>`;
      const meta=`<g><rect class="meta-box" x="8" y="8" width="205" height="60"/><path class="meta-line" d="M8,28H213 M8,48H213"/><text class="meta-text" x="15" y="22">所属箇所：</text><text class="meta-text" x="15" y="42">使用箇所（氏名）：</text><text class="meta-text" x="15" y="62">管理番号：</text></g>`;
      let out=`<div class="diagram-layout">${stationPane}<svg class="diagram" id="svgDiagram" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" role="img" aria-label="${esc(line)}のダイヤグラム"><rect width="100%" height="100%" fill="white"/>${meta}`;
      for(let m=0;m<=minutes;m+=2){const x=chartLeft+m*minuteW,total=startAt+m,cls=total%60===0?'grid-hour':total%10===0?'grid-ten':'grid-minor';out+=`<line class="${cls}" x1="${x}" y1="${top}" x2="${x}" y2="${height-20}"/>`;if(total%60===0&&m<minutes){const h=Math.floor(total/60)%24;out+=`<text class="hour-label" x="${x-5}" y="${top-10}">${h}</text>`}}
      order.forEach((s,i)=>{const y=top+i*row;out+=`<line class="station-line" x1="0" y1="${y}" x2="${width}" y2="${y}"/>`});
      const occupied=[];const place=(x,y,text,cls,w=38)=>{for(const r of occupied)if(x<r.x+r.w&&x+w>r.x&&y<r.y+r.h&&y+11>r.y)return '';occupied.push({x,y,w,h:11});return `<text class="${cls}" x="${x}" y="${y}">${esc(text)}</text>`};
      const labeled=new Set();current.forEach((t,ti)=>{
        const trainStops=t.stops||[],visible=trainStops.map((s,i)=>({i,row:stationIndex.get(s.station?.trim())})).filter(x=>x.row!==undefined),firstVisible=visible[0],lastVisible=visible.at(-1),direction=(visible[1]?.row??firstVisible?.row)-(firstVisible?.row??0),incomingDy=direction>=0?-8:8,outgoingDy=direction>=0?8:-8;
        let segments=[{points:[],coords:[],first:null}],marks=[],lastTime=null;
        for(const [stopIndex,s] of trainStops.entries()){
          const idx=stationIndex.get(s.station?.trim());if(idx===undefined)continue;
          const arrival=timeValue(s.arrival),departure=timeValue(s.departure),enterTime=arrival??departure,leaveTime=departure??arrival;
          if(enterTime===null)continue;
          if(lastTime!==null&&enterTime<lastTime)segments.push({points:[],coords:[],first:null});
          lastTime=leaveTime;const segment=segments.at(-1),y=top+idx*row,ax=arrival===null?null:chartLeft+(arrival-startAt)*minuteW,dx=departure===null?null:chartLeft+(departure-startAt)*minuteW,enter=ax??dx;
          if(!segment.first){segment.first={x:enter,y};if(stopIndex===firstVisible?.i&&firstVisible.i>0){segment.points.push(`${enter-7},${y+incomingDy}`);segment.coords.push({x:enter-7,y:y+incomingDy})}}segment.points.push(`${enter},${y}`);segment.coords.push({x:enter,y});
          if(ax!==null&&dx!==null&&ax!==dx){segment.points.push(`${dx},${y}`);segment.coords.push({x:dx,y});marks.push(`<path class="dwell-tick" d="M${ax},${y-4}v8 M${dx},${y-4}v8"/>`)}
          const markX=dx??ax,mm=String(s.departure||s.arrival).match(/:(\d{2})$/),sec=Number(mm?.[1]||0);let track='';
          if(!TRACK_SKIP.has(s.trackN)&&s.trackN){const tn=String(s.trackN).replace(/[番線]/g,'').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-65248));for(const dy of [-5,8,-14,17]){track=place(markX+2,y+dy,tn,'track-label',18);if(track)break}}
          marks.push(`<circle class="station-mark" cx="${markX}" cy="${y}" r="2"/>${secondsMark(markX,y,sec)}${track}`)
        }
        const finalSegment=segments.at(-1),lastPoint=finalSegment.coords.at(-1);if(lastVisible&&lastVisible.i<trainStops.length-1&&lastPoint){finalSegment.points.push(`${lastPoint.x+7},${lastPoint.y+outgoingDy}`);finalSegment.coords.push({x:lastPoint.x+7,y:lastPoint.y+outgoingDy})}
        const usable=segments.filter(s=>s.points.length>0);if(!usable.length)return;
        const id=`t${ti}`,dash=/^\d{4}$/.test(String(t.trainNumber||''))||String(t.trainNumber||'').includes('単');let trains='',numbers='';
        usable.forEach((segment,si)=>{const pointKey=segment.points.join('|'),diagramKey=`${t.trainNumber||''}|${pointKey}`;let number='';if(si===0||!labeled.has(diagramKey)){labeled.add(diagramKey);for(const d of [-7,16,-18,27]){const label=place(segment.first.x+3,segment.first.y+d,t.trainNumber||'','train-number',Math.max(22,String(t.trainNumber||'').length*6));if(label){const next=segment.coords.find(p=>p.y!==segment.first.y)||segment.coords[1]||segment.first,angle=Math.atan2(next.y-segment.first.y,next.x-segment.first.x)*180/Math.PI;number=label.replace('class="train-number"',`class="train-number" transform="rotate(${angle.toFixed(1)} ${segment.first.x+3} ${segment.first.y+d})"`);break}}}numbers+=number;if(segment.points.length>1)trains+=`<polyline class="train-hit" data-train="${id}" points="${segment.points.join(' ')}"/><polyline class="train${dash?' dashed':''}" data-train="${id}" points="${segment.points.join(' ')}"/>`});
        out+=`<g data-train="${id}">${trains}${numbers}${marks.join('')}</g>`

      out+='</svg></div>';$('canvas').innerHTML=out;$('status').textContent=`${line}：${current.length}本を表示中`;$('period').textContent=allData?'この線区の全データ':kinds.length===2?'改正期間内の全列車（曜日指定なし）':`基本ダイヤ判定：${revisionStart(date,kinds[0]||dayKind(date))} 改正分`;$('count').textContent=`駅数 ${order.length}`;$('scale').textContent=`${Math.round(scale*100)}%`;$('systemInfo').textContent=`線区：${line}／表示列車：${current.length}本／駅：${order.length}駅`;
      document.querySelectorAll('.train,.train-hit').forEach(el=>el.addEventListener('click',()=>showTrain(current[Number(el.dataset.train.slice(1))])));document.querySelectorAll('.station-name').forEach(el=>el.addEventListener('click',()=>showStation(el.textContent)));applyTracking();enablePan()
    }
    function trainMatches(t,q){return [t.trainNumber,t.type,t.origin,t.destination,t.name].some(v=>String(v||'').toLowerCase().includes(q))}
    function searchTrain(next=false){const q=$('trainSearch').value.trim().toLowerCase();if(!q)return;if(q!==lastSearch){lastSearch=q;searchIndex=0}const ids=current.map((t,i)=>trainMatches(t,q)?i:-1).filter(i=>i>=0);if(!ids.length){$('status').textContent='一致する列車がありません';return}if(next)searchIndex=(searchIndex+1)%ids.length;const id=ids[searchIndex],target=document.querySelector(`.train[data-train="t${id}"]`);if(target){document.querySelectorAll('.search-flash').forEach(e=>e.classList.remove('search-flash'));target.classList.add('search-flash');target.scrollIntoView({behavior:'smooth',block:'center',inline:'center'});setTimeout(()=>target.classList.remove('search-flash'),3100);$('status').textContent=`検索 ${searchIndex+1}/${ids.length}：${current[id].trainNumber||'列車番号なし'}`}}
    function applyTracking(){document.querySelectorAll('.train').forEach(e=>e.classList.toggle('tracked',Boolean(tracked)&&String(current[Number(e.dataset.train.slice(1))]?.trainNumber||'').includes(tracked)))}
    function toggleTracking(){const value=$('trainSearch').value.trim();if(!value)return;tracked=tracked===value?'':value;applyTracking();$('status').textContent=tracked?`追跡中：${tracked}`:'追跡を解除しました'}
    function showStation(name){const rows=current.map(t=>{const s=(t.stops||[]).find(x=>x.station?.trim()===name);return s?`<tr><td>${esc(t.trainNumber||'—')}</td><td>${esc(t.type||'—')}</td><td>${esc(s.arrival||'—')}</td><td>${esc(s.departure||'—')}</td><td>${esc(s.trackN||'—')}</td></tr>`:''}).join('');$('stationTitle').textContent=`${name}　発着列車一覧`;$('stationRows').innerHTML=rows||'<tr><td colspan="5">該当列車はありません。</td></tr>';$('stationDialog').showModal()}
    function queryState(){return {line:$('lineSelect').value,from:$('fromSelect').value,to:$('toSelect').value,date:$('viewDate').value,days:[...document.querySelectorAll('input[name=day]:checked')].map(e=>e.value).join(','),start:$('startTime').value,end:$('endTime').value,all:$('allData').checked?'1':'0'}}
    function shareState(){const q=new URLSearchParams(queryState());location.hash=q.toString();if(navigator.clipboard)navigator.clipboard.writeText(location.href).catch(()=>{});$('status').textContent='共有URLを更新しました'}
    function favorites(){try{return JSON.parse(localStorage.getItem('diagram-favorites')||'{}')}catch{return {}}}
    function refreshFavorites(){const all=favorites(),select=$('favoriteSelect'),old=select.value;select.innerHTML='<option value="">お気に入りを開く</option>'+Object.keys(all).map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join('');select.value=old}
    function saveFavorite(){const name=window.prompt('お気に入り名を入力してください');if(!name)return;const all=favorites();all[name]=queryState();localStorage.setItem('diagram-favorites',JSON.stringify(all));refreshFavorites();$('status').textContent=`お気に入り「${name}」を保存しました`}
    function openFavorite(name){const state=favorites()[name];if(!state)return;$('lineSelect').value=state.line;updateStations(false);$('fromSelect').value=state.from;$('toSelect').value=state.to;$('viewDate').value=state.date;$('startTime').value=state.start;$('endTime').value=state.end;$('allData').checked=state.all==='1';document.querySelectorAll('input[name=day]').forEach(e=>e.checked=state.days.split(',').includes(e.value));render()}
    function applyHash(){const q=new URLSearchParams(location.hash.slice(1));if(!q.get('line'))return;$('lineSelect').value=q.get('line');updateStations(false);$('fromSelect').value=q.get('from')||$('fromSelect').value;$('toSelect').value=q.get('to')||$('toSelect').value;$('viewDate').value=q.get('date')||$('viewDate').value;$('startTime').value=q.get('start')||'';$('endTime').value=q.get('end')||'';$('allData').checked=q.get('all')==='1';document.querySelectorAll('input[name=day]').forEach(e=>e.checked=(q.get('days')||'').split(',').includes(e.value))}
    function showTrain(t){$('modalTitle').textContent=`${t.type||'種別未設定'} ${t.trainNumber||'列車番号なし'}　　${t.origin||'—'} 〜 ${t.destination||'—'}`;$('modalInfo').innerHTML=[['列車番号',t.trainNumber],['列車種別',t.type],['速度種別',t.speed],['始発〜終着',`${t.origin||'—'} 〜 ${t.destination||'—'}`],['始発駅日付',t.startDate],['運転日種別',t.dayType||'臨時（当日限り）']].map(x=>`<div><span>${x[0]}</span>${esc(x[1]||'—')}</div>`).join('');$('stopRows').innerHTML=(t.stops||[]).map(s=>`<tr><td>${esc(s.station||'')}</td><td>${esc(s.arrival||'—')}</td><td>${esc(s.departure||'—')}</td><td>${esc(s.trackN||'—')}</td></tr>`).join('');$('trainDialog').showModal()}

    async function load(){try{const [timeRes,stationRes]=await Promise.all([fetch(DATA_URL),fetch(STATION_URL)]);if(!timeRes.ok)throw new Error(`時刻表 HTTP ${timeRes.status}`);data=await timeRes.json();if(stationRes.ok)stationData=await stationRes.json();else error('駅順序データを取得できませんでした',stationRes.status);if(!Array.isArray(data))throw new Error('配列形式ではありません');buildLines();applyHash();refreshFavorites();render()}catch(e){error('時刻表JSONの取得に失敗しました',e.message);$('status').textContent='時刻表データを取得できませんでした';$('canvas').innerHTML='<div class="empty"><b>時刻表データを読み込めませんでした</b>通信状態または配信元の設定をご確認ください。内部ログは Ctrl + Shift + D で確認できます。</div>'}}
    $('viewDate').value=isoToday();document.querySelector(`input[name=day][value="${dayKind($('viewDate').value)}"]`).checked=true;$('lineSelect').addEventListener('change',()=>{updateStations(true);render()});document.querySelectorAll('input[name=day]').forEach(x=>x.addEventListener('change',render));['allData','startTime','endTime'].forEach(id=>$(id).addEventListener('change',render));$('trainSearch').addEventListener('input',()=>searchTrain(false));$('searchNext').onclick=()=>searchTrain(true);$('trackTrain').onclick=toggleTracking;$('apply').onclick=render;$('today').onclick=()=>{$('viewDate').value=isoToday();document.querySelectorAll('input[name=day]').forEach(x=>x.checked=x.value===dayKind($('viewDate').value));render()};$('shareLink').onclick=shareState;$('saveFavorite').onclick=saveFavorite;$('favoriteSelect').addEventListener('change',e=>openFavorite(e.target.value));$('printDiagram').onclick=()=>window.print();$('zoomIn').onclick=()=>setScale(scale*1.2);$('zoomOut').onclick=()=>setScale(scale/1.2);$('shortcutHelp').onclick=()=>$('shortcutPanel').classList.toggle('visible');$('systemStatus').onclick=()=>$('systemPanel').classList.toggle('visible');$('closeDialog').onclick=()=>$('trainDialog').close();$('closeStationDialog').onclick=()=>$('stationDialog').close();$('trainDialog').addEventListener('click',e=>{if(e.target===$('trainDialog'))$('trainDialog').close()});$('stationDialog').addEventListener('click',e=>{if(e.target===$('stationDialog'))$('stationDialog').close()});load();
