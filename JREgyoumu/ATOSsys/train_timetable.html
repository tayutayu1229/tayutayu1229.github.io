<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【列車時刻表】</title>
    <style>
        :root {
            --paper: #ffffff;
            --screen-bg: #ececec;
            --header-fill: #AFCBEB;
            --line: #222222;
            --thin-line: 1.05px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 18px 0 42px;
            background: var(--screen-bg);
            color: #000;
            font-family:
                "ＭＳ Ｐゴシック",
                "MS PGothic",
                "Yu Gothic",
                "Hiragino Kaku Gothic ProN",
                "Meiryo",
                sans-serif;
            font-size: 15px;
            font-weight: 500.4;
            line-height: 1.08;
        }

        .page-container {
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 18mm;
            background: var(--paper);
            border: 1px solid #cfcfcf;
            box-shadow: 0 3px 16px rgba(0, 0, 0, .14);
        }

        .timetable-container {
            width: 100%;
            margin: 0;
            padding: 0;
            border: 0;
            background: #fff;
        }

        .document-header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto 54px;
            align-items: end;
            column-gap: 16px;
            margin-bottom: 5px;
        }

        h2 {
            margin: 0 0 1px;
            padding: 0;
            border: 0;
            font-size: 19px;
            font-weight: 500;
            letter-spacing: 0;
            white-space: nowrap;
        }

        .header-meta {
            font-size: 11.5px;
            font-weight: 500;
            line-height: 1.38;
            white-space: nowrap;
        }

        .page-number {
            align-self: start;
            padding-top: 1px;
            text-align: center;
            font-size: 11.5px;
            font-weight: 500;
            white-space: nowrap;
        }

        .info-table,
        .main-table {
            width: 100%;
            border-collapse: collapse;
            border-spacing: 0;
            table-layout: fixed;
            margin: 0;
            border: var(--thin-line) solid var(--line);
        }

        .info-table {
            margin-bottom: 7px;
        }

        .info-table th,
        .info-table td,
        .main-table th,
        .main-table td {
            border: var(--thin-line) solid var(--line);
            vertical-align: middle;
            font-weight: 500;
        }

        /*
         * 上表の項目欄と下表の線区欄を両方25%に固定。
         * これで上下の縦罫線が同じ位置に揃う。
         */
        .info-table th {
            width: 25%;
            height: 19px;
            padding: 0 6px;
            background: var(--header-fill);
            text-align: center;
            font-size: 13.2px;
            letter-spacing: 0;
            white-space: nowrap;
        }

        .info-table td {
            height: 19px;
            padding: 0 5px;
            text-align: left;
            font-size: 13.2px;
            letter-spacing: 0;
        }

        .main-table thead th {
            height: 21px;
            padding: 0 5px;
            background: var(--header-fill);
            text-align: center;
            font-size: 13.2px;
            letter-spacing: 0;
        }

        .main-table tbody td {
            height: 21px;
            padding: 0 5px;
            font-size: 13.2px;
        }

        .main-table .line-name,
        .main-table .station-name,
        .main-table .time-col-combined {
            width: 25%;
        }

        .main-table tbody .line-name {
            position: relative;
            padding: 0;
            vertical-align: top;
            text-align: left;
            overflow: hidden;
        }

        .line-overlay {
            position: absolute;
            inset: 0;
        }

        .line-segment-label {
            position: absolute;
            left: 7px;
            right: 7px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            font-size: 13.2px;
            font-weight: 500;
            line-height: 1.15;
            white-space: normal;
        }

        .line-segment-divider {
            position: absolute;
            left: 0;
            right: 0;
            border-top: var(--thin-line) solid var(--line);
            pointer-events: none;
        }

        .main-table tbody .station-name {
            padding-left: 7px;
            text-align: left;
            font-size: 13.2px;
            font-weight: 500.2;
            white-space: nowrap;
        }

        .station-name-two-chars {
            display: inline-flex;
            width: 3em;
            justify-content: space-between;
        }

        .time-cell {
            padding-left: 4px !important;
            padding-right: 4px !important;
        }

        .time-cell-inner {
            position: relative;
            display: block;
            min-height: 18px;
            line-height: 18px;
        }

        /*
         * 数字はArial系を優先して、斜線入りの0を回避。
         * 時刻は左寄りの固定位置、着発線は右側の固定位置。
         */
        .time-value {
            position: absolute;
            top: 0;
            left: 42%;
            transform: translateX(-50%);
            display: block;
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 13.2px;
            font-weight: 500.2;
            font-variant-numeric: normal;
            font-feature-settings: normal;
            letter-spacing: 0;
            white-space: nowrap;
        }

        .track-value {
            position: absolute;
            top: 0;
            right: 12px;
            min-width: 48px;
            text-align: right;
            font-family:
                "ＭＳ Ｐゴシック",
                "MS PGothic",
                "Yu Gothic",
                "Hiragino Kaku Gothic ProN",
                "Meiryo",
                sans-serif;
            font-size: 12.7px;
            font-weight:500.2;
            line-height: 18px;
            letter-spacing: 0;
            white-space: nowrap;
        }

        .special-time .time-value {
            letter-spacing: 0;
        }

        .error-row td {
            height: 52px;
            text-align: center;
            color: #b00020;
            font-size: 12.7px;
            font-weight: 500.2;
        }

        .settings-wrapper {
            position: fixed;
            top: 14px;
            right: 14px;
            z-index: 1000;
        }

        .settings-toggle {
            width: 38px;
            height: 38px;
            padding: 0;
            border: 1px solid #333;
            border-radius: 4px;
            background: #fff;
            color: #111;
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .15);
        }

        .settings-toggle:hover {
            background: #f2f2f2;
        }

        .settings-menu {
            position: absolute;
            top: 45px;
            right: 0;
            display: none;
            width: 176px;
            padding: 8px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #fff;
            box-shadow: 0 4px 14px rgba(0, 0, 0, .18);
        }

        .settings-wrapper.open .settings-menu {
            display: block;
        }

        .settings-menu button {
            display: block;
            width: 100%;
            min-height: 34px;
            margin: 0 0 7px;
            padding: 7px 10px;
            border: 1px solid #444;
            border-radius: 2px;
            background: #deddee;
            color: #111;
            font-family: inherit;
            font-size: 12.7px;
            font-weight: 500.2;
            cursor: pointer;
        }

        .settings-menu button:last-child {
            margin-bottom: 0;
        }

        .settings-menu button:hover {
            background: var(--header-fill);
        }

        .print-pages {
            display: none;
        }

        @media screen and (max-width: 900px) {
            body {
                padding: 12px;
                overflow-x: auto;
            }

            .page-container {
                margin: 0;
            }
        }

        @page {
            size: A4 portrait;
            margin: 0;
        }

        @media print {
            html,
            body {
                width: 210mm;
                min-height: 297mm;
                margin: 0;
                padding: 0;
                background: #fff;
            }

            .settings-wrapper {
                display: none !important;
            }

            .page-container {
                width: 210mm;
                min-height: 297mm;
                margin: 0;
                padding: 18mm;
                border: 0;
                box-shadow: none;
            }

            body > .page-container {
                display: none;
            }

            .print-pages {
                display: block;
            }

            .print-page {
                width: 210mm;
                height: 297mm;
                margin: 0;
                padding: 18mm;
                overflow: hidden;
                background: #fff;
                break-after: page;
                page-break-after: always;
            }

            .print-page:last-child {
                break-after: auto;
                page-break-after: auto;
            }

            .info-table th,
            .main-table thead th {
                background: var(--header-fill) !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .info-table,
            .info-table tr {
                break-inside: avoid;
                page-break-inside: avoid;
            }

            .main-table {
                break-inside: auto;
                page-break-inside: auto;
            }

            .main-table tr {
                break-inside: auto;
                page-break-inside: auto;
            }

            .main-table thead {
                display: table-header-group;
            }

            .main-table tbody {
                display: table-row-group;
            }
        }
    </style>
</head>
<body>

    <div class="settings-wrapper" id="settings-wrapper">
        <button
            type="button"
            class="settings-toggle"
            id="settings-toggle"
            aria-label="出力設定を開く"
            aria-expanded="false"
        >⚙</button>

        <div class="settings-menu" id="settings-menu">
            <button id="export-excel-btn" type="button">Excelで出力</button>
            <button id="print-pdf-btn" type="button">印刷（PDF／紙）</button>
        </div>
    </div>

    <div class="page-container">
        <div class="timetable-container">

            <div class="document-header">
                <h2>【列車時刻表】</h2>

                <div class="header-meta">
                    作成日時：<span id="created-date"></span><br>
                    出力箇所：<span id="output-location"></span>
                </div>

                <div class="page-number">1 / 1</div>
            </div>

            <table class="info-table" id="info-table">
                <tbody>
                    <tr><th>列車番号</th><td id="train-number-val" colspan="4"></td></tr>
                    <tr><th>列車種別</th><td id="type-val" colspan="4"></td></tr>
                    <tr><th>速度種別</th><td id="speed-val" colspan="4"></td></tr>
                    <tr><th>列車名</th><td id="name-val" colspan="4"></td></tr>
                    <tr><th>始発～終着</th><td id="route-val" colspan="4"></td></tr>
                    <tr><th>旅客案内区間</th><td id="travel-section-val" colspan="4"></td></tr>
                    <tr><th>始発駅日付</th><td id="start-date-val" colspan="4"></td></tr>
                </tbody>
            </table>

            <table class="main-table" id="main-timetable">
                <thead>
                    <tr>
                        <th class="line-name">線区</th>
                        <th class="station-name">駅</th>
                        <th class="time-col-combined">着時刻</th>
                        <th class="time-col-combined">発時刻</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

        </div>
    </div>

    <div class="print-pages" id="print-pages"></div>

    <script>
        const formatTime = (time) => {
            if (!time || time === '―') return '…';
            if (time === '||' || time === '…' || time === '=') return time;

            const parts = String(time).split(':');

            if (parts.length === 3) {
                return `${parts[0]}:${parts[1]} ${parts[2]}`;
            }

            if (parts.length === 2) {
                return `${parts[0]}:${parts[1]}`;
            }

            return String(time);
        };

        const createTimeCell = (
            row,
            time,
            track,
            showTrack,
            forceBlank = false
        ) => {
            const cell = row.insertCell();
            cell.className = 'time-col-combined time-cell';

            const inner = document.createElement('div');
            inner.className = 'time-cell-inner';

            const timeValue = document.createElement('span');
            timeValue.className = 'time-value';
            timeValue.textContent = forceBlank ? '' : formatTime(time);

            if (['…', '||', '='].includes(timeValue.textContent)) {
                inner.classList.add('special-time');
            }

            const trackValue = document.createElement('span');
            trackValue.className = 'track-value';
            trackValue.textContent = showTrack && track ? track : '';

            inner.append(timeValue, trackValue);
            cell.appendChild(inner);
        };

        document.addEventListener('DOMContentLoaded', () => {
            const timetableBody = document.querySelector('#main-timetable tbody');
            const selectedDataString = sessionStorage.getItem('selectedTrainData');

            const settingsWrapper = document.getElementById('settings-wrapper');
            const settingsToggle = document.getElementById('settings-toggle');

            settingsToggle.addEventListener('click', (event) => {
                event.stopPropagation();
                const isOpen = settingsWrapper.classList.toggle('open');
                settingsToggle.setAttribute('aria-expanded', String(isOpen));
            });

            document.addEventListener('click', (event) => {
                if (!settingsWrapper.contains(event.target)) {
                    settingsWrapper.classList.remove('open');
                    settingsToggle.setAttribute('aria-expanded', 'false');
                }
            });

            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');

            document.getElementById('created-date').textContent =
                `${year}年${month}月${day}日 ${hours}時${minutes}分`;
            document.getElementById('output-location').textContent =
                sessionStorage.getItem('selectedOutputLocation') || '東京総合指令室';

            const showError = (message) => {
                timetableBody.innerHTML =
                    `<tr class="error-row"><td colspan="4">${message}</td></tr>`;
            };

            if (!selectedDataString) {
                showError('データがありません。列車選択画面からアクセスしてください。');
                return;
            }

            let allTrainData;

            try {
                allTrainData = JSON.parse(selectedDataString);
            } catch (error) {
                showError('データの解析に失敗しました。');
                return;
            }

            if (!Array.isArray(allTrainData) || allTrainData.length === 0) {
                showError('選択された列車データが空です。');
                return;
            }

            const targetTrainData = allTrainData[0];
            let trainType = targetTrainData.type || '';

            if (trainType === '選択なし') {
                trainType = '';
            }

            document.getElementById('train-number-val').textContent =
                targetTrainData.trainNumber || '';
            document.getElementById('type-val').textContent = trainType;
            document.getElementById('speed-val').textContent =
                targetTrainData.speed || '';
            document.getElementById('name-val').textContent =
                targetTrainData.name || '';
            document.getElementById('route-val').textContent =
                `${targetTrainData.origin || '...'} ～ ${targetTrainData.destination || '...'}`;
            document.getElementById('travel-section-val').textContent =
                `${targetTrainData.origin || '...'} ～ ${targetTrainData.destination || '...'}`;
            document.getElementById('start-date-val').textContent =
                targetTrainData.startDate || '';

            const allStops = [];
            const lineSegments = [];

            allTrainData.forEach((segment, segmentIndex) => {
                const stops = Array.isArray(segment.stops) ? segment.stops : [];
                if (stops.length === 0) return;

                let startRow;

                if (
                    segmentIndex > 0 &&
                    allStops.length > 0 &&
                    allStops[allStops.length - 1].station === stops[0].station
                ) {
                    startRow = allStops.length - 0.5;

                    for (let index = 1; index < stops.length; index++) {
                        allStops.push({
                            line: segment.line,
                            segmentIndex,
                            ...stops[index]
                        });
                    }
                } else {
                    startRow = allStops.length;

                    stops.forEach((stop) => {
                        allStops.push({
                            line: segment.line,
                            segmentIndex,
                            ...stop
                        });
                    });
                }

                lineSegments.push({
                    line: segment.line,
                    startRow
                });
            });

            lineSegments.forEach((segment, index) => {
                segment.endRow =
                    index + 1 < lineSegments.length
                        ? lineSegments[index + 1].startRow
                        : allStops.length;
            });

            const appendLineCell = (
                row,
                rowCount,
                rangeStart,
                rangeEnd
            ) => {
                if (rowCount === 0) return;

                const lineCell = row.insertCell();
                lineCell.className = 'line-name';
                lineCell.rowSpan = rowCount;

                const overlay = document.createElement('div');
                overlay.className = 'line-overlay';

                const visibleSegments = lineSegments
                    .map((segment) => ({
                        ...segment,
                        visibleStart: Math.max(segment.startRow, rangeStart),
                        visibleEnd: Math.min(segment.endRow, rangeEnd)
                    }))
                    .filter((segment) =>
                        segment.visibleEnd > segment.visibleStart
                    );

                visibleSegments.forEach((segment, segmentIndex) => {
                    const displayLineName = segment.line
                        ? (String(segment.line).endsWith('線')
                            ? String(segment.line)
                            : `${segment.line}線`)
                        : '...';

                    const topPercent =
                        ((segment.visibleStart - rangeStart) / rowCount) * 100;
                    const bottomPercent =
                        ((segment.visibleEnd - rangeStart) / rowCount) * 100;

                    const label = document.createElement('div');
                    label.className = 'line-segment-label';
                    label.style.top = `${topPercent}%`;
                    label.style.height = `${bottomPercent - topPercent}%`;
                    label.textContent = displayLineName;
                    overlay.appendChild(label);

                    if (segmentIndex > 0) {
                        const divider = document.createElement('div');
                        divider.className = 'line-segment-divider';
                        divider.style.top = `${topPercent}%`;
                        overlay.appendChild(divider);
                    }
                });

                lineCell.appendChild(overlay);
            };

            const appendStopCells = (row, stop, globalRowIndex) => {
                const stationCell = row.insertCell();
                stationCell.className = 'station-name';
                const stationName = stop.station || '...';
                const compactStationName = String(stationName).replace(/[\s\u3000]/g, '');

                if (
                    compactStationName.length === 2 &&
                    compactStationName !== String(stationName)
                ) {
                    const stationNameInner = document.createElement('span');
                    stationNameInner.className = 'station-name-two-chars';

                    [...compactStationName].forEach((character) => {
                        const characterSpan = document.createElement('span');
                        characterSpan.textContent = character;
                        stationNameInner.appendChild(characterSpan);
                    });

                    stationCell.appendChild(stationNameInner);
                } else {
                    stationCell.textContent = stationName;
                }

                const normalizedStationName = String(stop.station || '')
                    .replace(/[\s\u3000]/g, '');
                const normalizedOriginName = String(targetTrainData.origin || '')
                    .replace(/[\s\u3000]/g, '');
                const isActualOriginRow =
                    globalRowIndex === 0 &&
                    normalizedOriginName !== '' &&
                    normalizedStationName === normalizedOriginName;

                const showArrivalTrack = !isActualOriginRow;
                const showDepartureTrack =
                    String(stop.departure ?? '').trim() !== '=';

                createTimeCell(
                    row,
                    stop.arrival,
                    stop.trackN || '',
                    showArrivalTrack,
                    isActualOriginRow
                );
                createTimeCell(
                    row,
                    stop.departure,
                    stop.trackN || '',
                    showDepartureTrack
                );
            };

            const renderRows = (
                body,
                stops,
                rangeStart,
                rangeEnd
            ) => {
                stops.forEach((stop, localRowIndex) => {
                    const row = body.insertRow();

                    if (localRowIndex === 0) {
                        appendLineCell(
                            row,
                            stops.length,
                            rangeStart,
                            rangeEnd
                        );
                    }

                    appendStopCells(row, stop, rangeStart + localRowIndex);
                });
            };

            renderRows(timetableBody, allStops, 0, allStops.length);

            const buildPrintPages = () => {
                const printPages = document.getElementById('print-pages');
                const firstPageRowLimit = 38;
                const followingPageRowLimit = 45;
                const pageRanges = [];

                let rangeStart = 0;
                let rowLimit = firstPageRowLimit;

                while (rangeStart < allStops.length) {
                    const rangeEnd = Math.min(
                        rangeStart + rowLimit,
                        allStops.length
                    );
                    pageRanges.push({ start: rangeStart, end: rangeEnd });
                    rangeStart = rangeEnd;
                    rowLimit = followingPageRowLimit;
                }

                if (pageRanges.length === 0) {
                    pageRanges.push({ start: 0, end: 0 });
                }

                printPages.innerHTML = '';

                pageRanges.forEach((range, pageIndex) => {
                    const page = document.createElement('section');
                    page.className = 'print-page';

                    if (pageIndex === 0) {
                        const header = document
                            .querySelector('.document-header')
                            .cloneNode(true);
                        const pageNumber = header.querySelector('.page-number');
                        if (pageNumber) {
                            pageNumber.textContent =
                                `1 / ${pageRanges.length}`;
                        }
                        header.querySelectorAll('[id]').forEach((element) => {
                            element.removeAttribute('id');
                        });
                        page.appendChild(header);

                        const infoTable = document
                            .getElementById('info-table')
                            .cloneNode(true);
                        infoTable.removeAttribute('id');
                        infoTable.querySelectorAll('[id]').forEach((element) => {
                            element.removeAttribute('id');
                        });
                        page.appendChild(infoTable);
                    }

                    const table = document.createElement('table');
                    table.className = 'main-table';
                    table.appendChild(
                        document
                            .querySelector('#main-timetable thead')
                            .cloneNode(true)
                    );

                    const body = document.createElement('tbody');
                    table.appendChild(body);
                    page.appendChild(table);

                    renderRows(
                        body,
                        allStops.slice(range.start, range.end),
                        range.start,
                        range.end
                    );

                    printPages.appendChild(page);
                });
            };

            buildPrintPages();

            document
                .getElementById('export-excel-btn')
                .addEventListener('click', () => {
                    let csvContent = 'data:text/csv;charset=utf-8,\uFEFF';

                    document
                        .querySelectorAll('#info-table tr')
                        .forEach((row) => {
                            const th = row.querySelector('th');
                            const td = row.querySelector('td');

                            if (th && td) {
                                const header = th.textContent
                                    .trim()
                                    .replace(/,/g, '、');
                                const data = td.textContent
                                    .trim()
                                    .replace(/,/g, '、');

                                csvContent += `${header},${data}\n`;
                            }
                        });

                    csvContent += '\n';
                    csvContent +=
                        ['線区', '駅', '着時刻', '発時刻', '着発線'].join(',') +
                        '\n';

                    allStops.forEach((stop) => {
                        const rowData = [
                            stop.line || '...',
                            stop.station || '...',
                            formatTime(stop.arrival),
                            formatTime(stop.departure),
                            stop.trackN || '...'
                        ];

                        csvContent += rowData
                            .map((item) =>
                                String(item).trim().replace(/,/g, '、')
                            )
                            .join(',') + '\n';
                    });

                    const link = document.createElement('a');
                    link.href = encodeURI(csvContent);
                    link.download =
                        `列車時刻表_${targetTrainData.trainNumber || '列車'}.csv`;

                    document.body.appendChild(link);
                    link.click();
                    link.remove();

                    settingsWrapper.classList.remove('open');
                    settingsToggle.setAttribute('aria-expanded', 'false');
                });

            document
                .getElementById('print-pdf-btn')
                .addEventListener('click', () => {
                    settingsWrapper.classList.remove('open');
                    settingsToggle.setAttribute('aria-expanded', 'false');
                    window.print();
                });
        });
    </script>
