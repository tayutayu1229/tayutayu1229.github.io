<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【列車時刻表選択画面】</title>
    <style>
        /* CSS */
        body {
            font-family: 'ＭＳ Ｐゴシック', 'MS PGothic', sans-serif;
            background-color: #f0f0f0;
            color: #000000;
            margin: 20px;
            padding: 0;
            font-size: 14px;
        }

        .container {
            width: 80%;
            margin: 0 auto;
            background-color: #ffffff;
            border: 1px solid #000000;
            padding: 15px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }

        h2 {
            font-size: 18px;
            text-align: center;
            margin-top: 0;
            border-bottom: 2px solid #000000;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }

        /* 検索フォームのスタイル */
        .search-form {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }

        .search-form label {
            font-weight: bold;
            white-space: nowrap;
        }

        .search-form input[type="text"] {
            padding: 5px;
            border: 1px solid #000000;
            font-family: 'ＭＳ Ｐゴシック', 'MS PGothic', sans-serif;
            box-sizing: border-box;
        }

        .search-form button {
            padding: 5px 15px;
            background-color: #e0e0e0;
            border: 1px solid #000000;
            cursor: pointer;
            font-family: 'ＭＳ Ｐゴシック', 'MS PGothic', sans-serif;
        }
        .search-form button:hover {
            background-color: #d0d0d0;
        }

        /* テーブルを横スクロール可能にするラッパー（タブレット・スマホ用） */
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .select-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .select-table th, .select-table td {
            border: 1px solid #000000;
            padding: 5px;
            text-align: left;
            word-break: break-word;
        }

        .select-table th {
            background-color: #e0e0e0;
            text-align: center;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        .select-table th:hover {
            background-color: #d0d0d0;
        }

        /* ソートアイコン（絵文字化を避けるためCSSの三角形で描画） */
        .select-table th .sort-icon {
            display: inline-block;
            width: 9px;
            height: 11px;
            margin-left: 5px;
            position: relative;
            vertical-align: middle;
        }

        .select-table th .sort-icon::before,
        .select-table th .sort-icon::after {
            content: '';
            position: absolute;
            left: 0;
            width: 0;
            height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
        }

        /* 未ソート状態：上下両方の三角形を薄く表示 */
        .select-table th .sort-icon::before {
            top: 0;
            border-bottom: 4px solid #999999;
        }

        .select-table th .sort-icon::after {
            bottom: 0;
            border-top: 4px solid #999999;
        }

        /* 昇順：上向き三角形のみ濃く表示 */
        .select-table th .sort-icon.sort-asc::before {
            border-bottom-color: #000000;
        }
        .select-table th .sort-icon.sort-asc::after {
            display: none;
        }

        /* 降順：下向き三角形のみ濃く表示 */
        .select-table th .sort-icon.sort-desc::after {
            border-top-color: #000000;
        }
        .select-table th .sort-icon.sort-desc::before {
            display: none;
        }

        .select-table tbody tr {
            cursor: pointer;
        }

        .select-table tbody tr:hover {
            background-color: #f0f8ff;
        }

        /* ============ レスポンシブ対応（タブレット） ============ */
        @media screen and (max-width: 1024px) {
            .container {
                width: 92%;
                padding: 12px;
            }
        }

        /* ============ レスポンシブ対応（スマホ／小型タブレット） ============ */
        @media screen and (max-width: 768px) {
            body {
                margin: 10px;
                font-size: 13px;
            }

            .container {
                width: 100%;
                padding: 10px;
            }

            h2 {
                font-size: 16px;
            }

            .search-form {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }

            .search-form label {
                white-space: normal;
            }

            .search-form input[type="text"] {
                width: 100%;
            }

            .search-form button {
                width: 100%;
                padding: 8px 15px;
            }

            /* テーブルは横スクロールで最低幅を確保して読みやすくする */
            .select-table {
                min-width: 600px;
            }
        }

        @media screen and (max-width: 480px) {
            body {
                margin: 6px;
                font-size: 12px;
            }

            .container {
                padding: 8px;
            }

            .select-table th, .select-table td {
                padding: 4px;
            }

            .select-table {
                min-width: 520px;
            }
        }
    
.back-button{padding:8px 14px;margin-bottom:10px;cursor:pointer;}
.search-form input{flex:1;min-width:180px;}

/* 選択画面専用の新しいレイアウト */
:root {
    --accent: #176b4d;
    --accent-dark: #0f5139;
    --accent-soft: #e8f4ef;
    --border: #d6dedb;
    --text: #17211e;
    --muted: #63706c;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    padding: 32px 20px 56px;
    background: #eef3f1;
    color: var(--text);
    font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    font-size: 15px;
}

.container {
    width: min(1180px, 100%);
    margin: 0 auto;
    padding: 28px;
    border: 0;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(24, 55, 44, .10);
}

.page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
}

h2 {
    margin: 0;
    padding: 0;
    border: 0;
    text-align: left;
    font-size: clamp(21px, 3vw, 28px);
    letter-spacing: .04em;
}

.back-button {
    flex: 0 0 auto;
    min-height: 42px;
    margin: 0;
    padding: 9px 15px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
    color: var(--text);
    font: inherit;
}

.search-form {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr)) auto;
    align-items: end;
    gap: 14px;
    margin: 0 0 24px;
    padding: 20px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: #f8faf9;
}

.field { min-width: 0; }
.field label {
    display: block;
    margin-bottom: 7px;
    color: #374640;
    font-size: 13px;
    font-weight: 700;
}

.search-form input,
.search-form select {
    width: 100%;
    min-width: 0;
    height: 44px;
    padding: 9px 11px;
    border: 1px solid #aebbb6;
    border-radius: 7px;
    background: #fff;
    color: var(--text);
    font: inherit;
}

.search-form input:focus,
.search-form select:focus {
    outline: 3px solid rgba(23, 107, 77, .16);
    border-color: var(--accent);
}

.search-form button {
    height: 44px;
    padding: 8px 22px;
    border: 1px solid var(--accent-dark);
    border-radius: 7px;
    background: var(--accent);
    color: #fff;
    font: inherit;
    font-weight: 700;
}
.search-form button:hover { background: var(--accent-dark); }

.location-status {
    min-height: 1.4em;
    margin: -14px 0 18px;
    color: var(--muted);
    font-size: 12px;
}

.table-wrapper {
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
}

.select-table { table-layout: auto; }
.select-table th,
.select-table td {
    padding: 12px 14px;
    border: 0;
    border-bottom: 1px solid #e3e9e6;
}
.select-table th { background: #e7eeeb; }
.select-table tbody tr:last-child td { border-bottom: 0; }
.select-table tbody tr:hover { background: var(--accent-soft); }

@media (max-width: 900px) {
    body { padding: 18px 12px 40px; }
    .container { width: 100%; padding: 20px; }
    .search-form { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .search-form button { grid-column: 1 / -1; }
}

@media (max-width: 600px) {
    body { margin: 0; padding: 10px 8px 28px; font-size: 14px; }
    .container { padding: 16px 12px; border-radius: 10px; }
    .page-header { align-items: flex-start; flex-direction: column-reverse; margin-bottom: 18px; }
    .back-button { min-height: 40px; }
    .search-form { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 14px; }
    .search-form button { grid-column: auto; width: 100%; }
    .location-status { margin-top: -12px; }

    .table-wrapper { border: 0; overflow: visible; }
    .select-table,
    .select-table tbody,
    .select-table tr,
    .select-table td { display: block; width: 100%; }
    .select-table { min-width: 0; }
    .select-table thead { display: none; }
    .select-table tbody { display: grid; gap: 12px; }
    .select-table tbody tr {
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
        box-shadow: 0 2px 7px rgba(24, 55, 44, .06);
    }
    .select-table tbody td {
        display: grid;
        grid-template-columns: 7.5em minmax(0, 1fr);
        gap: 8px;
        padding: 5px 0;
        border: 0;
        word-break: break-word;
    }
    .select-table tbody td::before {
        content: attr(data-label);
        color: var(--muted);
        font-weight: 700;
    }
    .select-table tbody td[colspan] { display: block; text-align: center !important; }
    .select-table tbody td[colspan]::before { content: none; }
}

</style>
</head>
<body>

    <div class="container">
        <div class="page-header">
            <h2>列車時刻表 選択</h2>
            <button class="back-button" type="button" onclick="history.back()">← 前の画面へ戻る</button>
        </div>
        
        <div class="search-form">
            <div class="field">
                <label for="output-location">出力箇所</label>
                <select id="output-location" required aria-describedby="location-status">
                    <option value="">読み込み中…</option>
                </select>
            </div>
            <div class="field">
                <label for="search-date">施行日</label>
                <input type="search" id="search-date" placeholder="例：2025/11/21">
            </div>
            <div class="field">
                <label for="search-number">列車番号</label>
                <input type="search" id="search-number" placeholder="例：8764">
            </div>
            <div class="field">
                <label for="search-station">駅名</label>
                <input type="search" id="search-station" placeholder="始発・終着駅">
            </div>

            <button id="search-button" type="button">検索</button>
        </div>
        <p class="location-status" id="location-status" aria-live="polite"></p>

        <div class="table-wrapper">
            <table class="select-table" id="timetable-list">
                <thead>
                    <tr>
                        <th style="width: 15%;" data-col="startDate">施行日<span class="sort-icon"></span></th>
                        <th style="width: 10%;" data-col="type">列車種別<span class="sort-icon"></span></th>
                        <th style="width: 15%;" data-col="trainNumber">列車番号<span class="sort-icon"></span></th>
                        <th style="width: 50%;" data-col="section">区間（始発〜終着）<span class="sort-icon"></span></th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="../../auth_guard.js"></script>
    <script src="../../T-time/private-data-client.js"></script>
    <script>
        // JavaScript
        document.addEventListener('DOMContentLoaded', () => {
            const listBody = document.querySelector('#timetable-list tbody');
            const searchDateInput = document.getElementById('search-date');
            const searchNumberInput = document.getElementById('search-number');
            const searchStationInput=document.getElementById('search-station');
            const searchButton = document.getElementById('search-button');
            const outputLocationSelect = document.getElementById('output-location');
            const locationStatus = document.getElementById('location-status');
            const WORKBASE_URL = 'https://tayunet-traininfo.com/JREgyoumu/workdata/workbase.json';
            
            let cachedAllData = [];

            const loadOutputLocations = async () => {
                try {
                    const response = await fetch(WORKBASE_URL);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const locations = await response.json();
                    if (!Array.isArray(locations) || locations.length === 0) {
                        throw new Error('出力箇所が空です。');
                    }

                    outputLocationSelect.innerHTML = '';
                    locations.forEach((location) => {
                        const option = document.createElement('option');
                        option.value = String(location);
                        option.textContent = String(location);
                        outputLocationSelect.appendChild(option);
                    });

                    const previous = sessionStorage.getItem('selectedOutputLocation');
                    if (previous && locations.includes(previous)) {
                        outputLocationSelect.value = previous;
                    }
                    locationStatus.textContent = '';
                } catch (error) {
                    console.error('Error fetching output locations:', error);
                    outputLocationSelect.innerHTML = '<option value="東京総合指令室">東京総合指令室</option>';
                    locationStatus.textContent = '出力箇所一覧を読み込めないため、既定値を表示しています。';
                }
            };

            // ソート状態管理
            let sortCol = null;   // 現在のソート列キー
            let sortDir = 'asc';  // 'asc' or 'desc'

            // fetchでJSON_PATHからデータを取得する関数
            const loadTimetables = async () => {
                try {
                    cachedAllData = await TayunetPrivateData.fetchTimetables();
                    renderTimetableList(cachedAllData);
                } catch (error) {
                    console.error('Error fetching the timetable data:', error);
                    listBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color: red;">保護データを読み込めません。データ用ログイン後に再読み込みしてください。</td></tr>';
                    cachedAllData = [];
                }
            };

            // ソートアイコンを更新する関数
            const updateSortIcons = () => {
                document.querySelectorAll('.select-table th').forEach(th => {
                    const icon = th.querySelector('.sort-icon');
                    if (!icon) return;
                    const col = th.getAttribute('data-col');
                    icon.classList.remove('sort-asc', 'sort-desc');
                    if (col === sortCol) {
                        icon.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
                    }
                });
            };

            // グループ化済みデータのリストをソートする関数
            // entries: [{key, group, rep}] の配列
            const sortEntries = (entries) => {
                if (!sortCol) return entries;
                return [...entries].sort((a, b) => {
                    let aVal = '';
                    let bVal = '';
                    if (sortCol === 'section') {
                        aVal = `${a.rep.origin || ''}〜${a.rep.destination || ''}`;
                        bVal = `${b.rep.origin || ''}〜${b.rep.destination || ''}`;
                    } else {
                        aVal = a.rep[sortCol] || '';
                        bVal = b.rep[sortCol] || '';
                    }
                    const cmp = aVal.localeCompare(bVal, 'ja');
                    return sortDir === 'asc' ? cmp : -cmp;
                });
            };
            
            // フィルタリングとグルーピングを行い、テーブルを描画する関数
            const renderTimetableList = (data) => {
                listBody.innerHTML = '';

                if (data.length === 0) {
                     listBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">該当するデータがありません。</td></tr>';
                     return;
                }
                
                // 列車を一意に識別するためのキーでグループ化
                const groupedTrains = data.reduce((acc, train) => {
                    const key = `${train.startDate}-${train.trainNumber}-${train.origin}-${train.destination}`;
                    if (!acc[key]) {
                        acc[key] = [];
                    }
                    acc[key].push(train);
                    return acc;
                }, {});

                // グループをエントリ配列に変換
                let entries = Object.keys(groupedTrains).map(key => ({
                    key,
                    group: groupedTrains[key],
                    rep: groupedTrains[key][0]
                }));

                // ソートが未指定の場合はデフォルトで逆順（末尾から表示）
                if (!sortCol) {
                    entries = entries.reverse();
                } else {
                    entries = sortEntries(entries);
                }

                entries.forEach(({ group, rep }) => {
                    const row = listBody.insertRow();
                    const dateCell = row.insertCell();
                    dateCell.dataset.label = '施行日';
                    dateCell.textContent = rep.startDate || '―';
                    
                    let trainType = rep.type || '';
                    if (trainType === "選択なし") {
                        trainType = "";
                    }
                    const typeCell = row.insertCell();
                    typeCell.dataset.label = '列車種別';
                    typeCell.textContent = trainType;
                    
                    const numberCell = row.insertCell();
                    numberCell.dataset.label = '列車番号';
                    numberCell.textContent = rep.trainNumber || '―';
                    
                    const sectionCell = row.insertCell();
                    sectionCell.dataset.label = '区間';
                    sectionCell.textContent = `${rep.origin || '―'} 〜 ${rep.destination || '―'}`;

                    row.addEventListener('click', () => {
                        if (!outputLocationSelect.value) {
                            outputLocationSelect.focus();
                            locationStatus.textContent = '出力箇所を選択してください。';
                            return;
                        }
                        sessionStorage.setItem('selectedTrainData', JSON.stringify(group));
                        sessionStorage.setItem('selectedOutputLocation', outputLocationSelect.value);
                        window.location.href = 'train_timetable.html';
                    });
                });

                updateSortIcons();
            };
            
            // 検索実行関数
            const applySearchFilter = () => {
                const dateFilter = searchDateInput.value.trim().toLowerCase();
                const numberFilter = searchNumberInput.value.trim().toLowerCase();
                const stationFilter=searchStationInput.value.trim().toLowerCase();
                
                const filteredData = cachedAllData.filter(train => {
                    let dateMatch = true;
                    let numberMatch = true;
                    
                    if (dateFilter) {
                        dateMatch = (train.startDate && train.startDate.toLowerCase().includes(dateFilter));
                    }
                    
                    if (numberFilter) {
                        numberMatch = (train.trainNumber && train.trainNumber.toLowerCase().includes(numberFilter));
                    }
                    
                    let stationMatch=true;
                    if(stationFilter){
                      stationMatch=((train.origin||'').toLowerCase().includes(stationFilter)|| (train.destination||'').toLowerCase().includes(stationFilter));
                    }
                    return dateMatch && numberMatch && stationMatch;
                });
                
                renderTimetableList(filteredData);
            };

            // 列ヘッダーのソートイベント
            document.querySelectorAll('.select-table th[data-col]').forEach(th => {
                th.addEventListener('click', () => {
                    const col = th.getAttribute('data-col');
                    if (sortCol === col) {
                        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
                    } else {
                        sortCol = col;
                        sortDir = 'asc';
                    }
                    applySearchFilter();
                });
            });


            //検索イベント？？？
            searchButton.addEventListener('click', applySearchFilter);

            [searchDateInput, searchNumberInput, searchStationInput].forEach(input => {

                input.addEventListener('keydown', e => {
                    if (e.key === 'Enter') {
                        applySearchFilter();
                    }
                });
                input.addEventListener('input', applySearchFilter);

            });

            
            // 初期データのロード
            loadOutputLocations();
            loadTimetables();
        });
    </script>
</body>
</html>
