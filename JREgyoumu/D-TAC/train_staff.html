<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>列車運転時刻表</title>
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
    body, html {
        margin: 0;
        padding: 0;
        background-color: #555;
        /* よりスタフらしい少し太めのゴシック体へ */
        font-family: "BIZ UDPGothic", "MS Gothic", sans-serif;
        -webkit-font-smoothing: antialiased;
    }

    /* ── 紙エリア (A3タテ全体を定義) ── */
    #staff-area {
        display: flex;
        width: 297mm;
        min-height: 420mm;
        background: #fff;
        margin: 0 auto; /* 画面中央へ */
        box-sizing: border-box;
        border: 1px solid #ccc; /* 画面確認用の境界 */
    }

    /* ── 1列車分のカラム (A3の半分 = 148.5mm) ── */
    .staff-column {
        width: 50%;
        padding: 5mm 6mm; /* 余白を実物に合わせ詰める */
        box-sizing: border-box;
        border-right: 1px dashed #bbb; /* 切り取り線 */
        position: relative;
    }

    /* ── トンボ (印刷時非表示) ── */
    @media screen {
        .staff-column::before, .staff-column::after {
            content: '+';
            position: absolute;
            font-size: 16px;
            font-weight: bold;
            color: #000;
        }
        .staff-column::before { top: 1mm; left: 1mm; }
        .staff-column::after  { top: 1mm; right: 1mm; }
    }

    /* ── テーブル共通 (罫線のメリハリ) ── */
    .info-table, .main-timetable {
        width: 100%;
        border-collapse: collapse;
        border: 2.5px solid #000; /* 外枠を太く */
        table-layout: fixed;
    }

    .info-table td, .main-timetable th, .main-timetable td {
        border: 1px solid #000;
        text-align: center;
        vertical-align: middle;
    }

    /* ── ヘッダー ── */
    .staff-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        border-bottom: 2px solid #000;
        padding-bottom: 1px;
        margin-bottom: 1mm;
    }
    .hd-no { font-size: 20px; font-weight: 900; }
    .hd-right { text-align: right; font-size: 11px; font-weight: 800; line-height: 1.2; }
    .hd-date { font-size: 11px; font-weight: 800; margin-bottom: 1mm; }

    /* ── 列車番号テーブル ── */
    .train-num-cell {
        font-size: 44px !important; /* 最大級に大きく */
        font-weight: 900;
        height: 60px !important;
        text-align: left !important;
        padding-left: 8px !important;
        font-family: Arial, sans-serif;
    }

    /* ── メイン時刻表 ── */
    .main-timetable { border-top: none; }
    .main-timetable th {
        font-size: 9px;
        font-weight: 800;
        height: 22px;
        background-color: #f2f2f2; /* 見出しに薄いグレー */
    }

    /* ── カラム配分の決定版 (駅名を適正幅に固定) ── */
    .col-jifun   { width: 34px; }
    .col-station { width: 110px; } /* 実物を参考に、狭く固定 */
    .col-arr     { width: 85px; }
    .col-dep     { width: 85px; }
    .col-line    { width: 45px; }
    .col-limit   { width: 35px; }
    .col-memo    { width: 40px; }

    /* ── 駅名のデザイン (均等割付) ── */
    .st-name-text {
        font-size: 16px;
        font-weight: 900;
        text-align: justify;
        text-align-last: justify; /* 文字をセル幅いっぱいに散らす */
        padding: 0 5px;
        white-space: nowrap;
    }

    /* ── 通過駅の赤文字設定 (重要) ── */
    .st-passing, .time-passing {
        color: #e60012 !important; /* JRの赤に近い鮮やかな赤 */
    }

    /* ── 時刻表示 (左寄せ・秒は底) ── */
    .time-container {
        display: flex;
        align-items: baseline; /* 時、分、秒の底辺を揃える */
        justify-content: flex-start; /* 左寄せ */
        padding-left: 8px;
        height: 100%;
    }
    .time-main {
        font-size: 28px;
        font-weight: 900;
        font-family: Arial, sans-serif;
        line-height: 1;
        letter-spacing: -1px;
    }
    .time-sec {
        font-size: 15px;
        font-weight: 900;
        margin-left: 1px;
        /* 秒数をセルの底に近づける微調整 */
        transform: translateY(-1px);
    }

    /* ── 運転時分 ── */
    .jifun-cell { font-size: 18px; font-weight: 900; }
    .jifun-sec { font-size: 12px; vertical-align: super; }

    /* ── その他パーツ ── */
    .track-num { font-size: 18px; font-weight: 900; font-style: italic; }
    .pass-arrow { color: #e60012; font-size: 32px; font-weight: 900; }

    /* 両数行 */
    .car-num-row td { height: 35px; background-color: #fff; }

    /* ── 注意事項・フッター ── */
    .notes-area { border: 2.5px solid #000; border-top: none; min-height: 40px; padding: 4px; font-size: 12px; font-weight: 800; }
    .staff-footer { font-size: 10px; font-weight: 700; margin-top: 2mm; }

    @media print {
        @page { size: A3 portrait; margin: 0; }
        body { background: #fff; }
        #staff-area { margin: 0; border: none; }
    }
</style>
</head>
<body>
    <div id="staff-area">
        <div id="render-target" style="display: contents;">
            </div>
    </div>
    <script src="train_staff.js"></script>
</body>
</html>
