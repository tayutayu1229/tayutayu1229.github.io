<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>列車運転時刻表（A3スタフ）</title>
  <style>
    :root { color-scheme:light; --red:#ed1118; --blue:#0757b5; --line:#111; }
    * { box-sizing:border-box; }
    html,body { margin:0; min-height:100%; }
    body {
      background:#4d5154; color:#111; padding:18px;
      font-family:"Yu Gothic","Hiragino Kaku Gothic ProN",sans-serif;
    }
    .toolbar {
      position:sticky; top:10px; z-index:5; width:297mm; max-width:100%; margin:0 auto 12px;
      display:flex; align-items:center; justify-content:space-between; gap:16px;
      color:white; font-size:13px;
    }
    .toolbar-actions { display:flex; align-items:center; gap:8px; }
    .zoom-control { display:flex; align-items:center; gap:7px; font-weight:700; }
    .zoom-control input { width:110px; accent-color:#fff; }
    .zoom-control output { width:3.5em; text-align:right; font-variant-numeric:tabular-nums; }
    .date-control { display:flex; align-items:center; gap:7px; font-weight:700; }
    .date-control input { border:1px solid #bbb; border-radius:4px; padding:7px 9px; font:inherit; }
    button { border:0; border-radius:4px; padding:8px 15px; font:700 13px inherit; cursor:pointer; }
    .primary { background:#fff; color:#111; }
    .sheet-wrap { width:297mm; height:420mm; margin:0 auto 18px; }
    .a3-sheet {
      width:297mm; height:420mm; margin:0; display:grid; grid-template-columns:1fr 1fr;
      background:#fff; box-shadow:0 6px 28px #0009; overflow:hidden;
      transform:scale(1); transform-origin:top left;
    }
    .half {
      position:relative; width:148.5mm; height:420mm; padding:7mm 6mm 7mm;
      background:white; overflow:hidden;
    }
    .half + .half { border-left:.25mm dashed #2d5b86; }
    .crop { position:absolute; font:400 12px/1 monospace; }
    .crop.tl { top:2.4mm; left:3.2mm; } .crop.tr { top:2.4mm; right:3.2mm; }
    .crop.bl { bottom:2.4mm; left:3.2mm; } .crop.br { bottom:2.4mm; right:3.2mm; }
    .page-head { display:grid; grid-template-columns:1fr auto; align-items:start; min-height:12mm; }
    .page-no { color:var(--blue); font:700 14px/1 Arial,sans-serif; letter-spacing:.24em; padding-top:1mm; }
    .office { text-align:right; font-size:12px; font-weight:900; line-height:1.15; letter-spacing:.13em; }
    .effective { font-size:11px; font-weight:700; letter-spacing:.11em; margin:0 0 .7mm; }
    .card { margin:0 0 7mm; break-inside:avoid; }
    table { width:100%; border-collapse:collapse; table-layout:fixed; }
    th,td { border:.28mm solid var(--line); padding:0; }
    .staff { border:.75mm solid var(--line); }
    .staff .top-label th { height:9mm; font-size:10px; font-weight:800; line-height:1.02; }
    .staff .top-value td { height:13mm; text-align:center; }
    .train-no { padding:0!important; text-align:center!important; font:800 29px/.92 "DIN Condensed","Arial Narrow",Arial,sans-serif; letter-spacing:.1em; white-space:nowrap; }
    .train-no .compressed { transform:none; transform-origin:center; }
    .speed { padding:.5mm!important; font-size:11px; font-weight:800; line-height:1.05; }
    .speed-kind { padding:.5mm!important; font-size:16px; font-weight:900; line-height:1.05; white-space:nowrap; overflow:hidden; }
    .speed-kind > span { display:inline-block; max-width:100%; transform:scaleX(.88); transform-origin:center; }
    .speed-kind.kind-long { font-size:12px; white-space:normal; overflow-wrap:anywhere; }
    .speed-kind.kind-long > span { transform:none; }
    .speed-kind.kind-xlong { font-size:9px; }
    .power { font-size:11px; font-weight:700; line-height:1.08; letter-spacing:.12em; }
    .staff .column-head th { height:10mm; padding:0 .2mm; font-size:15px; font-weight:900; line-height:.9; }
    .cars-row td { height:12mm; border-bottom:.32mm solid var(--line); text-align:left; padding-left:21mm; }
    .cars-row.empty-cars td { height:5mm; padding-left:0; }
    .cars { font:400 36px/.8 "DIN Condensed","Arial Narrow",Arial,sans-serif; }
    .cars small { font:700 9px/1 sans-serif; margin-left:1mm; }
    .continuation { font-size:7px; margin-left:6mm; }
    .stop-row td { height:var(--row-height,10.5mm); }
    .stop-row .run { position:relative; height:100%; vertical-align:middle; overflow:visible; border-top:0; border-bottom:0; text-align:center; font:800 var(--run-font,21px)/1 "DIN Condensed","Arial Narrow",Arial,sans-serif; white-space:nowrap; }
    .stop-row .run::after { content:""; position:absolute; z-index:1; left:0; right:0; top:50%; border-top:.28mm solid var(--line); }
    .run-value { position:absolute; z-index:2; left:50%; top:0; display:inline-flex; align-items:baseline; transform:translate(-50%,-50%) scaleX(.88); transform-origin:center; }
    .run-second { display:inline-block; font-size:var(--run-sec-font,15px); line-height:1; position:relative; top:.16em; margin-left:.08em; transform:scaleX(.94); transform-origin:left center; }
    .station { padding:0 .35mm!important; font-size:var(--station-font,20px); font-weight:900; letter-spacing:0; text-align:center; white-space:nowrap; }
    .station.pass { color:var(--red); }
    .time { position:relative; height:100%; width:100%; overflow:hidden; white-space:nowrap; font:800 var(--time-font,26px)/1 "DIN Condensed","Arial Narrow",Arial,sans-serif; letter-spacing:-.04em; }
    .time .hour-part { position:absolute; right:57%; top:50%; transform:translateY(-50%); }
    .time .minute-group { position:absolute; left:43%; top:50%; transform:translateY(-50%); display:inline-flex; align-items:baseline; }
    .time .minute-part { display:inline-block; }
    .time .second-part { display:inline-block; font-size:var(--time-sec-font,16px); line-height:1; position:relative; top:.18em; margin-left:.12em; transform:scaleX(.94); transform-origin:left center; }
    .time.pass { color:var(--red); }
    .arrow { height:100%; padding:.45mm 0; color:var(--red); display:flex; align-items:center; justify-content:center; overflow:hidden; text-align:center; font:900 var(--arrow-font,29px)/1 Arial,sans-serif; }
    .endmark { position:relative; width:100%; height:100%; overflow:hidden; }
    .endmark::before,.endmark::after { content:""; position:absolute; left:22%; width:56%; height:.65mm; background:#111; border-radius:.15mm; }
    .endmark::before { top:calc(50% - 1.35mm); }
    .endmark::after { top:calc(50% + .45mm); }
    .track { color:#078fdd; text-align:center; font:900 var(--track-font,23px)/.88 "HanziPen SC","Klee",cursive; white-space:nowrap; }
    .track .track-glyph { display:inline-block; transform:scaleX(1.12) scaleY(.78) skewX(-7deg); }
    .track .track-glyph.len-3 { font-size:.76em; transform:scaleX(.92) scaleY(.78) skewX(-5deg); }
    .track .track-glyph.len-4 { font-size:.62em; transform:scaleX(.85) scaleY(.78) skewX(-4deg); }
    .track .track-glyph.len-5 { font-size:.52em; transform:scaleX(.78) scaleY(.78) skewX(-3deg); }
    .compressed { display:inline-block; transform:scaleX(.78); transform-origin:center; }
    .station-glyphs { width:4em; max-width:100%; margin:auto; display:flex; align-items:center; justify-content:space-between; transform:scaleY(.9); }
    .station-glyphs > span { flex:0 0 1em; width:1em; text-align:center; }
    .station-glyphs.single { justify-content:center; }
    .station-glyphs.long { width:100%; transform:scaleX(.72) scaleY(.9); }
    .limit { color:var(--red); text-align:center; font:700 10px/1 Arial,sans-serif; }
    .memo { padding:.6mm!important; vertical-align:top; font-size:7px; font-weight:700; overflow-wrap:anywhere; }
    .tail-row td { height:10mm; border-top:.32mm solid var(--line); font-size:10px; font-weight:700; text-align:center; }
    .notes-title { margin:1.8mm 0 1mm 1mm; font-size:11px; font-weight:800; letter-spacing:.12em; }
    .notes { min-height:5mm; padding-left:7mm; font-size:9px; line-height:1.4; white-space:pre-wrap; }
    .created { position:absolute; bottom:7mm; left:9mm; font-size:7px; letter-spacing:.2em; }
    .empty-half { color:transparent; }
    .error { margin:auto; padding:30mm; background:white; font-weight:700; }
    @page { size:A3 portrait; margin:0; }
    @media (max-width:1200px) {
      body { overflow-x:auto; }
      .toolbar { width:100%; min-width:900px; }
    }
    @media print {
      html,body { width:297mm; height:420mm; padding:0; background:white; }
      .toolbar { display:none; }
      .sheet-wrap { width:297mm!important; height:420mm!important; margin:0; break-after:page; }
      .a3-sheet { margin:0; box-shadow:none; transform:none!important; }
      .half + .half { border-left:.25mm dashed #2d5b86; }
      * { print-color-adjust:exact; -webkit-print-color-adjust:exact; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button type="button" id="back-button">戻る</button>
    <div class="toolbar-actions">
      <label class="zoom-control">表示倍率 <input id="preview-zoom" type="range" min="40" max="140" step="5" value="100"><output id="preview-zoom-value">100%</output></label>
      <label class="date-control">施行日 <input id="execution-date" type="date"><button type="button" id="apply-date">反映</button></label>
      <button class="primary" type="button" onclick="window.print()">PDF保存／印刷</button>
    </div>
  </div>
  <main id="render-target"><div class="error">時刻表を読み込んでいます…</div></main>
  <script src="../../T-time/private-data-client.js"></script>
  <script src="train_staff.js?v=20260722-1"></script>
</body>
</html>
