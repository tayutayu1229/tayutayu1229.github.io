<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>列車運転時刻表</title>
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
    body, html {
        margin: 0;
        padding: 0;
        background-color: #555;
        font-family: 'BIZ UDPGothic', sans-serif;
        -webkit-font-smoothing: antialiased;
    }

    /* ── 紙エリア ── */
    #staff-area {
        width: 148mm;
        min-height: 210mm;
        background: #fff;
        margin: 20px auto;
        padding: 4mm 6mm 6mm;
        box-sizing: border-box;
        color: #000;
        position: relative;
        /* 画面確認用の影 */
        box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    /* ── トンボ ── */
    #staff-area::before,
    #staff-area::after {
        content: '+';
        position: absolute;
        font-size: 14px;
        font-weight: bold;
        line-height: 1;
        color: #000;
    }
    #staff-area::before { top: 2px; left: 4px; }
    #staff-area::after  { top: 2px; right: 4px; }

    /* ── ヘッダー ── */
    .staff-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end; /* 下揃えに */
        margin-bottom: 1mm;
    }

    .hd-no {
        font-size: 18px; /* 少し大きく */
        font-weight: 800;
        letter-spacing: .1em;
    }

    .hd-right {
        text-align: right;
        font-size: 11px;
        font-weight: 800;
        line-height: 1.2;
    }

    .hd-date {
        font-size: 11px;
        font-weight: 800;
        margin-bottom: 1mm;
    }

    /* ── 基本情報テーブル ── */
    .info-table {
        width: 100%;
        border-collapse: collapse;
        border: 2.5px solid #000; /* 外枠を太く */
        table-layout: fixed;
    }

    .info-table td {
        border: 1px solid #000;
        text-align: center;
        vertical-align: middle;
        font-size: 10px;
        font-weight: 800;
        height: 14px;
        padding: 0 2px;
    }

    .info-table .col-train   { width: 42%; }
    .info-table .col-speed   { width: 15%; }
    .info-table .col-speedt  { width: 25%; }
    .info-table .col-power   { width: 18%; }

    .train-num-cell {
        font-size: 38px !important; /* 実寸に迫るサイズ */
        font-weight: 800;
        height: 52px !important;
        letter-spacing: -0.02em;
        text-align: left;
        padding-left: 6px !important;
        font-family: sans-serif; /* 英数字の視認性重視 */
    }

    .speed-val {
        font-size: 10px;
        line-height: 1.2;
        white-space: pre-line;
    }

    /* ── メイン時刻表 ── */
    .main-timetable {
        width: 100%;
        border-collapse: collapse;
        border: 2.5px solid #000; /* 外枠を太く */
        border-top: none;
        table-layout: fixed;
    }

    .main-timetable th {
        border: 1px solid #000;
        font-size: 9px;
        font-weight: 800;
        text-align: center;
        vertical-align: middle;
        height: 22px;
        padding: 0;
        background: #fff;
    }

    .main-timetable td {
        border: 1px solid #000;
        text-align: center;
        vertical-align: middle;
        padding: 0 1px;
    }

    /* 列幅調整 */
    .col-jifun   { width: 32px; }
    .col-arr     { width: 70px; }
    .col-dep     { width: 70px; }
    .col-line    { width: 38px; }
    .col-limit   { width: 30px; }
    .col-memo    { width: 46px; }

    /* ── 両数行 ── */
    .car-num-row td { height: 38px; }

    .car-num-cell {
        font-size: 28px;
        font-weight: 800;
        text-align: center;
        border-right: none !important;
    }

    .car-num-cell span {
        font-size: 14px;
        margin-left: 2px;
    }

    .syosho-cell {
        color: #e60012; /* より鮮明な赤 */
        font-size: 13px;
        font-weight: 800;
        text-align: left;
        padding-left: 8px !important;
    }

    /* ── 停車駅行 ── */
    .st-name-text {
        font-weight: 800;
        text-align: left;
        padding-left: 8px !important;
        letter-spacing: 0.05em;
        white-space: nowrap;
        color: #000;
        font-size: 18px; /* 駅名を強調 */
    }

    .st-passing {
        color: #e60012 !important;
    }

    /* ── 時刻 ── */
    .time-main {
        font-size: 26px; /* 時刻を際立たせる */
        font-weight: 800;
        font-family: Arial, sans-serif; /* 数字の形をスタフらしく */
        letter-spacing: -0.05em;
    }

    .time-sec {
        font-size: 14px;
        font-weight: 800;
        vertical-align: 8px; /* 上付きの高さを調整 */
        margin-left: 1px;
    }

    td.time-passing .time-main,
    td.time-passing .time-sec {
        color: #e60012;
    }

    .pass-arrow {
        color: #e60012;
        font-size: 28px;
        font-weight: 900;
        display: inline-block;
        transform: scaleX(1.4); /* 矢印を太く */
    }

    .stop-symbol {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -2px;
    }

    /* ── 着発線 ── */
    .track-num {
        font-size: 20px;
        font-weight: 800;
        font-style: italic;
        font-family: "Times New Roman", serif; /* 伝統的な着発線の斜体 */
        color: #000;
    }

    /* ── 運転時分 ── */
    .jifun-main {
        font-size: 16px;
        font-weight: 800;
    }
    .jifun-sec {
        font-size: 10px;
        font-weight: 800;
        vertical-align: 4px;
    }

    /* ── 注意事項 ── */
    .notes-area {
        margin-top: 2mm;
        border: 1px solid #000;
        padding: 2px 5px;
    }
    .notes-label {
        font-size: 9px;
        font-weight: 800;
        border-bottom: 0.5px solid #000;
        padding-bottom: 1px;
        margin-bottom: 1mm;
    }
    .notes-text {
        font-size: 11px;
        font-weight: 500;
        line-height: 1.4;
        min-height: 12mm;
    }

    /* ── フッター ── */
    .staff-footer {
        margin-top: 3mm;
        font-size: 10px;
        font-weight: 500;
        text-align: left;
        color: #000;
    }

    /* ── 印刷 ── */
    @media print {
        body, html { background: #fff; }
        #staff-area {
            margin: 0;
            padding: 4mm 6mm;
            box-shadow: none;
            width: 148mm;
        }
    }
</style>
</head>
<body>
    <div id="staff-area">
        <div id="render-target"></div>
    </div>
    <script src="train_staff.js"></script>
</body>
</html>
