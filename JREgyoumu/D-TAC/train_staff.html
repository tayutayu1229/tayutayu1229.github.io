<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>列車運転時刻表 - 決定版</title>
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@700;900&display=swap" rel="stylesheet">
    <style>
    :root {
        --border-bold: 3.5px solid #000;
        --border-normal: 1.5px solid #000;
    }

    body {
        margin: 0;
        padding: 10mm;
        background-color: #fff;
        font-family: 'BIZ UDPGothic', sans-serif;
    }

    #staff-container {
        width: 100%;
        max-width: 210mm;
        margin: 0 auto;
    }

    .header-flex {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 2px;
    }
    .no-label { font-size: 28px; font-weight: 900; font-family: Arial; }
    .depot-info { text-align: right; font-size: 18px; line-height: 1.2; font-weight: 900; }
    .execution-date { font-size: 20px; font-weight: 900; margin-bottom: 8px; }

    table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
        border: var(--border-bold);
    }

    td, th {
        border: var(--border-normal);
        padding: 0;
        box-sizing: border-box;
    }

    /* 列車情報テーブル */
    .info-table tr { height: 35px; }
    .info-table td { text-align: center; font-size: 14px; font-weight: 900; }
    .train-num-value {
        font-size: 85px;
        font-family: 'Arial Black', sans-serif;
        letter-spacing: -4px;
        height: 110px !important;
        text-align: left !important;
        padding-left: 15px !important;
    }

    /* メイン時刻表 */
    .main-table { border-top: none; }
    .main-table th { height: 38px; font-size: 14px; font-weight: 900; }
    .main-table td { height: 52px; vertical-align: middle; }

    /* 運転時分 */
    .jifun-cell { position: relative; font-family: Arial; }
    .jifun-main { font-size: 28px; font-weight: 900; position: absolute; right: 4px; bottom: 2px; }
    .jifun-sec { font-size: 16px; font-weight: 900; position: absolute; right: 4px; top: 2px; }

    /* 駅名 */
    .station-name {
        font-size: 26px;
        font-weight: 900;
        text-align: justify;
        text-align-last: justify;
        padding: 0 12px;
    }
    .st-passing { color: #e60012; }

    /* 時刻表示 (秒数を肩に乗せる) */
    .time-container {
        display: flex;
        align-items: baseline;
        justify-content: flex-start;
        padding-left: 10px;
        font-family: Arial;
    }
    .time-main { font-size: 44px; font-weight: 900; letter-spacing: -1px; }
    .time-sec { font-size: 20px; font-weight: 900; margin-left: 2px; transform: translateY(-10px); }
    .pass-arrow { color: #e60012; font-size: 48px; font-weight: 900; text-align: center; }

    .end-mark { font-size: 55px; font-weight: 900; text-align: center; letter-spacing: -8px; }

    .track-cell { font-size: 26px; font-weight: 900; font-style: italic; text-align: center; font-family: serif; color: #004098; }

    /* 注意事項 */
    .notes-area {
        border: var(--border-bold);
        border-top: none;
        min-height: 80px;
        padding: 8px;
        font-size: 18px;
        font-weight: 900;
    }
    .notes-title { font-size: 14px; border-bottom: var(--border-normal); margin-bottom: 5px; }
    .notes-content { white-space: pre-wrap; }

    .footer-time { font-size: 14px; margin-top: 8px; font-weight: 700; text-align: left; }

    @media print {
        body { padding: 0; }
        #staff-container { width: 100%; }
    }
    </style>
</head>
<body>
<div id="staff-container">
    <div id="render-target"></div>
</div>
<script src="train_staff.js"></script>
</body>
</html>
