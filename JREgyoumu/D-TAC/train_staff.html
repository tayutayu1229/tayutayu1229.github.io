<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>列車運転時刻表 - リアル再現版</title>
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@700;900&display=swap" rel="stylesheet">
    <style>
    :root {
        --border-bold: 2.5px solid #000;
        --border-normal: 1px solid #000;
    }

    body {
        margin: 0;
        padding: 10mm;
        background-color: #f0f0f0;
        font-family: 'BIZ UDPGothic', sans-serif;
    }

    /* スタフ外枠 */
    #staff-container {
        width: 148mm; /* A3半分のイメージ */
        background: #fff;
        padding: 5mm;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    /* ヘッダー部 */
    .header-flex {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 2px;
    }
    .no-label { font-size: 20px; font-weight: 900; }
    .depot-info { text-align: right; font-size: 14px; line-height: 1.2; font-weight: 900; }
    .execution-date { font-size: 16px; font-weight: 900; margin-bottom: 5px; }

    /* 共通テーブル設定 */
    table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
    }

    /* 列車情報テーブル */
    .info-table {
        border: var(--border-bold);
    }
    .info-table td {
        border: var(--border-normal);
        height: 30px;
        text-align: center;
        vertical-align: middle;
        font-size: 12px;
        font-weight: 900;
    }
    /* 列車番号を巨大化 */
    .train-num-value {
        font-size: 60px; /* 参考資料に合わせた巨大サイズ */
        font-family: 'Arial Black', sans-serif;
        letter-spacing: -2px;
        height: 80px !important;
    }

    /* メイン時刻表 */
    .main-table {
        border: var(--border-bold);
        border-top: none;
    }
    .main-table th {
        border: var(--border-normal);
        background: #fff;
        font-size: 11px;
        height: 25px;
        font-weight: 900;
    }
    .main-table td {
        border: var(--border-normal);
        height: 45px; /* 行の高さを確保 */
        vertical-align: middle;
        position: relative;
    }

    /* 運転時分 */
    .jifun-cell { font-size: 24px; font-weight: 900; text-align: right; padding-right: 4px; }
    .jifun-sec { font-size: 14px; margin-left: 1px; vertical-align: top; }

    /* 駅名 (均等割付) */
    .station-name {
        font-size: 22px;
        font-weight: 900;
        text-align: justify;
        text-align-last: justify;
        padding: 0 10px;
    }

    /* 時刻表示 */
    .time-container {
        display: flex;
        align-items: baseline;
        justify-content: center;
        font-family: Arial, sans-serif;
    }
    .time-main { font-size: 36px; font-weight: 900; letter-spacing: -1px; }
    .time-sec { font-size: 18px; font-weight: 900; margin-left: 2px; transform: translateY(-5px); }

    /* 終着駅の二重線 (=) */
    .end-mark {
        font-size: 45px;
        font-weight: 900;
        text-align: center;
        letter-spacing: -5px;
        line-height: 1;
    }

    /* 着発線 (斜体) */
    .track-cell {
        font-size: 22px;
        font-weight: 900;
        font-style: italic;
        text-align: center;
        font-family: 'Times New Roman', serif;
    }

    /* 通過矢印 */
    .pass-arrow { color: #e60012; font-size: 40px; font-weight: 900; text-align: center; }

    /* 注意事項 */
    .notes-area {
        border: var(--border-bold);
        border-top: none;
        min-height: 60px;
        padding: 5px;
        font-size: 14px;
        font-weight: 900;
    }

    .footer-time {
        font-size: 12px;
        margin-top: 5px;
        font-weight: 700;
    }
    </style>
</head>
<body>

<div id="staff-container">
    <div id="render-target"></div>
</div>

<script src="train_staff.js"></script>
</body>
</html>
