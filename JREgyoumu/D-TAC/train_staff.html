<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>列車運転時刻表</title>
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
    body, html {
        margin: 0;
        padding: 0;
        background-color: #555;
        font-family: 'BIZ UDPGothic', sans-serif;
    }

    /* ── 紙エリア (A3タテ) ── */
    #staff-area {
        display: flex; /* 2列並べるため */
        width: 297mm;
        min-height: 420mm;
        background: #fff;
        margin: 10px auto;
        box-sizing: border-box;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    /* ── 1列車分のカラム (A3の半分 = 148.5mm) ── */
    .staff-column {
        width: 50%;
        padding: 8mm 10mm;
        box-sizing: border-box;
        border-right: 1px dashed #bbb; /* 切り取り線イメージ */
        position: relative;
    }

    /* ── 基本情報テーブル ── */
    .info-table {
        width: 100%;
        border-collapse: collapse;
        border: 2.5px solid #000;
        table-layout: fixed;
    }
    .info-table td {
        border: 1px solid #000;
        text-align: center;
        vertical-align: middle;
        font-size: 11px;
        font-weight: 800;
        height: 20px;
    }
    .train-num-cell {
        font-size: 44px !important;
        font-weight: 900;
        height: 65px !important;
        text-align: left;
        padding-left: 8px !important;
        font-family: Arial, sans-serif;
    }

    /* ── メイン時刻表 ── */
    .main-timetable {
        width: 100%;
        border-collapse: collapse;
        border: 2.5px solid #000;
        border-top: none;
        table-layout: fixed;
    }
    .main-timetable th {
        border: 1px solid #000;
        font-size: 10px;
        font-weight: 800;
        height: 24px;
        background-color: #fff;
    }
    .main-timetable td {
        border: 1px solid #000;
    }

    /* ── カラム配分 (駅名が広がりすぎないよう固定) ── */
    .col-jifun   { width: 32px; }
    .col-station { width: 115px; } /* 駅名幅を適正サイズに固定 */
    .col-arr     { width: 85px; }
    .col-dep     { width: 85px; }
    .col-line    { width: 45px; }
    .col-limit   { width: 35px; }
    .col-memo    { width: 40px; }

    /* ── 停車場名の均等割付 ── */
    .st-name-text {
        font-size: 16px;
        font-weight: 900;
        text-align: justify;
        text-align-last: justify; /* セル幅いっぱいに広げる */
        padding: 0 8px; /* 左右の余白 */
        white-space: nowrap;
    }

    /* ── 通過駅の赤文字設定 ── */
    .st-passing, .time-passing {
        color: #e60012 !important; /* 鮮やかな赤 */
    }

    /* ── 時刻表示 (左寄せ・秒は下部) ── */
    .time-container {
        display: flex;
        align-items: baseline; /* 数字の底辺で揃える */
        justify-content: flex-start; /* 左寄せ */
        padding-left: 8px;
        height: 100%;
        width: 100%;
        box-sizing: border-box;
    }

    .time-main {
        font-size: 28px;
        font-weight: 900;
        font-family: Arial, sans-serif;
        line-height: 1;
        letter-spacing: -1px;
    }

    .time-sec {
        font-size: 15px;
        font-weight: 900;
        margin-left: 1px;
        /* 秒を少し浮かせる微調整 */
        transform: translateY(-1px);
    }

    /* ── 運転時分 ── */
    .jifun-cell {
        font-size: 18px;
        font-weight: 900;
        text-align: center;
    }
    .jifun-sec {
        font-size: 11px;
        vertical-align: super;
    }

    /* ── その他パーツ ── */
    .track-num {
        font-size: 14px;
        font-weight: 900;
        font-style: italic;
        text-align: center;
    }
    .pass-arrow {
        color: #e60012;
        font-size: 32px;
        font-weight: 900;
        display: block;
        text-align: center;
    }

    /* ヘッダー・フッター */
    .staff-header { display: flex; justify-content: space-between; padding: 2px 0; font-weight: 800; font-size: 13px; }
    .hd-date { font-size: 12px; font-weight: 800; margin-bottom: 4px; }
    .notes-area { border: 2px solid #000; border-top: none; min-height: 40px; padding: 4px; font-size: 11px; font-weight: 800; }
    .staff-footer { text-align: left; font-size: 10px; margin-top: 5px; font-weight: 700; }

    @media print {
        @page { size: A3 portrait; margin: 0; }
        body { background: #fff; }
        #staff-area { margin: 0; box-shadow: none; }
    }
</style>
</head>
<body>
    <div id="staff-area">
        <div id="render-target" style="display: contents;">
            </div>
    </div>
    <script src="train_staff.js"></script>
</body>
</html>
