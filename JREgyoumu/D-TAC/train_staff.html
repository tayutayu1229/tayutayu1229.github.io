<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>列車運転時刻表</title>
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
    body, html {
        margin: 0;
        padding: 0;
        background-color: #555;
        font-family: 'BIZ UDPGothic', sans-serif;
    }

    /* ── 紙エリア (A3タテ) ── */
    #staff-area {
        display: flex; /* 2列並べるため */
        width: 297mm;
        min-height: 420mm;
        background: #fff;
        margin: 10px auto;
        box-sizing: border-box;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    /* ── 1列車分のカラム (A3の半分 = 148.5mm) ── */
    .staff-column {
        width: 50%;
        padding: 6mm 8mm;
        box-sizing: border-box;
        border-right: 1px dashed #ccc; /* 切り取り線イメージ */
        position: relative;
    }

    /* ── 基本情報テーブル ── */
    .info-table {
        width: 100%;
        border-collapse: collapse;
        border: 2.5px solid #000;
        table-layout: fixed;
    }
    .info-table td {
        border: 1px solid #000;
        text-align: center;
        vertical-align: middle;
        font-size: 11px;
        font-weight: 800;
        height: 18px;
    }
    .train-num-cell {
        font-size: 42px !important;
        font-weight: 900;
        height: 60px !important;
        text-align: left;
        padding-left: 8px !important;
    }

    /* ── メイン時刻表 ── */
    .main-timetable {
        width: 100%;
        border-collapse: collapse;
        border: 2.5px solid #000;
        border-top: none;
        table-layout: fixed;
    }
    .main-timetable th {
        border: 1px solid #000;
        font-size: 10px;
        font-weight: 800;
        height: 24px;
    }
    .main-timetable td {
        border: 1px solid #000;
        height: 40px; /* 1行を少しゆったりに */
    }

    /* カラム配分 (A3半分148mmの中での配分) */
    .col-jifun   { width: 36px; }
    .col-station { width: auto; }
    .col-arr     { width: 75px; }
    .col-dep     { width: 75px; }
    .col-line    { width: 50px; } /* 着発線 4文字分 */
    .col-limit   { width: 32px; }
    .col-memo    { width: 40px; }

    /* ── 時刻表示 (左寄せ・秒は下部) ── */
    .time-container {
        display: flex;
        align-items: flex-end; /* 秒を下に揃える */
        justify-content: flex-start; /* 左寄せ */
        padding-left: 6px;
        height: 100%;
        width: 100%;
        box-sizing: border-box;
    }

    .time-main {
        font-size: 26px;
        font-weight: 800;
        font-family: Arial, sans-serif;
        line-height: 0.9;
        letter-spacing: -1px;
    }

    .time-sec {
        font-size: 14px;
        font-weight: 800;
        margin-left: 2px;
        margin-bottom: 1px; /* 秒を少しだけ浮かせるか、0で完全に下 */
    }

    /* ── 運転時分 (自動計算用) ── */
    .jifun-cell {
        font-size: 18px;
        font-weight: 800;
        text-align: center;
    }

    /* ── その他パーツ ── */
    .st-name-text {
        font-size: 14px; /* 少し小さく調整 */
        font-weight: 800;
        text-align: center;
        letter-spacing: 0.05em;
    }
    .track-num {
        font-size: 14px; /* 4文字入るように調整 */
        font-weight: 800;
        font-style: italic;
        line-height: 1.1;
    }
    .pass-arrow {
        color: #e60012;
        font-size: 30px;
        font-weight: 900;
    }

    @media print {
        @page { size: A3 portrait; margin: 0; }
        body { background: #fff; }
        #staff-area { margin: 0; box-shadow: none; }
    }
</style>
</head>
<body>
    <div id="staff-area">
        <div id="render-target"></div>
    </div>
    <script src="train_staff.js"></script>
</body>
</html>
