<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>列車運転時刻表</title>
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
    body, html {
        margin: 0;
        padding: 0;
        background-color: #555;
        font-family: 'BIZ UDPGothic', sans-serif;
        -webkit-font-smoothing: antialiased;
    }

    /* ── 紙エリア (A3比率を意識した拡大) ── */
    #staff-area {
        width: 210mm; /* A4幅相当だが、A3タテで1列印刷ならこの程度が最適 */
        min-height: 297mm;
        background: #fff;
        margin: 20px auto;
        padding: 8mm 10mm;
        box-sizing: border-box;
        color: #000;
        position: relative;
        box-shadow: 0 0 15px rgba(0,0,0,0.4);
    }

    /* ── トンボ ── */
    #staff-area::before,
    #staff-area::after {
        content: '+';
        position: absolute;
        font-size: 20px;
        font-weight: bold;
        color: #000;
    }
    #staff-area::before { top: 5px; left: 10px; }
    #staff-area::after  { top: 5px; right: 10px; }

    /* ── ヘッダー ── */
    .staff-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 2mm;
    }

    .hd-no {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: .1em;
    }

    .hd-right {
        text-align: right;
        font-size: 14px;
        font-weight: 800;
        line-height: 1.3;
    }

    .hd-date {
        font-size: 14px;
        font-weight: 800;
        margin-bottom: 2mm;
    }

    /* ── 基本情報テーブル ── */
    .info-table {
        width: 100%;
        border-collapse: collapse;
        border: 3px solid #000;
        table-layout: fixed;
    }

    .info-table td {
        border: 1px solid #000;
        text-align: center;
        vertical-align: middle;
        font-size: 12px;
        font-weight: 800;
        height: 20px;
    }

    .info-table .col-train   { width: 40%; }
    .info-table .col-speed   { width: 15%; }
    .info-table .col-speedt  { width: 25%; }
    .info-table .col-power   { width: 20%; }

    .train-num-cell {
        font-size: 48px !important;
        font-weight: 800;
        height: 70px !important;
        text-align: left;
        padding-left: 10px !important;
        font-family: sans-serif;
    }

    /* ── メイン時刻表 ── */
    .main-timetable {
        width: 100%;
        border-collapse: collapse;
        border: 3px solid #000;
        border-top: none;
        table-layout: fixed;
    }

    .main-timetable th {
        border: 1px solid #000;
        font-size: 11px;
        font-weight: 800;
        height: 28px;
        background: #fff;
    }

    .main-timetable td {
        border: 1px solid #000;
        text-align: center;
        vertical-align: middle;
        padding: 2px 1px;
    }

    /* カラム幅の最適化 */
    .col-jifun   { width: 45px; }
    .col-station { width: auto; } /* 駅名は可変 */
    .col-arr     { width: 90px; }
    .col-dep     { width: 90px; }
    .col-line    { width: 55px; } /* 着発線を拡大 */
    .col-limit   { width: 40px; }
    .col-memo    { width: 60px; }

    /* ── 両数行 ── */
    .car-num-row td { height: 45px; }

    .car-num-cell {
        font-size: 32px;
        font-weight: 800;
        border-right: none !important;
    }

    .syosho-cell {
        color: #e60012;
        font-size: 16px;
        font-weight: 800;
        text-align: center; /* 中央揃えに変更 */
    }

    /* ── 停車駅行 ── */
    .st-name-text {
        font-weight: 800;
        text-align: center; /* スタフらしく中央配置 */
        letter-spacing: 0.1em;
        font-size: 15px; /* サイズダウンして余裕を持たせる */
    }

    .st-passing {
        color: #e60012 !important;
    }

    /* ── 時刻 ── */
    .time-main {
        font-size: 24px;
        font-weight: 800;
        font-family: Arial, sans-serif;
        letter-spacing: -0.02em;
    }

    .time-sec {
        font-size: 13px;
        font-weight: 800;
        vertical-align: 8px;
        margin-left: 1px;
    }

    td.time-passing .time-main,
    td.time-passing .time-sec,
    .pass-arrow {
        color: #e60012;
    }

    .pass-arrow {
        font-size: 32px;
        font-weight: 900;
        transform: scaleX(1.2);
        display: inline-block;
    }

    /* ── 着発線 (4文字対応) ── */
    .track-num {
        font-size: 15px; /* 4文字でも入るサイズ */
        font-weight: 800;
        font-style: italic;
        font-family: "BIZ UDPGothic", serif;
        line-height: 1.1;
        word-break: break-all; /* 必要に応じて改行 */
        padding: 2px !important;
    }

    /* ── 注意事項 ── */
    .notes-area {
        margin-top: 5mm;
        border: 1.5px solid #000;
        padding: 5px 10px;
    }
    .notes-label {
        font-size: 12px;
        font-weight: 800;
        border-bottom: 1px solid #000;
        margin-bottom: 2mm;
    }
    .notes-text {
        font-size: 14px;
        min-height: 20mm;
    }

    .staff-footer {
        margin-top: 5mm;
        font-size: 12px;
        text-align: left;
    }

    /* ── 印刷設定 (A3) ── */
    @media print {
        @page {
            size: A3 portrait;
            margin: 0;
        }
        body { background: #fff; }
        #staff-area {
            margin: 0;
            width: 297mm; /* A3幅いっぱいに使う場合 */
            height: 420mm;
            padding: 15mm;
            box-shadow: none;
        }
    }
    </style>
</head>
<body>
    <div id="staff-area">
        <div id="render-target"></div>
    </div>
    <script src="train_staff.js"></script>
</body>
</html>
