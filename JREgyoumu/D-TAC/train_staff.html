<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>列車運転時刻表</title>
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
    body, html {
        margin: 0;
        padding: 0;
        background-color: #555;
        font-family: 'BIZ UDPGothic', sans-serif;
    }

    /* ── 紙エリア (A3タテ) ── */
    #staff-area {
        display: flex;
        width: 297mm;
        min-height: 420mm;
        background: #fff;
        margin: 0 auto;
        box-sizing: border-box;
    }

    /* ── 左側のみ表示 ── */
    .staff-column {
        width: 50%;
        padding: 8mm 10mm;
        box-sizing: border-box;
        border-right: 1px dashed #bbb; /* 切り取り線 */
        position: relative;
    }

    /* 右側は真っ白 */
    .staff-column.empty {
        border-right: none;
    }

    /* ── ヘッダー ── */
    .staff-header {
        display: flex;
        justify-content: space-between;
        font-weight: 800;
        font-size: 15px;
        margin-bottom: 2px;
    }
    .hd-right { text-align: right; line-height: 1.1; }

    /* ── 列車番号テーブル ── */
    .info-table {
        width: 100%;
        border-collapse: collapse;
        border: 2.5px solid #000;
        table-layout: fixed;
    }
    .info-table td {
        border: 1px solid #000;
        text-align: center;
        vertical-align: middle;
        font-size: 12px;
        font-weight: 800;
        height: 22px;
    }
    .train-num-cell {
        height: 85px !important; /* 少し高さを出す */
        text-align: left !important;
        padding: 0 10px !important;
        overflow: hidden;
    }
    /* 全角6文字まで入るように調整 */
    .train-num-text {
        font-size: 56px;
        font-weight: 900;
        letter-spacing: -2px;
        white-space: nowrap;
        display: inline-block;
        transform-origin: left center;
    }

    /* ── メイン時刻表 ── */
    .main-timetable {
        width: 100%;
        border-collapse: collapse;
        border: 2.5px solid #000;
        border-top: none;
        table-layout: fixed;
    }
    .main-timetable th {
        border: 1px solid #000;
        font-size: 11px;
        font-weight: 800;
        height: 26px;
    }
    .main-timetable td {
        border: 1px solid #000;
    }

    /* ── カラム配分 (実物比率) ── */
    .col-jifun   { width: 35px; }
    .col-station { width: 125px; } 
    .col-arr     { width: 95px; }
    .col-dep     { width: 95px; }
    .col-line    { width: 45px; }
    .col-limit   { width: 35px; }
    .col-memo    { width: 45px; }

    /* 停車場名の均等割付 */
    .st-name-text {
        font-size: 18px;
        font-weight: 900;
        text-align: justify;
        text-align-last: justify;
        padding: 0 10px;
    }
    .st-passing, .time-passing { color: #e60012 !important; }

    /* ── 時刻表示 (秒対応) ── */
    .time-container {
        display: flex;
        align-items: baseline;
        justify-content: flex-start;
        padding-left: 10px;
        height: 100%;
    }
    .time-main {
        font-size: 32px;
        font-weight: 900;
        font-family: Arial, sans-serif;
        line-height: 1;
    }
    .time-sec {
        font-size: 18px;
        font-weight: 900;
        margin-left: 2px;
        /* 秒を少し上に配置する実物スタイル */
        transform: translateY(-2px);
    }

    /* ── 運転時分 ── */
    .jifun-cell { font-size: 20px; font-weight: 900; text-align: center; }

    /* その他 */
    .pass-arrow { color: #e60012; font-size: 36px; font-weight: 900; display: block; text-align: center; }
    .track-num { font-size: 18px; font-weight: 900; font-style: italic; text-align: center; }
    .notes-area { border: 2.5px solid #000; border-top: none; min-height: 50px; padding: 5px; font-weight: 800; }
    .staff-footer { font-size: 11px; margin-top: 5px; font-weight: 700; }

    @media print {
        @page { size: A3 portrait; margin: 0; }
        body { background: #fff; }
        #staff-area { margin: 0; }
    }
    </style>
</head>
<body>
    <div id="staff-area">
        <div id="render-target" style="display: contents;"></div>
        <div class="staff-column empty"></div>
    </div>
    <script src="train_staff.js"></script>
</body>
</html>
