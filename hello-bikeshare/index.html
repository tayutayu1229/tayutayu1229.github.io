<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>自転車ステーションMAP(HELLO CYCLING) - 東京圏輸送情報システム</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --yellow-900:#7a5900;
    --yellow-700:#d69e00;
    --yellow-500:#fcba03;   /* メインブランドカラー */
    --yellow-300:#ffe49a;
    --yellow-100:#fff8e8;
    --ink:#241f14;
    --ink-soft:#6b6355;
    --paper:#ffffff;
    --paper-soft:#fdfaf3;
    --line:#ece4d0;
    --gray:#9ca3af;
    --gray-soft:#e8e6dc;
    --danger:#c0392b;
    --danger-bg:#fbe4e0;
    --safe-t:env(safe-area-inset-top,0px);
    --safe-b:env(safe-area-inset-bottom,0px);
    --safe-l:env(safe-area-inset-left,0px);
    --safe-r:env(safe-area-inset-right,0px);
    --radius-lg:18px;
    --radius-md:12px;
    --radius-sm:8px;
    --shadow:0 8px 28px rgba(36,31,20,0.16);
    --shadow-sm:0 2px 8px rgba(36,31,20,0.12);
    --font-display:'M PLUS Rounded 1c', 'Noto Sans JP', sans-serif;
    --font-body:'Noto Sans JP', sans-serif;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    font-family:var(--font-body);
    color:var(--ink);
    background:var(--paper-soft);
    overflow:hidden;
  }
  button{font-family:var(--font-body);}

  #map{ position:absolute; inset:0; background:#eef0e4; }
  .leaflet-container{ font-family:var(--font-body); background:#eef0e4; }
  .leaflet-control-attribution{ font-size:9px; }
  .leaflet-bottom.leaflet-right .leaflet-control-zoom{
    margin-bottom: calc(var(--safe-b) + 90px);
    margin-right: calc(var(--safe-r) + 10px);
  }

  /* ---------- Top bar ---------- */
  .topbar{
    position:absolute;
    top: calc(var(--safe-t) + 12px);
    left: calc(var(--safe-l) + 12px);
    right: calc(var(--safe-r) + 12px);
    z-index:1000;
    display:flex;
    align-items:flex-start;
    gap:10px;
    pointer-events:none;
    flex-wrap:wrap;
  }

  .brand-card{
    pointer-events:auto;
    background:var(--yellow-500);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow);
    padding:12px 18px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-shrink:0;
  }
  .brand-mark{
    width:34px;height:34px;border-radius:50%;background:var(--ink);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .brand-mark svg{width:20px;height:20px;stroke:var(--yellow-500);}
  .brand-text h1{ font-family:var(--font-display); font-size:15px; font-weight:800; margin:0; line-height:1.15; color:var(--ink); }
  .brand-text p{ margin:2px 0 0; font-size:10px; color:var(--yellow-900); font-weight:700; }

  .search-card{
    pointer-events:auto;
    flex:1 1 260px;
    max-width:400px;
    background:var(--paper);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow);
    padding:9px 14px;
    display:flex;
    align-items:center;
    gap:9px;
  }
  .search-card svg{flex-shrink:0;width:17px;height:17px;stroke:var(--ink-soft);}
  .search-card input{
    border:none;outline:none;font-size:14px;flex:1;background:transparent;color:var(--ink);min-width:0;
  }
  .search-card input::placeholder{color:#b0a98f;}
  .search-clear{
    display:none;border:none;background:var(--gray-soft);color:var(--ink-soft);
    width:20px;height:20px;border-radius:50%;font-size:12px;cursor:pointer;flex-shrink:0;
    align-items:center;justify-content:center;
  }

  .stat-card{
    pointer-events:auto;
    background:var(--paper);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow);
    padding:9px 16px;
    display:flex;
    gap:18px;
    flex-shrink:0;
  }
  .stat{text-align:center;}
  .stat .num{ font-family:var(--font-display); font-size:18px;font-weight:800;color:var(--ink); line-height:1.1; }
  .stat .lbl{ font-size:9.5px;color:var(--ink-soft);font-weight:600;margin-top:2px;white-space:nowrap; }

  /* ---------- Filter pill row ---------- */
  .filter-row{
    position:absolute;
    top: calc(var(--safe-t) + 76px);
    left: calc(var(--safe-l) + 12px);
    right: calc(var(--safe-r) + 12px);
    z-index:999;
    display:flex;
    gap:7px;
    pointer-events:none;
    overflow-x:auto;
    scrollbar-width:none;
    padding-bottom:2px;
  }
  .filter-row::-webkit-scrollbar{display:none;}
  .pill{
    pointer-events:auto;
    background:var(--paper);
    border:1.5px solid var(--line);
    color:var(--ink-soft);
    font-weight:600;
    font-size:12px;
    padding:7px 14px;
    border-radius:999px;
    cursor:pointer;
    box-shadow:var(--shadow-sm);
    transition:all .15s ease;
    white-space:nowrap;
    flex-shrink:0;
  }
  .pill:hover{border-color:var(--yellow-500);}
  .pill.active{ background:var(--ink); border-color:var(--ink); color:var(--yellow-300); }
  .pill .star{color:var(--yellow-700);}

  /* ---------- Floating tool buttons (right stack) ---------- */
  .tool-stack{
    position:absolute;
    top: calc(var(--safe-t) + 12px);
    right: calc(var(--safe-r) + 12px);
    z-index:1001;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .tool-btn{
    pointer-events:auto;
    width:42px;height:42px;
    border-radius:12px;
    background:var(--paper);
    border:1.5px solid var(--line);
    box-shadow:var(--shadow-sm);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    color:var(--ink);
    position:relative;
  }
  .tool-btn.active{ background:var(--ink); border-color:var(--ink); color:var(--yellow-300); }
  .tool-btn svg{width:19px;height:19px;}
  .tool-btn .badge-dot{
    position:absolute;top:-3px;right:-3px;width:9px;height:9px;border-radius:50%;
    background:var(--danger);border:1.5px solid var(--paper);display:none;
  }
  .tool-btn.has-badge .badge-dot{display:block;}

  @media (max-width:880px){
    .stat-card{ order:5; width:100%; justify-content:space-around; }
    .search-card{ max-width:none; }
    .brand-text p{display:none;}
  }
  @media (max-width:640px){
    .tool-stack{ top:auto; bottom: calc(var(--safe-b) + 92px); right: calc(var(--safe-r) + 10px); }
    .filter-row{ top: calc(var(--safe-t) + 66px); right: calc(var(--safe-r) + 12px); }
  }
  @media (max-width:480px){
    .brand-card{ padding:10px 12px; }
    .brand-text h1{ font-size:12.5px; }
    .stat-card{ padding:8px 10px; gap:10px; }
    .stat .num{ font-size:16px; }
  }

  /* ---------- Panels (legend / layers / nearby) ---------- */
  .panel-backdrop{
    position:absolute;inset:0;z-index:1500;
    background:rgba(36,31,20,0.35);
    display:none;
  }
  .panel-backdrop.show{display:block;}

  .panel{
    position:absolute;
    z-index:1600;
    background:var(--paper);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow);
    padding:16px 18px;
    display:none;
    max-height:70vh;
    overflow-y:auto;
  }
  .panel.show{display:block;}
  .panel h3{
    margin:0 0 12px; font-family:var(--font-display); font-size:14px; font-weight:800; color:var(--ink);
    display:flex; align-items:center; justify-content:space-between;
  }
  .panel-close{
    border:none;background:var(--gray-soft);color:var(--ink-soft);width:24px;height:24px;border-radius:50%;
    cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;
  }

  #legendPanel{ bottom: calc(var(--safe-b) + 20px); left: calc(var(--safe-l) + 12px); width:200px; }
  #layersPanel{ top: calc(var(--safe-t) + 12px); right: calc(var(--safe-r) + 62px); width:210px; }
  #nearbyPanel{ top: calc(var(--safe-t) + 12px); right: calc(var(--safe-r) + 62px); width:280px; }

  .legend-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px;color:var(--ink-soft);}
  .legend-row:last-child{margin-bottom:0;}
  .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:2px solid var(--paper);box-shadow:0 0 0 1px rgba(0,0,0,.15);}

  .layer-opt{
    display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:var(--radius-sm);cursor:pointer;
    font-size:13px;font-weight:600;color:var(--ink-soft);
  }
  .layer-opt:hover{background:var(--paper-soft);}
  .layer-opt.active{background:var(--yellow-100);color:var(--ink);}
  .layer-swatch{width:30px;height:22px;border-radius:5px;flex-shrink:0;background-size:cover;background-position:center;border:1px solid var(--line);}

  .nearby-empty{font-size:12px;color:var(--ink-soft);line-height:1.7;text-align:center;padding:16px 0;}
  .nearby-item{
    display:flex;justify-content:space-between;align-items:center;gap:8px;
    padding:10px 8px;border-radius:var(--radius-sm);cursor:pointer;border-bottom:1px solid var(--line);
  }
  .nearby-item:last-child{border-bottom:none;}
  .nearby-item:hover{background:var(--paper-soft);}
  .nearby-item .ni-name{font-size:12.5px;font-weight:700;color:var(--ink);}
  .nearby-item .ni-addr{font-size:10.5px;color:var(--ink-soft);margin-top:1px;}
  .nearby-item .ni-dist{font-size:11px;font-weight:800;color:var(--yellow-900);white-space:nowrap;}
  .nearby-item .ni-bikes{font-size:10px;color:var(--ink-soft);margin-top:2px;}
  .locate-btn-inline{
    width:100%;margin-top:10px;background:var(--yellow-500);border:none;padding:10px;border-radius:999px;
    font-weight:800;cursor:pointer;font-size:12.5px;color:var(--ink);
  }

  @media (max-width:640px){
    .panel{
      position:fixed;
      left:0;right:0;bottom:0;top:auto;
      width:auto !important;
      max-height:75vh;
      border-radius:20px 20px 0 0;
      padding:16px 18px calc(var(--safe-b) + 18px);
      transform:translateY(100%);
      transition:transform .25s ease;
    }
    .panel.show{ transform:translateY(0); display:block; }
  }

  /* ---------- Status bar ---------- */
  .status-bar{
    position:absolute;
    bottom: calc(var(--safe-b) + 20px);
    right: calc(var(--safe-r) + 12px);
    z-index:1000;
    display:flex;
    align-items:center;
    gap:9px;
  }
  .status-bar .updated-chip{
    background:var(--paper);padding:8px 14px;border-radius:999px;box-shadow:var(--shadow-sm);
    font-size:10.5px;color:var(--ink-soft);font-weight:600;
  }
  .status-bar .updated-chip b{color:var(--ink);}
  .status-bar .updated-chip.err{ color:var(--danger); background:var(--danger-bg); }
  .round-btn{
    background:var(--ink);color:var(--yellow-300);border:none;border-radius:999px;
    width:42px;height:42px;display:flex;align-items:center;justify-content:center;
    box-shadow:var(--shadow);cursor:pointer;flex-shrink:0;
  }
  .round-btn svg{width:17px;height:17px;}
  .round-btn.spinning svg{animation:spin .8s linear infinite;}
  .round-btn.locating svg{animation:pulse 1s ease-in-out infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  @media (max-width:480px){ .status-bar .updated-chip{display:none;} }

  /* ---------- Toast ---------- */
  .toast{
    position:absolute;
    top: calc(var(--safe-t) + 12px);
    left:50%;
    transform:translateX(-50%) translateY(-20px);
    z-index:2500;
    background:var(--danger);
    color:#fff;
    padding:10px 18px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
    box-shadow:var(--shadow);
    opacity:0;
    pointer-events:none;
    transition:all .3s ease;
    white-space:nowrap;
    max-width:90vw;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* ---------- Region loading pill ---------- */
  .region-chip{
    position:absolute;
    top: calc(var(--safe-t) + 12px);
    left:50%;
    transform:translateX(-50%) translateY(-20px);
    z-index:2400;
    background:var(--ink);
    color:var(--yellow-300);
    padding:7px 16px;
    border-radius:999px;
    font-size:11px;
    font-weight:700;
    box-shadow:var(--shadow);
    opacity:0;
    pointer-events:none;
    transition:all .25s ease;
    display:flex;align-items:center;gap:7px;
  }
  .region-chip.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .region-chip .mini-spin{
    width:11px;height:11px;border-radius:50%;border:2px solid var(--yellow-900);border-top-color:var(--yellow-300);
    animation:spin .6s linear infinite;
  }

  /* ---------- Loading overlay (cold start) ---------- */
  .loading-overlay{
    position:absolute;inset:0;z-index:3000;
    background:var(--paper-soft);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    transition:opacity .4s ease;
  }
  .loading-overlay.hidden{opacity:0;pointer-events:none;}
  .spinner{ width:46px;height:46px;border-radius:50%;border:5px solid var(--yellow-300);border-top-color:var(--yellow-500);animation:spin .8s linear infinite; }
  .loading-overlay p{ font-family:var(--font-display); font-weight:700; color:var(--ink-soft); font-size:13px; }
  .error-box{
    max-width:360px;width:88%;text-align:center;background:var(--paper);padding:22px 24px;border-radius:var(--radius-md);
    box-shadow:var(--shadow);display:none;
  }
  .error-box.show{display:block;}
  .error-box h4{margin:0 0 8px;font-family:var(--font-display);color:var(--danger);font-size:15px;}
  .error-box p{font-size:12px;color:var(--ink-soft);line-height:1.7;margin:0 0 14px;}
  .error-box .err-code{font-size:10px;color:var(--gray);margin-bottom:14px;font-family:monospace;}
  .error-box button{ background:var(--yellow-500);border:none;padding:10px 22px;border-radius:999px;font-weight:800;cursor:pointer; }

  /* ---------- Popup ---------- */
  .leaflet-popup-content-wrapper{ border-radius:var(--radius-md); box-shadow:var(--shadow); padding:0; overflow:hidden; }
  .leaflet-popup-content{margin:0;width:252px !important;max-width:80vw;}
  .leaflet-popup-tip{background:var(--paper);}
  .popup-head{ background:var(--yellow-500); padding:12px 16px 10px; display:flex; justify-content:space-between; gap:8px; }
  .popup-head .head-text{min-width:0;}
  .popup-head .st-name{ font-family:var(--font-display); font-weight:700; font-size:14px; color:var(--ink); line-height:1.3; }
  .popup-head .st-addr{ font-size:11px; color:var(--yellow-900); margin-top:3px; font-weight:500; }
  .fav-btn{
    flex-shrink:0;background:rgba(255,255,255,.55);border:none;width:28px;height:28px;border-radius:50%;
    cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--yellow-900);
  }
  .fav-btn.active{ background:var(--ink); color:var(--yellow-300); }
  .popup-body{padding:12px 16px 14px;}
  .popup-avail{display:flex;gap:10px;margin-bottom:10px;}
  .avail-box{flex:1;background:var(--paper-soft);border-radius:var(--radius-sm);padding:8px 10px;text-align:center;}
  .avail-box .n{font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--ink);}
  .avail-box .l{font-size:10px;color:var(--ink-soft);font-weight:600;margin-top:1px;}
  .popup-meta{font-size:11px;color:var(--ink-soft);margin-bottom:10px;line-height:1.8;}
  .popup-meta span{color:var(--ink);font-weight:600;}
  .popup-status-tag{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px;margin-bottom:10px;}
  .tag-open{background:var(--yellow-300);color:var(--yellow-900);}
  .tag-closed{background:var(--danger-bg);color:var(--danger);}
  .popup-actions{display:flex;gap:8px;}
  .popup-link{
    flex:1;text-align:center;background:var(--ink);color:var(--yellow-300) !important;text-decoration:none;
    padding:9px 6px;border-radius:var(--radius-sm);font-size:11.5px;font-weight:700;
  }
  .popup-link.secondary{ background:var(--paper-soft); color:var(--ink) !important; border:1.5px solid var(--line); }

  .marker-badge{
    display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;
    color:var(--ink);border-radius:50%;border:2.5px solid var(--paper);box-shadow:0 2px 6px rgba(0,0,0,.25);
  }
  .cluster-badge{
    background:var(--yellow-500);border:3px solid var(--paper);border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-family:var(--font-display);font-weight:800;color:var(--ink);box-shadow:0 2px 8px rgba(0,0,0,.25);
  }
  .user-loc-dot{ width:18px;height:18px;border-radius:50%;background:#3b82f6;border:3px solid #fff;box-shadow:0 0 0 5px rgba(59,130,246,0.25),0 2px 6px rgba(0,0,0,.3); }
</style>
</head>
<body>

<div id="map"></div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner" id="spinner"></div>
  <p id="loadingText">ステーション情報を取得しています…</p>
  <div class="error-box" id="errorBox">
    <h4 id="errorTitle">データを取得できませんでした</h4>
    <p id="errorMsg">ODPTのGBFSエンドポイントへの接続に失敗しました。</p>
    <div class="err-code" id="errorCode"></div>
    <button onclick="coldStart()">再試行</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="region-chip" id="regionChip"><span class="mini-spin"></span><span id="regionChipText">この範囲を更新中…</span></div>

<div class="topbar">
  <div class="brand-card">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 100-2 1 1 0 000 2zM12 17.5V14l-3-3 4-3 2 3h2"/></svg>
    </div>
    <div class="brand-text">
      <h1>HELLO CYCLING マップ</h1>
      <p>全国シェアサイクル ステーション情報</p>
    </div>
  </div>

  <div class="search-card">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input type="text" id="searchInput" placeholder="ステーション名・住所で検索…">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>

  <div class="stat-card">
    <div class="stat"><div class="num" id="statTotal">–</div><div class="lbl">ステーション</div></div>
    <div class="stat"><div class="num" id="statBikes">–</div><div class="lbl">貸出可能</div></div>
    <div class="stat"><div class="num" id="statDocks">–</div><div class="lbl">返却可能</div></div>
    <div class="stat"><div class="num" id="statShown">–</div><div class="lbl">表示中</div></div>
  </div>
</div>

<div class="filter-row" id="filterRow">
  <button class="pill active" data-filter="all">すべて表示</button>
  <button class="pill" data-filter="available">貸出可能のみ</button>
  <button class="pill" data-filter="returnable">返却可能のみ</button>
  <button class="pill" data-filter="charging">充電ポートあり</button>
  <button class="pill" data-filter="favorite"><span class="star">★</span> お気に入り</button>
</div>

<div class="tool-stack">
  <button class="tool-btn" id="layersToggle" title="地図の種類">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
  </button>
  <button class="tool-btn" id="legendToggle" title="凡例">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
  </button>
  <button class="tool-btn" id="nearbyToggle" title="現在地から探す">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
  </button>
</div>

<div class="panel-backdrop" id="panelBackdrop"></div>

<div class="panel" id="legendPanel">
  <h3>貸出可能台数 <button class="panel-close" onclick="closePanels()">✕</button></h3>
  <div class="legend-row"><span class="dot" style="background:var(--yellow-500)"></span>多い（4台以上）</div>
  <div class="legend-row"><span class="dot" style="background:var(--yellow-300)"></span>少ない（1〜3台）</div>
  <div class="legend-row"><span class="dot" style="background:var(--gray-soft);box-shadow:0 0 0 1px #c9cbb8"></span>なし（0台）</div>
  <div class="legend-row"><span class="dot" style="background:var(--gray)"></span>運用停止中</div>
  <div class="legend-row"><span class="dot" style="background:#3b82f6"></span>現在地</div>
</div>

<div class="panel" id="layersPanel">
  <h3>地図の種類 <button class="panel-close" onclick="closePanels()">✕</button></h3>
  <div id="layerOptions"></div>
</div>

<div class="panel" id="nearbyPanel">
  <h3>現在地から探す <button class="panel-close" onclick="closePanels()">✕</button></h3>
  <div id="nearbyList"><div class="nearby-empty">現在地を取得すると、近くのステーションが一覧表示されます。</div></div>
  <button class="locate-btn-inline" id="locateInlineBtn">📍 現在地を取得する</button>
</div>

<div class="status-bar">
  <div class="updated-chip" id="updatedChip">読み込み中…</div>
  <button class="round-btn" id="refreshBtn" title="今すぐ更新">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 01-15 6.7L3 16"/></svg>
  </button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>

<script>
/* ==============================================
   HELLO CYCLING GBFS ステーションマップ
   東京圏輸送情報システム
================================================= */

const ENDPOINTS = {
  stations: 'https://api-public.odpt.org/api/v4/gbfs/hellocycling/station_information.json',
  status:   'https://api-public.odpt.org/api/v4/gbfs/hellocycling/station_status.json'
};

// GBFSはbboxでの地域絞り込みに対応していないため、全件を一度だけ取得してメモリ上にキャッシュし、
// 描画は「現在の地図範囲＋周辺バッファ」だけに限定することで、拡大時も軽量かつ
// 表示漏れが起きないようにしている。
const TILE_LAYERS = {
  light:{ name:'ライト', swatch:'#e9ecdf',
    url:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    attribution:'&copy; OpenStreetMap contributors &copy; CARTO', maxZoom:20 },
  standard:{ name:'標準地図', swatch:'#cfe3c4',
    url:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    attribution:'&copy; OpenStreetMap contributors', maxZoom:19 },
  dark:{ name:'ダーク', swatch:'#2b2f26',
    url:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    attribution:'&copy; OpenStreetMap contributors &copy; CARTO', maxZoom:20 },
  satellite:{ name:'航空写真', swatch:'#4b5b3f',
    url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    attribution:'Tiles &copy; Esri, Maxar, Earthstar Geographics', maxZoom:19 },
  terrain:{ name:'地形', swatch:'#d8cba0',
    url:'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
    attribution:'&copy; OpenStreetMap contributors, SRTM | &copy; OpenTopoMap', maxZoom:17 }
};

let map, cluster, tileLayer, userMarker;
let stationMeta = {};    // station_id -> station_information
let stationStatus = {};  // station_id -> station_status
let markers = {};        // station_id -> leaflet marker (現在描画中のもの)
let favorites = new Set(); // お気に入り（セッション中のみ保持）
let currentFilter = 'all';
let searchTerm = '';
let currentTile = 'light';
let userLatLng = null;
let statusTimer = null, infoTimer = null;
let renderQueued = false;
let lastGoodUpdate = null;

/* ---------- ユーティリティ ---------- */
function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
function haversine(lat1,lon1,lat2,lon2){
  const R=6371, toRad=d=>d*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtDist(km){ return km < 1 ? Math.round(km*1000)+'m' : km.toFixed(1)+'km'; }

/* ---------- 地図初期化 ---------- */
function initMap(){
  map = L.map('map', { zoomControl:false, attributionControl:true, preferCanvas:true }).setView([35.6812,139.7671], 11);
  setTileLayer(currentTile);
  L.control.zoom({ position:'bottomright' }).addTo(map);

  cluster = L.markerClusterGroup({
    maxClusterRadius:50,
    chunkedLoading:true,
    iconCreateFunction:c=>{
      const count=c.getChildCount();
      const size=count>50?46:count>10?40:34;
      return L.divIcon({
        html:`<div class="cluster-badge" style="width:${size}px;height:${size}px;font-size:${count>99?11:13}px;">${count}</div>`,
        className:'', iconSize:[size,size]
      });
    }
  });
  map.addLayer(cluster);

  const debouncedRender = debounce(()=>renderVisible(true), 350);
  map.on('moveend zoomend', debouncedRender);

  buildLayerOptions();
}

function setTileLayer(key){
  if(tileLayer) map.removeLayer(tileLayer);
  const cfg = TILE_LAYERS[key];
  tileLayer = L.tileLayer(cfg.url, { attribution:cfg.attribution, maxZoom:cfg.maxZoom, subdomains:'abc' });
  tileLayer.addTo(map);
  tileLayer.bringToBack();
  currentTile = key;
  buildLayerOptions();
}

function buildLayerOptions(){
  const box = document.getElementById('layerOptions');
  box.innerHTML = Object.entries(TILE_LAYERS).map(([key,cfg])=>`
    <div class="layer-opt ${key===currentTile?'active':''}" data-tile="${key}">
      <div class="layer-swatch" style="background-color:${cfg.swatch}"></div>
      <span>${cfg.name}</span>
    </div>
  `).join('');
  box.querySelectorAll('.layer-opt').forEach(el=>{
    el.addEventListener('click', ()=>{ setTileLayer(el.dataset.tile); });
  });
}

function debounce(fn, wait){
  let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), wait); };
}

/* ---------- データ取得（タイムアウト・詳細エラー対応） ---------- */
async function fetchJSON(url, timeoutMs=15000){
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), timeoutMs);
  try{
    const res = await fetch(url, { cache:'no-store', signal:ctrl.signal });
    if(!res.ok){
      const e = new Error('HTTP ' + res.status + ' ' + res.statusText);
      e.code = 'HTTP_' + res.status;
      throw e;
    }
    let json;
    try{ json = await res.json(); }
    catch(parseErr){
      const e = new Error('JSONの解析に失敗しました');
      e.code = 'PARSE_ERROR';
      throw e;
    }
    return json;
  }catch(err){
    if(err.name === 'AbortError'){
      const e = new Error('リクエストがタイムアウトしました');
      e.code = 'TIMEOUT';
      throw e;
    }
    if(err instanceof TypeError){
      const e = new Error('ネットワークに接続できません（CORSまたは通信障害の可能性があります）');
      e.code = 'NETWORK_ERROR';
      throw e;
    }
    throw err;
  }finally{
    clearTimeout(timer);
  }
}

function describeError(err){
  const code = err.code || 'UNKNOWN';
  const map = {
    TIMEOUT: 'サーバーからの応答がありませんでした。通信環境をご確認のうえ再試行してください。',
    NETWORK_ERROR: 'ネットワークに接続できません。通信環境、またはブラウザのCORS制限をご確認ください。',
    PARSE_ERROR: 'サーバーから返却されたデータの形式が不正です。時間を置いて再試行してください。',
    EMPTY_DATA: 'ステーションデータが0件でした。GBFSエンドポイント側の問題の可能性があります。'
  };
  if(map[code]) return { title:'データを取得できませんでした', body:map[code], code };
  if(code.startsWith('HTTP_')) return { title:'サーバーエラー', body:`APIサーバーがエラーを返しました（${code.replace('HTTP_','')}）。しばらくしてから再試行してください。`, code };
  return { title:'予期しないエラー', body: err.message || '不明なエラーが発生しました。', code };
}

/* ---------- 初回読み込み（コールドスタート） ---------- */
async function coldStart(){
  document.getElementById('loadingOverlay').classList.remove('hidden');
  document.getElementById('spinner').style.display='block';
  document.getElementById('loadingText').style.display='block';
  document.getElementById('errorBox').classList.remove('show');
  document.getElementById('loadingText').textContent = 'ステーション情報を取得しています…';
  try{
    const [stationsRes, statusRes] = await Promise.all([
      fetchJSON(ENDPOINTS.stations),
      fetchJSON(ENDPOINTS.status)
    ]);
    applyStations(stationsRes);
    applyStatus(statusRes);
    if(Object.keys(stationMeta).length === 0){
      const e = new Error('0件'); e.code='EMPTY_DATA'; throw e;
    }
    renderVisible(false);
    updateStats();
    markUpdated(true);
    document.getElementById('loadingOverlay').classList.add('hidden');
    startTimers();
  }catch(err){
    console.error(err);
    const info = describeError(err);
    document.getElementById('spinner').style.display='none';
    document.getElementById('loadingText').style.display='none';
    document.getElementById('errorTitle').textContent = info.title;
    document.getElementById('errorMsg').textContent = info.body;
    document.getElementById('errorCode').textContent = 'code: ' + info.code;
    document.getElementById('errorBox').classList.add('show');
  }
}

function applyStations(res){
  stationMeta = {};
  (res && res.data && res.data.stations || []).forEach(s => { stationMeta[s.station_id] = s; });
}
function applyStatus(res){
  stationStatus = {};
  (res && res.data && res.data.stations || []).forEach(s => { stationStatus[s.station_id] = s; });
}

/* ---------- バックグラウンド更新（トースト表示・既存データ保持） ---------- */
async function refreshStatus(){
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  try{
    const res = await fetchJSON(ENDPOINTS.status, 12000);
    applyStatus(res);
    renderVisible(false);
    updateStats();
    markUpdated(true);
  }catch(err){
    console.error(err);
    const info = describeError(err);
    markUpdated(false);
    showToast('更新に失敗しました：' + info.body);
  }
  btn.classList.remove('spinning');
}

async function refreshStationInfo(){
  try{
    const res = await fetchJSON(ENDPOINTS.stations, 15000);
    applyStations(res);
    renderVisible(false);
    updateStats();
  }catch(err){
    console.error(err);
    showToast('ステーション基本情報の更新に失敗しました。前回のデータを表示しています。');
  }
}

function startTimers(){
  if(statusTimer) clearInterval(statusTimer);
  if(infoTimer) clearInterval(infoTimer);
  statusTimer = setInterval(refreshStatus, 60000);     // GBFS ttl相当（約60秒）
  infoTimer = setInterval(refreshStationInfo, 600000);  // ステーション基本情報は10分毎で十分
}

function markUpdated(ok){
  const chip = document.getElementById('updatedChip');
  const t = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  if(ok){
    lastGoodUpdate = t;
    chip.classList.remove('err');
    chip.innerHTML = '<b>更新:</b> ' + t;
  }else{
    chip.classList.add('err');
    chip.innerHTML = '更新失敗（最終成功: ' + (lastGoodUpdate||'-') + '）';
  }
}

function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>el.classList.remove('show'), 5000);
}

function showRegionChip(msg){
  const chip = document.getElementById('regionChip');
  document.getElementById('regionChipText').textContent = msg;
  chip.classList.add('show');
}
function hideRegionChip(){ document.getElementById('regionChip').classList.remove('show'); }

/* ---------- 表示範囲に応じたマーカー描画（表示漏れ防止） ---------- */
function markerColor(bikes, renting, returning){
  if(!renting && !returning) return 'var(--gray)';
  if(bikes >= 4) return 'var(--yellow-500)';
  if(bikes >= 1) return 'var(--yellow-300)';
  return '#eef0e4';
}
function buildIcon(bikes, color){
  const size = bikes>=4?30:bikes>=1?26:22;
  return L.divIcon({
    html:`<div class="marker-badge" style="width:${size}px;height:${size}px;background:${color};font-size:${size>=28?12:10}px;">${bikes}</div>`,
    className:'', iconSize:[size,size], iconAnchor:[size/2,size/2], popupAnchor:[0,-size/2]
  });
}
function passesFilter(meta, state){
  switch(currentFilter){
    case 'available': return !!state && (state.num_bikes_available||0) > 0 && state.is_renting;
    case 'returnable': return !!state && (state.num_docks_available||0) > 0 && state.is_returning;
    case 'charging': return meta.is_charging_station === true;
    case 'favorite': return favorites.has(meta.station_id);
    default: return true;
  }
}
function passesSearch(meta){
  if(!searchTerm) return true;
  const hay = toSearchNormal(meta.name + ' ' + (meta.address||''));
  return hay.includes(searchTerm);
}
// カタカナをひらがなに変換して比較することで、「いおん」でも「イオン」がヒットするようにする
function toSearchNormal(str){
  return String(str ?? '')
    .toLowerCase()
    .replace(/[\u30a1-\u30f6]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));
}

function renderVisible(showChip){
  if(!map) return;
  if(showChip){ showRegionChip('この範囲のステーションを更新中…'); }

  // 追加バッファ：現在の表示範囲より少し広めに保持し、パン操作でのちらつきを防止
  const addBounds = map.getBounds().pad(0.6);
  const keepBounds = map.getBounds().pad(2.0);
  let shownCount = 0;

  Object.values(stationMeta).forEach(meta => {
    const id = meta.station_id;
    const latlng = L.latLng(meta.lat, meta.lon);
    const state = stationStatus[id];
    const inAdd = addBounds.contains(latlng);
    const inKeep = keepBounds.contains(latlng);
    const filterOk = passesFilter(meta, state) && passesSearch(meta);
    const shouldShow = inAdd && filterOk;
    const existing = markers[id];

    if(shouldShow){
      shownCount++;
      const bikes = state ? (state.num_bikes_available ?? 0) : 0;
      const renting = state ? state.is_renting : false;
      const returning = state ? state.is_returning : false;
      const color = markerColor(bikes, renting, returning);
      const icon = buildIcon(bikes, color);
      if(existing){
        existing.setIcon(icon);
      }else{
        const m = L.marker(latlng, { icon });
        m.on('popupopen', ()=>bindPopupEvents(m, meta));
        m.bindPopup(()=>buildPopupHtml(meta), { maxWidth:280 });
        markers[id] = m;
        cluster.addLayer(m);
      }
    }else if(existing){
      // フィルターで対象外になったか、キープ範囲(拡張バッファ)からも外れた場合のみ削除する。
      // addBounds〜keepBoundsの間にあるマーカーはそのまま保持し、微小なパン操作での
      // 追加/削除の繰り返し（ちらつき）を防ぐ。
      if(!filterOk || !inKeep){
        cluster.removeLayer(existing);
        delete markers[id];
      }
      // addBounds〜keepBoundsの間はレイヤーに残したまま維持する（表示中カウントには含めない）
    }
  });

  document.getElementById('statShown').textContent = shownCount.toLocaleString('ja-JP');
  if(showChip){ setTimeout(hideRegionChip, 300); }
}

function buildPopupHtml(meta){
  const state = stationStatus[meta.station_id];
  const bikes = state ? (state.num_bikes_available ?? 0) : 0;
  const docks = state ? (state.num_docks_available ?? 0) : 0;
  const renting = state ? state.is_renting : false;
  const returning = state ? state.is_returning : false;
  const statusTag = (renting || returning) ? '<span class="popup-status-tag tag-open">運用中</span>' : '<span class="popup-status-tag tag-closed">運用停止中</span>';
  const capacity = meta.vehicle_capacity ? `${meta.vehicle_capacity}台` : '不明';
  const charging = meta.is_charging_station ? '<span style="color:var(--yellow-900);font-weight:700;">⚡ あり</span>' : 'なし';
  const webUrl = meta.rental_uris && meta.rental_uris.web ? meta.rental_uris.web : null;
  const isFav = favorites.has(meta.station_id);
  const distLine = userLatLng ? `現在地から：<span>${fmtDist(haversine(userLatLng.lat,userLatLng.lng,meta.lat,meta.lon))}</span><br>` : '';
  const gmapUrl = `https://www.google.com/maps/dir/?api=1&destination=${meta.lat},${meta.lon}`;

  return `
    <div class="popup-head">
      <div class="head-text">
        <div class="st-name">${escapeHtml(meta.name)}</div>
        <div class="st-addr">${escapeHtml(meta.address || '住所情報なし')}</div>
      </div>
      <button class="fav-btn ${isFav?'active':''}" data-fav="${meta.station_id}" title="お気に入り">${isFav?'★':'☆'}</button>
    </div>
    <div class="popup-body">
      ${statusTag}
      <div class="popup-avail">
        <div class="avail-box"><div class="n">${bikes}</div><div class="l">貸出可能</div></div>
        <div class="avail-box"><div class="n">${docks}</div><div class="l">返却可能</div></div>
      </div>
      <div class="popup-meta">
        ${distLine}
        駐輪定数：<span>${capacity}</span><br>
        充電ポート：<span>${charging}</span>
      </div>
      <div class="popup-actions">
        ${webUrl ? `<a class="popup-link" href="${webUrl}" target="_blank" rel="noopener">アプリで予約</a>` : ''}
        <a class="popup-link secondary" href="${gmapUrl}" target="_blank" rel="noopener">経路案内</a>
      </div>
    </div>
  `;
}

function bindPopupEvents(marker, meta){
  const el = marker.getPopup().getElement();
  if(!el) return;
  const favBtn = el.querySelector('[data-fav]');
  if(favBtn){
    favBtn.addEventListener('click', ()=>{
      toggleFavorite(meta.station_id);
      favBtn.classList.toggle('active');
      favBtn.textContent = favorites.has(meta.station_id) ? '★' : '☆';
    });
  }
}

function toggleFavorite(id){
  if(favorites.has(id)) favorites.delete(id); else favorites.add(id);
  if(currentFilter === 'favorite') renderVisible(false);
}

/* ---------- 統計 ---------- */
function updateStats(){
  const ids = Object.keys(stationMeta);
  let bikeSum=0, dockSum=0;
  ids.forEach(id=>{
    const s = stationStatus[id];
    if(s){ bikeSum += (s.num_bikes_available||0); dockSum += (s.num_docks_available||0); }
  });
  document.getElementById('statTotal').textContent = ids.length.toLocaleString('ja-JP');
  document.getElementById('statBikes').textContent = bikeSum.toLocaleString('ja-JP');
  document.getElementById('statDocks').textContent = dockSum.toLocaleString('ja-JP');
}

/* ---------- 現在地・近くのステーション ---------- */
function locateMe(){
  if(!navigator.geolocation){
    showToast('この端末では位置情報を利用できません。');
    return;
  }
  const btn = document.getElementById('locateInlineBtn');
  btn.textContent = '取得中…';
  navigator.geolocation.getCurrentPosition(pos=>{
    userLatLng = { lat:pos.coords.latitude, lng:pos.coords.longitude };
    if(userMarker) map.removeLayer(userMarker);
    userMarker = L.marker([userLatLng.lat, userLatLng.lng], {
      icon: L.divIcon({ className:'', html:'<div class="user-loc-dot"></div>', iconSize:[18,18], iconAnchor:[9,9] })
    }).addTo(map);
    map.flyTo([userLatLng.lat, userLatLng.lng], 15, { duration:0.8 });
    renderNearbyList();
    btn.textContent = '📍 現在地を再取得する';
  }, err=>{
    btn.textContent = '📍 現在地を取得する';
    let msg = '位置情報の取得に失敗しました。';
    if(err.code === 1) msg = '位置情報の利用が許可されていません。ブラウザの設定をご確認ください。';
    else if(err.code === 3) msg = '位置情報の取得がタイムアウトしました。';
    showToast(msg);
  }, { enableHighAccuracy:true, timeout:10000 });
}

function renderNearbyList(){
  const box = document.getElementById('nearbyList');
  if(!userLatLng){ box.innerHTML = '<div class="nearby-empty">現在地を取得すると、近くのステーションが一覧表示されます。</div>'; return; }
  const list = Object.values(stationMeta).map(meta=>{
    const d = haversine(userLatLng.lat, userLatLng.lng, meta.lat, meta.lon);
    return { meta, d, state: stationStatus[meta.station_id] };
  }).sort((a,b)=>a.d-b.d).slice(0,10);

  if(list.length === 0){ box.innerHTML = '<div class="nearby-empty">近くにステーションが見つかりませんでした。</div>'; return; }

  box.innerHTML = list.map(({meta,d,state})=>{
    const bikes = state ? (state.num_bikes_available ?? 0) : 0;
    const docks = state ? (state.num_docks_available ?? 0) : 0;
    return `
      <div class="nearby-item" data-goto="${meta.station_id}">
        <div style="min-width:0;">
          <div class="ni-name">${escapeHtml(meta.name)}</div>
          <div class="ni-addr">${escapeHtml(meta.address||'')}</div>
          <div class="ni-bikes">🚲 ${bikes}台 / 🅿️ ${docks}台</div>
        </div>
        <div class="ni-dist">${fmtDist(d)}</div>
      </div>`;
  }).join('');

  box.querySelectorAll('[data-goto]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const meta = stationMeta[el.dataset.goto];
      if(!meta) return;
      closePanels();
      map.flyTo([meta.lat, meta.lon], 17, { duration:0.8 });
      setTimeout(()=>{
        renderVisible(false);
        const m = markers[meta.station_id];
        if(m) m.openPopup();
      }, 850);
    });
  });
}

/* ---------- パネル制御 ---------- */
function openPanel(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));
  document.getElementById(id).classList.add('show');
  document.getElementById('panelBackdrop').classList.add('show');
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
}
function closePanels(){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));
  document.getElementById('panelBackdrop').classList.remove('show');
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
}

document.getElementById('layersToggle').addEventListener('click', function(){
  const willOpen = !document.getElementById('layersPanel').classList.contains('show');
  closePanels();
  if(willOpen){ openPanel('layersPanel'); this.classList.add('active'); }
});
document.getElementById('legendToggle').addEventListener('click', function(){
  const willOpen = !document.getElementById('legendPanel').classList.contains('show');
  closePanels();
  if(willOpen){ openPanel('legendPanel'); this.classList.add('active'); }
});
document.getElementById('nearbyToggle').addEventListener('click', function(){
  const willOpen = !document.getElementById('nearbyPanel').classList.contains('show');
  closePanels();
  if(willOpen){ openPanel('nearbyPanel'); this.classList.add('active'); renderNearbyList(); }
});
document.getElementById('panelBackdrop').addEventListener('click', closePanels);
document.getElementById('locateInlineBtn').addEventListener('click', locateMe);
document.getElementById('refreshBtn').addEventListener('click', ()=>{ refreshStatus(); refreshStationInfo(); });

/* ---------- 検索・フィルター ---------- */
document.querySelectorAll('.pill').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.pill').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderVisible(false);
  });
});

const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', debounce(()=>{
  searchTerm = toSearchNormal(searchInput.value.trim());
  document.getElementById('searchClear').style.display = searchTerm ? 'flex' : 'none';
  renderVisible(false);
}, 200));

function clearSearch(){
  searchInput.value = '';
  searchTerm = '';
  document.getElementById('searchClear').style.display = 'none';
  renderVisible(false);
}

/* ---------- 起動 ---------- */
initMap();
coldStart();
</script>
