<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HELLO CYCLING ステーションマップ</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --yellow-900:#5f6a10;
    --yellow-700:#8c9a17;
    --yellow-500:#c2d32c;   /* HELLO CYCLING brand */
    --yellow-300:#e2e8a0;
    --yellow-100:#f6f8e2;
    --ink:#22261a;
    --ink-soft:#565c47;
    --paper:#ffffff;
    --paper-soft:#fbfbf5;
    --line:#e4e5d6;
    --gray:#9ca3af;
    --gray-soft:#e5e7eb;
    --danger:#c0512f;
    --radius-lg:18px;
    --radius-md:12px;
    --radius-sm:8px;
    --shadow:0 8px 28px rgba(34,38,26,0.14);
    --shadow-sm:0 2px 8px rgba(34,38,26,0.10);
    --font-display:'M PLUS Rounded 1c', 'Noto Sans JP', sans-serif;
    --font-body:'Noto Sans JP', sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:var(--font-body);
    color:var(--ink);
    background:var(--paper-soft);
    overflow:hidden;
  }

  #map{
    position:absolute;
    inset:0;
    background:#eef0e4;
  }

  .leaflet-container{
    font-family:var(--font-body);
  }

  /* ---------- Top bar ---------- */
  .topbar{
    position:absolute;
    top:16px;
    left:16px;
    right:16px;
    z-index:1000;
    display:flex;
    align-items:flex-start;
    gap:12px;
    pointer-events:none;
  }

  .brand-card{
    pointer-events:auto;
    background:var(--yellow-500);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow);
    padding:14px 20px;
    display:flex;
    align-items:center;
    gap:12px;
    flex-shrink:0;
  }
  .brand-mark{
    width:38px;height:38px;
    border-radius:50%;
    background:var(--ink);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .brand-mark svg{width:22px;height:22px;stroke:var(--yellow-500);}
  .brand-text h1{
    font-family:var(--font-display);
    font-size:16px;
    font-weight:800;
    margin:0;
    line-height:1.15;
    color:var(--ink);
    letter-spacing:.01em;
  }
  .brand-text p{
    margin:2px 0 0;
    font-size:11px;
    color:var(--yellow-900);
    font-weight:600;
    letter-spacing:.02em;
  }

  .search-card{
    pointer-events:auto;
    flex:1;
    max-width:420px;
    background:var(--paper);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow);
    padding:10px 14px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .search-card svg{flex-shrink:0;width:18px;height:18px;stroke:var(--ink-soft);}
  .search-card input{
    border:none;outline:none;
    font-family:var(--font-body);
    font-size:14px;
    flex:1;
    background:transparent;
    color:var(--ink);
  }
  .search-card input::placeholder{color:#a9ad98;}
  .search-clear{
    display:none;
    border:none;background:var(--gray-soft);color:var(--ink-soft);
    width:20px;height:20px;border-radius:50%;font-size:13px;cursor:pointer;
    align-items:center;justify-content:center;
  }

  .stat-card{
    pointer-events:auto;
    background:var(--paper);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow);
    padding:10px 18px;
    display:flex;
    gap:20px;
    flex-shrink:0;
  }
  .stat{text-align:center;}
  .stat .num{
    font-family:var(--font-display);
    font-size:19px;font-weight:800;color:var(--ink);
    line-height:1.1;
  }
  .stat .lbl{font-size:10px;color:var(--ink-soft);font-weight:600;margin-top:2px;white-space:nowrap;}

  @media (max-width:820px){
    .topbar{flex-wrap:wrap;}
    .stat-card{order:3;width:100%;justify-content:space-around;}
    .search-card{max-width:none;}
    .brand-text p{display:none;}
  }

  /* ---------- Filter pill row ---------- */
  .filter-row{
    position:absolute;
    top:82px;
    left:16px;
    z-index:1000;
    display:flex;
    gap:8px;
    pointer-events:auto;
    flex-wrap:wrap;
    max-width:calc(100% - 32px);
  }
  @media (max-width:820px){ .filter-row{ top:150px; } }

  .pill{
    background:var(--paper);
    border:1.5px solid var(--line);
    color:var(--ink-soft);
    font-family:var(--font-body);
    font-weight:600;
    font-size:12px;
    padding:7px 14px;
    border-radius:999px;
    cursor:pointer;
    box-shadow:var(--shadow-sm);
    transition:all .15s ease;
    white-space:nowrap;
  }
  .pill:hover{border-color:var(--yellow-500);}
  .pill.active{
    background:var(--ink);
    border-color:var(--ink);
    color:var(--yellow-300);
  }

  /* ---------- Legend ---------- */
  .legend{
    position:absolute;
    bottom:20px;
    left:16px;
    z-index:1000;
    background:var(--paper);
    border-radius:var(--radius-md);
    box-shadow:var(--shadow);
    padding:12px 16px;
    font-size:11px;
    color:var(--ink-soft);
  }
  .legend h3{
    margin:0 0 8px;
    font-size:11px;
    font-weight:700;
    color:var(--ink);
    font-family:var(--font-display);
  }
  .legend-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
  .legend-row:last-child{margin-bottom:0;}
  .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:2px solid var(--paper);box-shadow:0 0 0 1px rgba(0,0,0,.15);}
  @media (max-width:820px){ .legend{ display:none; } }

  /* ---------- Refresh / status ---------- */
  .status-bar{
    position:absolute;
    bottom:20px;
    right:16px;
    z-index:1000;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .refresh-btn{
    background:var(--ink);
    color:var(--yellow-300);
    border:none;
    border-radius:999px;
    width:44px;height:44px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:var(--shadow);
    cursor:pointer;
    transition:transform .2s ease;
  }
  .refresh-btn:hover{transform:rotate(50deg);}
  .refresh-btn svg{width:18px;height:18px;}
  .refresh-btn.spinning svg{animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .updated-chip{
    background:var(--paper);
    padding:8px 14px;
    border-radius:999px;
    box-shadow:var(--shadow-sm);
    font-size:11px;
    color:var(--ink-soft);
    font-weight:600;
  }
  .updated-chip b{color:var(--ink);}

  /* ---------- Loading overlay ---------- */
  .loading-overlay{
    position:absolute;inset:0;z-index:2000;
    background:var(--paper-soft);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:14px;
    transition:opacity .4s ease;
  }
  .loading-overlay.hidden{opacity:0;pointer-events:none;}
  .spinner{
    width:46px;height:46px;
    border-radius:50%;
    border:5px solid var(--yellow-300);
    border-top-color:var(--yellow-500);
    animation:spin .8s linear infinite;
  }
  .loading-overlay p{
    font-family:var(--font-display);
    font-weight:700;
    color:var(--ink-soft);
    font-size:13px;
  }
  .error-box{
    max-width:360px;
    text-align:center;
    background:var(--paper);
    padding:20px 24px;
    border-radius:var(--radius-md);
    box-shadow:var(--shadow);
    display:none;
  }
  .error-box.show{display:block;}
  .error-box h4{margin:0 0 6px;font-family:var(--font-display);color:var(--danger);}
  .error-box p{font-size:12px;color:var(--ink-soft);line-height:1.6;margin:0 0 12px;}
  .error-box button{
    background:var(--yellow-500);border:none;padding:8px 18px;border-radius:999px;
    font-weight:700;cursor:pointer;font-family:var(--font-body);
  }

  /* ---------- Popup ---------- */
  .leaflet-popup-content-wrapper{
    border-radius:var(--radius-md);
    box-shadow:var(--shadow);
    padding:0;
    overflow:hidden;
  }
  .leaflet-popup-content{margin:0;width:250px !important;}
  .leaflet-popup-tip{background:var(--paper);}
  .popup-head{
    background:var(--yellow-500);
    padding:12px 16px 10px;
  }
  .popup-head .st-name{
    font-family:var(--font-display);
    font-weight:700;
    font-size:14px;
    color:var(--ink);
    line-height:1.3;
  }
  .popup-head .st-addr{
    font-size:11px;
    color:var(--yellow-900);
    margin-top:3px;
    font-weight:500;
  }
  .popup-body{padding:12px 16px 14px;}
  .popup-avail{
    display:flex;gap:10px;margin-bottom:10px;
  }
  .avail-box{
    flex:1;
    background:var(--paper-soft);
    border-radius:var(--radius-sm);
    padding:8px 10px;
    text-align:center;
  }
  .avail-box .n{font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--ink);}
  .avail-box .l{font-size:10px;color:var(--ink-soft);font-weight:600;margin-top:1px;}
  .popup-meta{font-size:11px;color:var(--ink-soft);margin-bottom:10px;line-height:1.7;}
  .popup-meta span{color:var(--ink);font-weight:600;}
  .popup-status-tag{
    display:inline-block;
    font-size:10px;font-weight:700;
    padding:3px 9px;border-radius:999px;
    margin-bottom:10px;
  }
  .tag-open{background:var(--yellow-300);color:var(--yellow-900);}
  .tag-closed{background:#f0d9d0;color:var(--danger);}
  .popup-link{
    display:block;
    text-align:center;
    background:var(--ink);
    color:var(--yellow-300) !important;
    text-decoration:none;
    padding:9px;
    border-radius:var(--radius-sm);
    font-size:12px;
    font-weight:700;
  }

  .marker-badge{
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);
    font-weight:800;
    color:var(--ink);
    border-radius:50%;
    border:2.5px solid var(--paper);
    box-shadow:0 2px 6px rgba(0,0,0,.25);
  }

  .cluster-badge{
    background:var(--yellow-500);
    border:3px solid var(--paper);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);
    font-weight:800;
    color:var(--ink);
    box-shadow:0 2px 8px rgba(0,0,0,.25);
  }
</style>
</head>
<body>

<div id="map"></div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner" id="spinner"></div>
  <p id="loadingText">ステーション情報を取得しています…</p>
  <div class="error-box" id="errorBox">
    <h4>データを取得できませんでした</h4>
    <p id="errorMsg">ODPTのGBFSエンドポイントへの接続に失敗しました。ネットワーク環境またはCORS設定をご確認のうえ、再試行してください。</p>
    <button onclick="loadAllData()">再試行</button>
  </div>
</div>

<div class="topbar">
  <div class="brand-card">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 100-2 1 1 0 000 2zM12 17.5V14l-3-3 4-3 2 3h2"/></svg>
    </div>
    <div class="brand-text">
      <h1>HELLO CYCLING マップ</h1>
      <p>全国シェアサイクル ステーション情報</p>
    </div>
  </div>

  <div class="search-card">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input type="text" id="searchInput" placeholder="ステーション名・住所で検索…">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>

  <div class="stat-card">
    <div class="stat"><div class="num" id="statTotal">–</div><div class="lbl">ステーション</div></div>
    <div class="stat"><div class="num" id="statBikes">–</div><div class="lbl">貸出可能台数</div></div>
    <div class="stat"><div class="num" id="statDocks">–</div><div class="lbl">返却可能数</div></div>
  </div>
</div>

<div class="filter-row">
  <button class="pill active" data-filter="all">すべて表示</button>
  <button class="pill" data-filter="available">貸出可能のみ</button>
  <button class="pill" data-filter="returnable">返却可能のみ</button>
  <button class="pill" data-filter="charging">充電ポートあり</button>
</div>

<div class="legend">
  <h3>貸出可能台数</h3>
  <div class="legend-row"><span class="dot" style="background:var(--yellow-500)"></span>多い（4台以上）</div>
  <div class="legend-row"><span class="dot" style="background:var(--yellow-300)"></span>少ない（1〜3台）</div>
  <div class="legend-row"><span class="dot" style="background:var(--gray-soft);box-shadow:0 0 0 1px #c9cbb8"></span>なし（0台）</div>
  <div class="legend-row"><span class="dot" style="background:var(--gray)"></span>運用停止中</div>
</div>

<div class="status-bar">
  <div class="updated-chip" id="updatedChip">読み込み中…</div>
  <button class="refresh-btn" id="refreshBtn" onclick="loadAllData()" title="今すぐ更新">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 01-15 6.7L3 16"/></svg>
  </button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>

<script>
/* ==============================================
   HELLO CYCLING GBFS ステーションマップ
   全データはGBFS(v2.3)エンドポイントから取得
================================================= */

const ENDPOINTS = {
  system: 'https://api-public.odpt.org/api/v4/gbfs/hellocycling/system_information.json',
  stations: 'https://api-public.odpt.org/api/v4/gbfs/hellocycling/station_information.json',
  status: 'https://api-public.odpt.org/api/v4/gbfs/hellocycling/station_status.json',
  vehicles: 'https://api-public.odpt.org/api/v4/gbfs/hellocycling/vehicle_types.json'
};

let map, cluster;
let stationMeta = {};   // station_id -> station_information
let stationState = {};  // station_id -> station_status
let markers = {};       // station_id -> leaflet marker
let currentFilter = 'all';
let searchTerm = '';
let refreshTimer = null;

/* ---------- Map init ---------- */
function initMap(){
  map = L.map('map', { zoomControl:false, attributionControl:true }).setView([35.6812, 139.7671], 11);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
    maxZoom: 19
  }).addTo(map);

  L.control.zoom({ position:'bottomright' }).addTo(map);

  cluster = L.markerClusterGroup({
    maxClusterRadius: 50,
    iconCreateFunction: function(c){
      const count = c.getChildCount();
      const size = count > 50 ? 46 : count > 10 ? 40 : 34;
      return L.divIcon({
        html: `<div class="cluster-badge" style="width:${size}px;height:${size}px;font-size:${count>99?11:13}px;">${count}</div>`,
        className: '',
        iconSize: [size, size]
      });
    }
  });
  map.addLayer(cluster);
}

/* ---------- Data loading ---------- */
async function fetchJSON(url){
  const res = await fetch(url, { cache:'no-store' });
  if(!res.ok) throw new Error('HTTP ' + res.status + ' : ' + url);
  return res.json();
}

async function loadAllData(){
  showLoading(true);
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  try{
    const [stationsRes, statusRes] = await Promise.all([
      fetchJSON(ENDPOINTS.stations),
      fetchJSON(ENDPOINTS.status)
    ]);

    stationMeta = {};
    (stationsRes.data.stations || []).forEach(s => { stationMeta[s.station_id] = s; });

    stationState = {};
    (statusRes.data.stations || []).forEach(s => { stationState[s.station_id] = s; });

    renderMarkers();
    updateStats();
    document.getElementById('updatedChip').innerHTML =
      '<b>更新:</b> ' + new Date().toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    showLoading(false);
  }catch(err){
    console.error(err);
    document.getElementById('loadingText').textContent = '読み込みに失敗しました';
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('errorBox').classList.add('show');
    document.getElementById('errorMsg').textContent = err.message || '不明なエラーが発生しました。';
  }
  btn.classList.remove('spinning');
}

function showLoading(state){
  const el = document.getElementById('loadingOverlay');
  if(state){
    el.classList.remove('hidden');
    document.getElementById('spinner').style.display = 'block';
    document.getElementById('errorBox').classList.remove('show');
    document.getElementById('loadingText').textContent = 'ステーション情報を取得しています…';
  } else {
    el.classList.add('hidden');
  }
}

/* ---------- Marker rendering ---------- */
function markerColor(bikes, docks, renting, returning){
  if(!renting && !returning) return 'var(--gray)';
  if(bikes >= 4) return 'var(--yellow-500)';
  if(bikes >= 1) return 'var(--yellow-300)';
  return '#eef0e4';
}

function buildIcon(bikes, color){
  const size = bikes >= 4 ? 30 : bikes >= 1 ? 26 : 22;
  return L.divIcon({
    html: `<div class="marker-badge" style="width:${size}px;height:${size}px;background:${color};font-size:${size>=28?12:10}px;">${bikes}</div>`,
    className:'',
    iconSize:[size,size],
    iconAnchor:[size/2, size/2],
    popupAnchor:[0, -size/2]
  });
}

function passesFilter(meta, state){
  if(!state) return currentFilter === 'all';
  const bikes = state.num_bikes_available ?? 0;
  const docks = state.num_docks_available ?? 0;
  switch(currentFilter){
    case 'available': return bikes > 0 && state.is_renting;
    case 'returnable': return docks > 0 && state.is_returning;
    case 'charging': return meta.is_charging_station === true;
    default: return true;
  }
}

function passesSearch(meta){
  if(!searchTerm) return true;
  const hay = (meta.name + ' ' + (meta.address||'')).toLowerCase();
  return hay.includes(searchTerm);
}

function renderMarkers(){
  cluster.clearLayers();
  markers = {};

  Object.values(stationMeta).forEach(meta => {
    const state = stationState[meta.station_id];
    if(!passesFilter(meta, state) || !passesSearch(meta)) return;

    const bikes = state ? (state.num_bikes_available ?? 0) : 0;
    const docks = state ? (state.num_docks_available ?? 0) : 0;
    const renting = state ? state.is_renting : false;
    const returning = state ? state.is_returning : false;
    const color = markerColor(bikes, docks, renting, returning);

    const marker = L.marker([meta.lat, meta.lon], { icon: buildIcon(bikes, color) });
    marker.bindPopup(buildPopup(meta, state, bikes, docks, renting, returning));
    markers[meta.station_id] = marker;
    cluster.addLayer(marker);
  });
}

function buildPopup(meta, state, bikes, docks, renting, returning){
  const statusTag = (renting || returning)
    ? '<span class="popup-status-tag tag-open">運用中</span>'
    : '<span class="popup-status-tag tag-closed">運用停止中</span>';

  const capacity = meta.vehicle_capacity ? `${meta.vehicle_capacity}台` : '不明';
  const charging = meta.is_charging_station ? '<span style="color:var(--yellow-900);font-weight:700;">⚡ あり</span>' : 'なし';
  const webUrl = meta.rental_uris && meta.rental_uris.web ? meta.rental_uris.web : null;

  return `
    <div class="popup-head">
      <div class="st-name">${escapeHtml(meta.name)}</div>
      <div class="st-addr">${escapeHtml(meta.address || '住所情報なし')}</div>
    </div>
    <div class="popup-body">
      ${statusTag}
      <div class="popup-avail">
        <div class="avail-box"><div class="n">${bikes}</div><div class="l">貸出可能</div></div>
        <div class="avail-box"><div class="n">${docks}</div><div class="l">返却可能</div></div>
      </div>
      <div class="popup-meta">
        駐輪定数：<span>${capacity}</span><br>
        充電ポート：<span>${charging}</span><br>
        ステーションID：<span>${escapeHtml(meta.station_id)}</span>
      </div>
      ${webUrl ? `<a class="popup-link" href="${webUrl}" target="_blank" rel="noopener">アプリで予約する</a>` : ''}
    </div>
  `;
}

function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

/* ---------- Stats ---------- */
function updateStats(){
  const ids = Object.keys(stationMeta);
  let bikeSum = 0, dockSum = 0;
  ids.forEach(id => {
    const s = stationState[id];
    if(s){ bikeSum += (s.num_bikes_available||0); dockSum += (s.num_docks_available||0); }
  });
  document.getElementById('statTotal').textContent = ids.length.toLocaleString('ja-JP');
  document.getElementById('statBikes').textContent = bikeSum.toLocaleString('ja-JP');
  document.getElementById('statDocks').textContent = dockSum.toLocaleString('ja-JP');
}

/* ---------- UI events ---------- */
document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderMarkers();
  });
});

const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', () => {
  searchTerm = searchInput.value.trim().toLowerCase();
  document.getElementById('searchClear').style.display = searchTerm ? 'flex' : 'none';
  renderMarkers();
});

function clearSearch(){
  searchInput.value = '';
  searchTerm = '';
  document.getElementById('searchClear').style.display = 'none';
  renderMarkers();
}

/* ---------- Boot ---------- */
initMap();
loadAllData();
// GBFSのttl(約60秒)に合わせて自動更新
refreshTimer = setInterval(loadAllData, 60000);
</script>
