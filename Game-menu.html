<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ゲームメニュー - 東京圏輸送情報システム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yusei+Magic&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --tile-a:#ffe4c2;
    --tile-b:#ffcd94;
    --grout:#f0a34e;
    --panel:#5c2a0d;
    --panel-2:#7a3c14;
    --cta:#ff6a1a;
    --cta-dark:#c94f0a;
    --gold:#ffb703;
    --accent:#2dd4bf;
    --ink:#5c2c0a;
    --paper:#fff3e2;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; min-height:100%;
    font-family:'Zen Maru Gothic', sans-serif;
    color:var(--ink);
    background: repeating-linear-gradient(45deg, var(--tile-a) 0 40px, var(--tile-b) 40px 80px);
    -webkit-tap-highlight-color: transparent;
  }
  #app{
    min-height:100vh; min-height:100dvh;
    display:flex; flex-direction:column; align-items:center;
    padding: max(60px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) 30px max(16px, env(safe-area-inset-left));
  }
  #backBtn{
    position:fixed;
    top:max(14px, env(safe-area-inset-top));
    left:max(14px, env(safe-area-inset-left));
    display:flex; align-items:center; gap:5px;
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:700;
    font-size:13px;
    text-decoration:none;
    padding:9px 16px 9px 12px;
    border-radius:999px;
    background:var(--panel);
    color:var(--paper);
    box-shadow:0 3px 0 #2a1206;
    z-index:20;
  }
  #backBtn:active{ transform:translateY(2px); box-shadow:none; }

  h1{
    font-family:'Yusei Magic', sans-serif;
    font-size:clamp(22px,6.5vw,28px);
    margin:0 0 6px;
    color:var(--panel);
    text-align:center;
  }
  p.sub{
    font-size:13px;
    color:var(--panel);
    opacity:0.75;
    margin:0 0 26px;
    text-align:center;
  }

  #grid{
    width:100%; max-width:900px;
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap:18px;
  }

  .gameCard{
    display:flex; flex-direction:column;
    background:var(--paper);
    border-radius:22px;
    overflow:hidden;
    text-decoration:none;
    color:inherit;
    box-shadow: 0 6px 0 var(--panel-2), 0 10px 20px rgba(0,0,0,0.18);
    transition: transform 0.12s;
  }
  .gameCard:active{ transform:translateY(3px); }
  .thumb{
    height:120px;
    display:flex; align-items:center; justify-content:center;
    font-size:56px;
  }
  .cardBody{ padding:14px 16px 18px; }
  .cardBody h2{
    font-family:'Yusei Magic', sans-serif;
    font-size:17px;
    margin:0 0 6px;
    color:var(--panel);
  }
  .cardBody p{
    font-size:12.5px;
    line-height:1.6;
    margin:0 0 12px;
    color:var(--ink);
    opacity:0.85;
  }
  .tags{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
  .tag{
    font-size:10.5px;
    background:#fff;
    color:var(--panel);
    padding:3px 9px;
    border-radius:999px;
    box-shadow: inset 0 0 0 1.5px #ffd9ac;
  }
  .playBtn{
    display:inline-block;
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:700;
    font-size:13.5px;
    padding:9px 18px;
    border-radius:999px;
    background:var(--cta);
    color:#3a1400;
    box-shadow:0 3px 0 var(--cta-dark);
  }

  .comingSoon{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(255,255,255,0.45);
    border-radius:22px;
    min-height:200px;
    border:2.5px dashed #f0a34e;
    color:var(--panel);
    opacity:0.65;
    text-align:center;
    padding:20px;
  }
  .comingSoon .icon{ font-size:34px; margin-bottom:8px; }
  .comingSoon p{ font-size:12.5px; margin:0; }
</style>
</head>
<body>
<div id="app">
  <a id="backBtn" href="toppage.html">🔝 トップに戻る</a>

  <h1>🎮 ゲームメニュー</h1>
  <p class="sub">あそびたいゲームを選んでね</p>

  <div id="grid"></div>
</div>

<script>
  // ここに配列を追加していくだけで、今後ゲームがどんどん増やせます。
  const GAMES = [
    {
      title: 'うんちバトル・コロシアム',
      icon: '💩',
      iconBg: 'linear-gradient(135deg,#ffd9a0,#ffb85e)',
      desc: '飛び出すうんちをタップして叩く爽快アクション。ノーマル／タイムアタック／サバイバルの3モード搭載。',
      tags: ['アクション', '反射神経', '1人プレイ'],
      href: 'game/unchigame.html'
    }
  ];

  const grid = document.getElementById('grid');

  GAMES.forEach(g=>{
    const a = document.createElement('a');
    a.className = 'gameCard';
    a.href = g.href;
    a.innerHTML = `
      <div class="thumb" style="background:${g.iconBg}">${g.icon}</div>
      <div class="cardBody">
        <h2>${g.title}</h2>
        <p>${g.desc}</p>
        <div class="tags">${g.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        <span class="playBtn">あそぶ ▶</span>
      </div>
    `;
    grid.appendChild(a);
  });

  // 今後ゲームが増えるまでの「近日公開」プレースホルダー
  const soon = document.createElement('div');
  soon.className = 'comingSoon';
  soon.innerHTML = `<div class="icon">🛠️</div><p>次のゲームを<br>じゅんび中…</p>`;
  grid.appendChild(soon);
</script>
</body>
</html>
